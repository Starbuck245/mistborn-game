<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mistborn: Ash and Shadows</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Input System ---
    const keys = {};
    const input = {
      get left() { return keys['ArrowLeft'] || keys['KeyA']; },
      get right() { return keys['ArrowRight'] || keys['KeyD']; },
      get jump() { return keys['Space']; },
      get attack() { return keys['KeyX'] || keys['KeyJ']; },
      get luck() { return keys['KeyZ'] || keys['KeyK']; },
    };
    window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // --- Tile Map ---
    const TILE = 32;
    const TILE_EMPTY = 0;
    const TILE_SOLID = 1;
    const TILE_CRUMBLE = 2;
    const TILE_TOXIC = 3;

    // Level dimensions: 200 wide x 20 tall
    const LEVEL_W = 200;
    const LEVEL_H = 20;
    const LEVEL_PX_W = LEVEL_W * TILE;
    const LEVEL_PX_H = LEVEL_H * TILE;

    // Build the level procedurally
    function buildLevel1() {
      // Initialize empty
      const map = [];
      for (let r = 0; r < LEVEL_H; r++) {
        map[r] = new Array(LEVEL_W).fill(0);
      }

      // Helper: fill a column from row rTop to rBot (inclusive) with tile type
      function fillCol(c, rTop, rBot, type) {
        if (c < 0 || c >= LEVEL_W) return;
        for (let r = Math.max(0, rTop); r <= Math.min(LEVEL_H - 1, rBot); r++) {
          map[r][c] = type;
        }
      }

      // Helper: fill rect
      function fillRect(c1, r1, c2, r2, type) {
        for (let c = c1; c <= c2; c++) fillCol(c, r1, r2, type);
      }

      // ========== SECTION 1: THE SLUMS (cols 0-69) ==========
      // Base ground at row 17-19 (bottom 3 rows)
      fillRect(0, 17, 69, 19, 1);

      // Starting platform - flat area (cols 0-12)
      // Already covered by base ground

      // Small raised section (cols 5-8, row 15-16)
      fillRect(5, 15, 8, 16, 1);

      // Gap in ground (cols 13-15) - pit
      fillRect(13, 17, 15, 19, 0);

      // Low platform over the gap (col 13-15, row 14)
      fillRect(13, 14, 15, 14, 2); // crumbling!

      // Raised building (cols 18-24, rows 13-16)
      fillRect(18, 13, 24, 16, 1);

      // Steps up to building (cols 16-17, rows 15-16)
      fillRect(16, 15, 17, 16, 1);

      // Toxic puddle on the ground (cols 26-28)
      fillRect(26, 16, 28, 16, 3);

      // Another gap (cols 30-32)
      fillRect(30, 17, 32, 19, 0);

      // Floating platform (cols 30-32, row 13)
      fillRect(30, 13, 32, 13, 1);

      // Raised section (cols 34-40, rows 15-16)
      fillRect(34, 15, 40, 16, 1);

      // Platform above (cols 36-38, row 11)
      fillRect(36, 11, 38, 11, 2); // crumbling

      // Ground dip (cols 42-44, deeper ground)
      fillRect(42, 17, 44, 19, 0);
      fillRect(42, 18, 44, 19, 1); // shallow pit, only 1 tile deep extra

      // Stacked platforms (cols 46-48)
      fillRect(46, 14, 48, 14, 1);
      fillRect(46, 10, 48, 10, 1);

      // Another gap (cols 50-52)
      fillRect(50, 17, 52, 19, 0);

      // Stepping stones over gap
      fillRect(50, 15, 50, 15, 1);
      fillRect(52, 14, 52, 14, 1);

      // Wide raised area (cols 54-62, rows 15-16)
      fillRect(54, 15, 62, 16, 1);

      // Small building on top (cols 57-60, rows 12-14)
      fillRect(57, 12, 60, 14, 1);

      // Toxic puddle (cols 64-66)
      fillRect(64, 16, 66, 16, 3);

      // Transition gap before Border section (cols 68-69)
      fillRect(68, 17, 69, 19, 0);
      fillRect(68, 15, 69, 15, 1); // platform to cross

      // ========== SECTION 2: THE BORDER (cols 70-139) ==========
      // Base ground at row 17-19 but with more gaps
      fillRect(70, 17, 139, 19, 1);

      // Tall building (cols 70-75, rows 8-16)
      fillRect(70, 8, 75, 16, 1);

      // Gap (cols 76-79)
      fillRect(76, 17, 79, 19, 0);

      // Floating platforms to cross gap
      fillRect(77, 13, 78, 13, 1);
      fillRect(76, 9, 77, 9, 2); // crumbling

      // Medium building (cols 80-85, rows 11-16)
      fillRect(80, 11, 85, 16, 1);

      // High platform (cols 82-84, row 7)
      fillRect(82, 7, 84, 7, 1);

      // Gap (cols 86-89)
      fillRect(86, 17, 89, 19, 0);

      // Stepping stones going up
      fillRect(87, 15, 87, 15, 1);
      fillRect(89, 13, 89, 13, 1);

      // Tall tower (cols 90-93, rows 5-16)
      fillRect(90, 5, 93, 16, 1);

      // Bridge from tower (cols 94-97, row 8)
      fillRect(94, 8, 97, 8, 2); // crumbling bridge

      // Building (cols 98-103, rows 10-16)
      fillRect(98, 10, 103, 16, 1);

      // Toxic area (cols 98-100 on ground level - already solid, put toxic on surface)
      fillRect(104, 16, 106, 16, 3);

      // Big gap (cols 107-112)
      fillRect(107, 17, 112, 19, 0);

      // Platforms across big gap
      fillRect(108, 14, 109, 14, 1);
      fillRect(111, 12, 112, 12, 2); // crumbling

      // Raised terrain (cols 113-120, rows 13-16)
      fillRect(113, 13, 120, 16, 1);

      // Upper platforms (cols 115-117, row 9)
      fillRect(115, 9, 117, 9, 1);

      // Gap (cols 121-123)
      fillRect(121, 17, 123, 19, 0);
      fillRect(121, 13, 123, 16, 0);

      // Floating platform
      fillRect(122, 11, 123, 11, 1);

      // Tall structure (cols 124-130, rows 7-16)
      fillRect(124, 7, 130, 16, 1);

      // Platforms on top of structure
      fillRect(126, 4, 128, 4, 1);

      // Gap (cols 131-133)
      fillRect(131, 17, 133, 19, 0);
      fillRect(131, 14, 132, 14, 2); // crumbling

      // Transition area (cols 134-139, rows 14-16)
      fillRect(134, 14, 139, 16, 1);

      // Toxic puddles near border
      fillRect(136, 13, 138, 13, 3);

      // ========== SECTION 3: THE DEAD END (cols 140-199) ==========
      // Base ground
      fillRect(140, 17, 199, 19, 1);

      // Narrow alley - walls close in from top
      // Left wall column rises (cols 140-142, rows 10-16)
      fillRect(140, 10, 142, 16, 1);

      // Ground level continues
      fillRect(143, 15, 150, 16, 1);

      // Ceiling starts coming down (cols 145-199, rows 0-3)
      fillRect(145, 0, 199, 3, 1);

      // Walls on sides narrow the path
      // Left walls
      fillRect(148, 4, 150, 10, 1);

      // Platform in narrow section
      fillRect(152, 12, 155, 12, 1);

      // More ceiling (cols 155-199, rows 0-5)
      fillRect(155, 0, 199, 5, 1);

      // Raised ground (cols 156-162, rows 15-16)
      fillRect(156, 15, 162, 16, 1);

      // Narrow passage walls (cols 160-162, rows 6-12)
      fillRect(160, 6, 162, 12, 1);

      // Gap (cols 163-164)
      fillRect(163, 17, 164, 19, 0);
      fillRect(163, 15, 164, 16, 0);

      // Platform
      fillRect(163, 13, 164, 13, 2); // crumbling

      // Continuing narrow alley
      fillRect(165, 14, 175, 16, 1);

      // Ceiling gets lower (cols 168-199, rows 0-7)
      fillRect(168, 0, 199, 7, 1);

      // Toxic puddles in alley
      fillRect(170, 13, 172, 13, 3);

      // Walls narrow more
      fillRect(173, 8, 175, 12, 1);

      // Very narrow section (cols 176-185)
      fillRect(176, 14, 185, 16, 1);
      fillRect(176, 8, 178, 11, 1);

      // Even lower ceiling (cols 180-199, rows 0-9)
      fillRect(180, 0, 199, 9, 1);

      // Small platform
      fillRect(182, 12, 183, 12, 1);

      // Final approach
      fillRect(186, 13, 195, 16, 1);

      // Dead end wall (cols 196-199, full height)
      fillRect(196, 0, 199, 19, 1);

      // Toxic puddles near dead end
      fillRect(192, 12, 194, 12, 3);

      return map;
    }

    const level = buildLevel1();

    // Check if a tile is solid (for collision)
    function isSolid(type) {
      return type === TILE_SOLID || type === TILE_CRUMBLE;
    }

    // Get tile at pixel position
    function getTile(px, py) {
      const c = Math.floor(px / TILE);
      const r = Math.floor(py / TILE);
      if (c < 0 || c >= LEVEL_W || r < 0 || r >= LEVEL_H) return 0;
      return level[r][c];
    }

    // --- Camera ---
    const camera = { x: 0, y: 0 };

    function updateCamera() {
      // Target: player at 1/3 from left
      const targetX = player.x - canvas.width / 3;
      // Target: player centered vertically in middle third
      const targetY = player.y - canvas.height / 2 + player.height / 2;

      // Smooth follow
      camera.x += (targetX - camera.x) * 0.1;
      camera.y += (targetY - camera.y) * 0.05; // slower vertical follow

      // Clamp to level bounds
      camera.x = Math.max(0, Math.min(LEVEL_PX_W - canvas.width, camera.x));
      camera.y = Math.max(0, Math.min(LEVEL_PX_H - canvas.height, camera.y));
    }

    // --- Player ---
    const SPAWN_X = 64;
    const SPAWN_Y = 14 * TILE; // above the ground in the starting area

    const player = {
      x: SPAWN_X, y: SPAWN_Y,
      vx: 0, vy: 0,
      width: 24, height: 36,
      onGround: false,
      jumpHeld: false,
      jumpTime: 0,
      facing: 1,
      speed: 200,
      accel: 800,
      decel: 600,
      jumpForce: -400,
      gravity: 980,
      maxJumpTime: 0.2,
      // Attack state
      attacking: false,
      attackTimer: 0,
      attackDuration: 0.3,
      attackHitbox: { x: 0, y: 0, width: 20, height: 20 },
      attackTriggered: false,
      // Health
      hp: 3,
      maxHp: 3,
      invincible: false,
      invincibleTimer: 0,
    };

    function respawnPlayer() {
      player.x = SPAWN_X;
      player.y = SPAWN_Y;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.jumpHeld = false;
      player.jumpTime = 0;
      player.invincible = true;
      player.invincibleTimer = 1.5;
    }

    function updatePlayer(dt) {
      // --- Horizontal movement with acceleration/deceleration ---
      let targetVx = 0;
      if (input.left) targetVx -= player.speed;
      if (input.right) targetVx += player.speed;

      if (targetVx !== 0) {
        if (player.vx < targetVx) {
          player.vx = Math.min(player.vx + player.accel * dt, targetVx);
        } else if (player.vx > targetVx) {
          player.vx = Math.max(player.vx - player.accel * dt, targetVx);
        }
        player.facing = targetVx > 0 ? 1 : -1;
      } else {
        if (player.vx > 0) {
          player.vx = Math.max(player.vx - player.decel * dt, 0);
        } else if (player.vx < 0) {
          player.vx = Math.min(player.vx + player.decel * dt, 0);
        }
      }

      // --- Jump with variable height ---
      if (input.jump) {
        if (player.onGround && !player.jumpHeld) {
          player.vy = player.jumpForce;
          player.onGround = false;
          player.jumpTime = 0;
        }
        if (!player.onGround && player.jumpTime < player.maxJumpTime) {
          player.vy += player.gravity * 0.4 * dt;
          player.jumpTime += dt;
        } else {
          player.vy += player.gravity * dt;
        }
        player.jumpHeld = true;
      } else {
        player.vy += player.gravity * dt;
        player.jumpHeld = false;
      }

      // --- Apply horizontal velocity + tile collision ---
      player.x += player.vx * dt;
      resolveHorizontal();

      // --- Apply vertical velocity + tile collision ---
      player.y += player.vy * dt;
      resolveVertical();

      // --- Level bounds (horizontal only) ---
      if (player.x < 0) { player.x = 0; player.vx = 0; }
      if (player.x + player.width > LEVEL_PX_W) { player.x = LEVEL_PX_W - player.width; player.vx = 0; }

      // --- Fall off bottom: respawn ---
      if (player.y > LEVEL_PX_H + 64) {
        respawnPlayer();
      }

      // --- Knife attack ---
      if (input.attack && !player.attacking && !player.attackTriggered) {
        player.attacking = true;
        player.attackTimer = 0;
        player.attackTriggered = true;
      }
      if (player.attacking) {
        player.attackTimer += dt;
        if (player.attackTimer >= player.attackDuration) {
          player.attacking = false;
        }
      }
      if (!input.attack) {
        player.attackTriggered = false;
      }
      // Update attack hitbox position
      const hbOffsetX = player.facing === 1 ? player.width : -20;
      player.attackHitbox.x = player.x + hbOffsetX;
      player.attackHitbox.y = player.y + (player.height / 2) - 10;
      player.attackHitbox.width = 20;
      player.attackHitbox.height = 20;

      // Invincibility timer
      if (player.invincible) {
        player.invincibleTimer -= dt;
        if (player.invincibleTimer <= 0) {
          player.invincible = false;
          player.invincibleTimer = 0;
        }
      }
    }

    function resolveHorizontal() {
      // Check tiles overlapping the player AABB
      const left = Math.floor(player.x / TILE);
      const right = Math.floor((player.x + player.width - 0.01) / TILE);
      const top = Math.floor(player.y / TILE);
      const bottom = Math.floor((player.y + player.height - 0.01) / TILE);

      for (let r = top; r <= bottom; r++) {
        for (let c = left; c <= right; c++) {
          if (r < 0 || r >= LEVEL_H || c < 0 || c >= LEVEL_W) continue;
          if (!isSolid(level[r][c])) continue;

          // Tile AABB
          const tx = c * TILE;
          const ty = r * TILE;

          // Resolve overlap
          if (player.vx > 0) {
            // Moving right, push left
            player.x = tx - player.width;
            player.vx = 0;
          } else if (player.vx < 0) {
            // Moving left, push right
            player.x = tx + TILE;
            player.vx = 0;
          }
          return; // resolved
        }
      }
    }

    function resolveVertical() {
      const left = Math.floor(player.x / TILE);
      const right = Math.floor((player.x + player.width - 0.01) / TILE);
      const top = Math.floor(player.y / TILE);
      const bottom = Math.floor((player.y + player.height - 0.01) / TILE);

      player.onGround = false;

      for (let r = top; r <= bottom; r++) {
        for (let c = left; c <= right; c++) {
          if (r < 0 || r >= LEVEL_H || c < 0 || c >= LEVEL_W) continue;
          if (!isSolid(level[r][c])) continue;

          const ty = r * TILE;

          if (player.vy > 0) {
            // Falling down, land on top
            player.y = ty - player.height;
            player.vy = 0;
            player.onGround = true;
            player.jumpTime = 0;
          } else if (player.vy < 0) {
            // Moving up, bonk head
            player.y = ty + TILE;
            player.vy = 0;
          }
          return;
        }
      }
    }

    // --- Tile Rendering ---
    function renderTiles() {
      // Determine visible tile range (culling)
      const startCol = Math.max(0, Math.floor(camera.x / TILE));
      const endCol = Math.min(LEVEL_W - 1, Math.floor((camera.x + canvas.width) / TILE));
      const startRow = Math.max(0, Math.floor(camera.y / TILE));
      const endRow = Math.min(LEVEL_H - 1, Math.floor((camera.y + canvas.height) / TILE));

      for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
          const tile = level[r][c];
          if (tile === TILE_EMPTY) continue;

          const screenX = c * TILE - camera.x;
          const screenY = r * TILE - camera.y;

          if (tile === TILE_SOLID) {
            ctx.fillStyle = '#3a3040';
            ctx.fillRect(screenX, screenY, TILE, TILE);
            // Lighter top edge for surface look
            ctx.fillStyle = '#4a4050';
            ctx.fillRect(screenX, screenY, TILE, 3);
            // Subtle grid line
            ctx.strokeStyle = '#2a2030';
            ctx.strokeRect(screenX, screenY, TILE, TILE);
          } else if (tile === TILE_CRUMBLE) {
            ctx.fillStyle = '#4a4050';
            ctx.fillRect(screenX, screenY, TILE, TILE);
            // Cracked look - draw some crack lines
            ctx.strokeStyle = '#5a5060';
            ctx.beginPath();
            ctx.moveTo(screenX + 4, screenY + 8);
            ctx.lineTo(screenX + 16, screenY + 16);
            ctx.lineTo(screenX + 28, screenY + 10);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(screenX + 10, screenY + 22);
            ctx.lineTo(screenX + 20, screenY + 28);
            ctx.stroke();
            // Top edge
            ctx.fillStyle = '#5a5565';
            ctx.fillRect(screenX, screenY, TILE, 2);
          } else if (tile === TILE_TOXIC) {
            // Draw ground underneath
            ctx.fillStyle = '#3a3040';
            ctx.fillRect(screenX, screenY, TILE, TILE);
            // Greenish toxic overlay
            ctx.fillStyle = 'rgba(42, 74, 42, 0.7)';
            ctx.fillRect(screenX, screenY, TILE, TILE);
            // Bubbling effect - small circles
            ctx.fillStyle = '#3a6a3a';
            ctx.beginPath();
            ctx.arc(screenX + 8, screenY + 10, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(screenX + 22, screenY + 14, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(screenX + 14, screenY + 22, 2.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }

    // --- Vin Sprite Data (24 wide x 36 tall) ---
    // Color palette constants
    const _ = null;           // transparent
    const H = '#1a0e05';     // hair (very dark brown/black)
    const h = '#2a1a0a';     // hair highlight
    const S = '#c8a882';     // skin
    const s = '#b08a68';     // skin shadow
    const E = '#e8e8ff';     // eyes (bright, stands out)
    const e = '#6688cc';     // eye iris
    const M = '#8a6050';     // mouth/nose hint
    const C = '#4a6d8c';     // cloak main
    const c = '#5a80a0';     // cloak edge/highlight
    const D = '#1a1a2a';     // dark clothing under cloak
    const d = '#252538';     // dark clothing lighter
    const B = '#3a3a4a';     // boots
    const b = '#2a2a3a';     // boots dark
    const K = '#8090a0';     // knife blade
    const k = '#5a4030';     // knife handle

    // IDLE frame 1
    const VIN_IDLE_1 = [
      // row 0-2: top of hair
      [_,_,_,_,_,_,_,_,H,H,H,H,H,H,H,H,_,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,H,H,h,H,H,H,H,h,H,H,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,H,H,h,H,H,H,H,H,H,h,H,H,_,_,_,_,_,_],
      // row 3-4: hair + face top
      [_,_,_,_,_,H,H,H,H,H,H,H,H,H,H,H,H,H,H,_,_,_,_,_],
      [_,_,_,_,_,H,H,H,s,S,S,S,S,S,S,s,H,H,H,_,_,_,_,_],
      // row 5: eyes
      [_,_,_,_,_,H,H,s,S,E,e,S,S,E,e,S,s,H,H,_,_,_,_,_],
      // row 6: nose
      [_,_,_,_,_,H,H,s,S,S,S,S,M,S,S,S,s,H,H,_,_,_,_,_],
      // row 7: mouth
      [_,_,_,_,_,H,H,s,S,S,M,M,M,S,S,S,s,H,H,_,_,_,_,_],
      // row 8: chin + hair sides
      [_,_,_,_,H,H,H,s,S,S,S,s,s,S,S,S,s,H,H,H,_,_,_,_],
      // row 9: neck + hair flowing down
      [_,_,_,_,H,H,_,_,s,S,S,S,S,S,S,s,_,_,H,H,_,_,_,_],
      // row 10-11: shoulders + cloak top
      [_,_,_,H,H,c,C,C,C,D,D,D,D,D,D,C,C,C,c,H,H,_,_,_],
      [_,_,H,H,c,C,C,C,D,D,D,D,D,D,D,D,C,C,C,c,H,H,_,_],
      // row 12-14: upper body (cloak wrapping around)
      [_,_,H,c,C,C,C,D,D,D,D,D,D,D,D,D,D,C,C,C,c,H,_,_],
      [_,_,H,c,C,C,D,D,D,d,D,D,D,D,d,D,D,D,C,C,c,H,_,_],
      [_,_,_,c,C,C,D,D,d,d,D,D,D,D,d,d,D,D,C,C,c,_,_,_],
      // row 15-17: torso
      [_,_,_,c,C,C,D,D,d,D,D,D,D,D,D,d,D,D,C,C,c,_,_,_],
      [_,_,_,c,C,C,D,D,D,D,D,D,D,D,D,D,D,D,C,C,c,_,_,_],
      [_,_,_,_,c,C,C,D,D,D,D,D,D,D,D,D,D,C,C,c,_,_,_,_],
      // row 18-19: waist
      [_,_,_,_,c,C,C,D,D,D,D,D,D,D,D,D,D,C,C,c,_,_,_,_],
      [_,_,_,_,c,C,C,D,D,D,D,D,D,D,D,D,D,C,C,c,_,_,_,_],
      // row 20-21: hips + cloak flare
      [_,_,_,_,c,C,C,D,D,D,D,D,D,D,D,D,D,C,C,c,_,_,_,_],
      [_,_,_,c,C,C,C,D,D,D,D,_,_,D,D,D,D,C,C,C,c,_,_,_],
      // row 22-25: legs
      [_,_,_,c,C,C,D,D,D,D,_,_,_,_,D,D,D,D,C,C,c,_,_,_],
      [_,_,_,c,C,C,D,D,D,_,_,_,_,_,_,D,D,D,C,C,c,_,_,_],
      [_,_,_,_,c,C,D,D,D,_,_,_,_,_,_,D,D,D,C,c,_,_,_,_],
      [_,_,_,_,c,C,D,D,D,_,_,_,_,_,_,D,D,D,C,c,_,_,_,_],
      // row 26-29: lower legs
      [_,_,_,_,c,C,D,D,D,_,_,_,_,_,_,D,D,D,C,c,_,_,_,_],
      [_,_,_,_,_,C,D,D,D,_,_,_,_,_,_,D,D,D,C,_,_,_,_,_],
      [_,_,_,_,_,C,D,D,D,_,_,_,_,_,_,D,D,D,C,_,_,_,_,_],
      [_,_,_,_,_,C,D,D,D,_,_,_,_,_,_,D,D,D,C,_,_,_,_,_],

    function updateAnimation(dt) {
      // Determine desired state
      let desiredState = 'idle';

      if (player.attacking) {
        desiredState = 'attack';
        if (!anim.attackPlaying) {
          anim.attackPlaying = true;
          anim.frame = 0;
          anim.timer = 0;
        }
      } else {
        anim.attackPlaying = false;
      }

      if (desiredState !== 'attack') {
        if (!player.onGround && player.vy < 0) {
          desiredState = 'jump';
        } else if (!player.onGround && player.vy >= 0) {
          desiredState = 'fall';
        } else if (Math.abs(player.vx) > 10) {
          desiredState = 'run';
        }
      }

      // State change resets frame
      if (desiredState !== anim.state) {
        anim.state = desiredState;
        anim.frame = 0;
        anim.timer = 0;
      }

      // Advance frame timer
      anim.timer += dt;
      const ft = anim.frameTimes[anim.state];
      if (anim.timer >= ft) {
        anim.timer -= ft;
        anim.frame++;
        const maxFrames = SPRITE_FRAMES[anim.state].length;
        if (anim.frame >= maxFrames) {
          anim.frame = 0;
        }
      }
    }

      const w = spriteData[0].length;

      // Use ImageData for efficient pixel-by-pixel rendering
      // But for simplicity and since the sprite is small, use fillRect
      for (let row = 0; row < h; row++) {
        for (let col = 0; col < w; col++) {
          const color = spriteData[row][col];
          if (color === null) continue;
          ctx.fillStyle = color;
          const px = flip ? x + (w - 1 - col) : x + col;
          const py = y + row;
          ctx.fillRect(px, py, 1, 1);
        }
      }
    }

      if (r === 37) return [_,_,GB,GB,GB,GB,Gb,_,_,_,_,_,_,_,_,_,GB,GB,GB,GB,Gb,_,_,_,_,_];
      if (r === 38) return [_,_,GB,GB,GB,GB,GB,Gb,_,_,_,_,_,_,_,Gb,GB,GB,GB,GB,Gb,_,_,_,_,_];
      if (r === 39) return [_,_,GB,GB,GB,GB,GB,Gb,_,_,_,_,_,_,_,Gb,GB,GB,GB,GB,Gb,_,_,_,_,_];
      return [...row];
    });

    // GUARD WALK frame 4 (reuse passing frame)
    const GUARD_WALK_4 = GUARD_WALK_2;

    // GUARD HIT frame
    const GUARD_HIT = GUARD_WALK_1.map((row, r) => {
      if (r === 11) return [_,_,_,_,GA,GA,GA,GA,GA,Ga,Ga,Ga,Ga,Ga,Ga,GA,GA,GA,GA,GA,GA,GA,_,_,_,_];
      if (r === 12) return [_,_,_,GA,GA,GA,GA,Ga,GR,GR,GR,GR,GR,GR,GR,GR,Ga,GA,GA,GA,GA,GA,_,_,_,_];
      return [...row];
    });

    // GUARD ALERT frame (facing player, sword raised)
    const GUARD_ALERT = GUARD_WALK_1.map((row, r) => {
      // Sword raised higher
      if (r === 12) return [_,_,GA,GA,GA,GA,GA,Ga,GR,GR,GR,GR,GR,GR,GR,GR,Ga,GA,GA,GA,GA,GA,Gw,GW,_,_];
      if (r === 13) return [_,_,GA,GA,GA,Ga,GR,GR,GR,GR,GR,GR,GR,GR,GR,GR,GR,Ga,GA,GA,GA,Gw,GW,_,_,_];
      if (r === 14) return [_,_,_,GA,GA,Ga,GR,GR,GR,GR,GR,GR,GR,GR,GR,GR,GR,Ga,GA,GA,Gw,GW,_,_,_,_];
      return [...row];
    });

    const GUARD_SPRITE_FRAMES = {
      walk: [GUARD_WALK_1, GUARD_WALK_2, GUARD_WALK_3, GUARD_WALK_4],
      hit: [GUARD_HIT],
      alert: [GUARD_ALERT],
    };

    // --- Enemy System ---
    const enemies = [];

    function createThug(x, y, patrolLeft, patrolRight) {
      return {
        type: 'thug',
        x, y,
        vx: 0, vy: 0,
        width: 24, height: 36,
        hp: 1,
        maxHp: 1,
        speed: 60,
        facing: 1,
        patrolLeft, patrolRight,
        alive: true,
        hitTimer: 0,
        deathTimer: 0,
        onGround: false,
        anim: { state: 'walk', frame: 0, timer: 0 },
      };
    }

    function createGuard(x, y, patrolLeft, patrolRight) {
      return {
        type: 'guard',
        x, y,
        vx: 0, vy: 0,
        width: 26, height: 40,
        hp: 2,
        maxHp: 2,
        speed: 80,
        facing: 1,
        patrolLeft, patrolRight,
        alive: true,
        hitTimer: 0,
        deathTimer: 0,
        onGround: false,
        sootheDuration: 1.5,
        // Detection
        detecting: false,
        // Attack
        attackTimer: 0,
        attackCooldown: 1.5,
        attacking: false,
        attackDuration: 0.4,
        swordHitbox: { x: 0, y: 0, width: 30, height: 24 },
        anim: { state: 'walk', frame: 0, timer: 0 },
      };
    }

    function resolveEnemyHorizontal(enemy) {
      const left = Math.floor(enemy.x / TILE);
      const right = Math.floor((enemy.x + enemy.width - 0.01) / TILE);
      const top = Math.floor(enemy.y / TILE);
      const bottom = Math.floor((enemy.y + enemy.height - 0.01) / TILE);

      for (let r = top; r <= bottom; r++) {
        for (let c = left; c <= right; c++) {
          if (r < 0 || r >= LEVEL_H || c < 0 || c >= LEVEL_W) continue;
          if (!isSolid(level[r][c])) continue;
          const tx = c * TILE;
          if (enemy.vx > 0) {
            enemy.x = tx - enemy.width;
            enemy.vx = 0;
          } else if (enemy.vx < 0) {
            enemy.x = tx + TILE;
            enemy.vx = 0;
          }
          return;
        }
      }
    }

    function resolveEnemyVertical(enemy) {
      const left = Math.floor(enemy.x / TILE);
      const right = Math.floor((enemy.x + enemy.width - 0.01) / TILE);
      const top = Math.floor(enemy.y / TILE);
      const bottom = Math.floor((enemy.y + enemy.height - 0.01) / TILE);

      enemy.onGround = false;

      for (let r = top; r <= bottom; r++) {
        for (let c = left; c <= right; c++) {
          if (r < 0 || r >= LEVEL_H || c < 0 || c >= LEVEL_W) continue;
          if (!isSolid(level[r][c])) continue;
          const ty = r * TILE;
          if (enemy.vy > 0) {
            enemy.y = ty - enemy.height;
            enemy.vy = 0;
            enemy.onGround = true;
          } else if (enemy.vy < 0) {
            enemy.y = ty + TILE;
            enemy.vy = 0;
          }
          return;
        }
      }
    }

    function hasGroundAhead(enemy) {
      // Check if there's solid ground one step ahead at the enemy's feet level
      const checkX = enemy.facing === 1 ? enemy.x + enemy.width + 2 : enemy.x - 2;
      const checkY = enemy.y + enemy.height + 2;
      const c = Math.floor(checkX / TILE);
      const r = Math.floor(checkY / TILE);
      if (c < 0 || c >= LEVEL_W || r < 0 || r >= LEVEL_H) return false;
      return isSolid(level[r][c]);
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];

        // Handle death fade
        if (!e.alive) {
          e.deathTimer += dt;
          if (e.deathTimer >= 0.5) {
            enemies.splice(i, 1);
          }
          continue;
        }

        // Hit stun
        if (e.hitTimer > 0) {
          e.hitTimer -= dt;
          // Still apply gravity during hit stun
          e.vy += 980 * dt;
          e.y += e.vy * dt;
          resolveEnemyVertical(e);
          // Apply knockback decel
          e.x += e.vx * dt;
          resolveEnemyHorizontal(e);
          e.vx *= 0.9;
          continue;
        }

        // Guard-specific AI: detection and attack
        if (e.type === 'guard') {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const absDx = Math.abs(dx);
          const absDy = Math.abs(dy);

          // Update attack timer
          if (e.attacking) {
            e.attackTimer += dt;
            if (e.attackTimer >= e.attackDuration) {
              e.attacking = false;
              e.attackTimer = e.attackCooldown; // start cooldown
            }
          } else if (e.attackTimer > 0) {
            e.attackTimer -= dt;
            if (e.attackTimer < 0) e.attackTimer = 0;
          }

          // Detection: within 150px horizontal and 64px vertical
          e.detecting = absDx < 150 && absDy < 64 && player.alive !== false;

          if (e.detecting) {
            // Face the player
            e.facing = dx > 0 ? 1 : -1;

            if (absDx < 40) {
              // In attack range: stop and swing sword
              e.vx = 0;
              if (!e.attacking && e.attackTimer <= 0) {
                e.attacking = true;
                e.attackTimer = 0;
                // Update sword hitbox position
                e.swordHitbox.x = e.facing === 1 ? e.x + e.width : e.x - 30;
                e.swordHitbox.y = e.y + 8;
              }
            } else {
              // Chase the player
              e.vx = e.facing * e.speed;
              e.attacking = false;
            }
          } else {
            // Patrol AI (same as thug)
            e.detecting = false;
            e.attacking = false;
            e.vx = e.facing * e.speed;

            if (e.x <= e.patrolLeft) {
              e.facing = 1;
              e.x = e.patrolLeft;
            } else if (e.x + e.width >= e.patrolRight) {
              e.facing = -1;
              e.x = e.patrolRight - e.width;
            }
          }

          // Update sword hitbox each frame while attacking
          if (e.attacking) {
            e.swordHitbox.x = e.facing === 1 ? e.x + e.width : e.x - 30;
            e.swordHitbox.y = e.y + 8;
          }
        } else {
          // Thug patrol AI
          e.vx = e.facing * e.speed;

          // Reverse at patrol bounds
          if (e.x <= e.patrolLeft) {
            e.facing = 1;
            e.x = e.patrolLeft;
          } else if (e.x + e.width >= e.patrolRight) {
            e.facing = -1;
            e.x = e.patrolRight - e.width;
          }
        }

        // Don't walk off edges
        if (e.onGround && !hasGroundAhead(e)) {
          e.facing *= -1;
          e.vx = 0;
        }

        // Apply gravity
        e.vy += 980 * dt;

        // Move
        e.x += e.vx * dt;
        resolveEnemyHorizontal(e);
        e.y += e.vy * dt;
        resolveEnemyVertical(e);

        // Update animation
        const spriteFrames = e.type === 'guard' ? GUARD_SPRITE_FRAMES : THUG_SPRITE_FRAMES;
        if (e.type === 'guard' && e.detecting && !e.attacking) {
          e.anim.state = 'alert';
        } else if (e.hitTimer > 0) {
          e.anim.state = 'hit';
        } else {
          e.anim.state = 'walk';
        }
        e.anim.timer += dt;
        if (e.anim.timer >= 0.15) {
          e.anim.timer -= 0.15;
          e.anim.frame = (e.anim.frame + 1) % spriteFrames[e.anim.state].length;
        }
      }
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function updateCombat(dt) {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.alive) continue;

        // Player attack hits enemy
        if (player.attacking && player.attackTimer < 0.15) {
          const hb = player.attackHitbox;
          if (rectsOverlap(hb.x, hb.y, hb.width, hb.height, e.x, e.y, e.width, e.height)) {
            e.hp -= 1;
            e.hitTimer = 0.3;
            // Knockback away from player
            e.vx = (e.x > player.x ? 1 : -1) * 200;
            e.vy = -100;
            e.anim.state = 'hit';
            e.anim.frame = 0;

            if (e.hp <= 0) {
              e.alive = false;
              e.deathTimer = 0;
            }
          }
        }

        // Guard sword attack hits player
        if (e.type === 'guard' && e.attacking && e.alive && !player.invincible) {
          const sh = e.swordHitbox;
          if (rectsOverlap(player.x, player.y, player.width, player.height, sh.x, sh.y, sh.width, sh.height)) {
            player.hp -= 1;
            player.invincible = true;
            player.invincibleTimer = 1.5;
            player.vx = (player.x > e.x ? 1 : -1) * 250;
            player.vy = -150;

            if (player.hp <= 0) {
              player.hp = player.maxHp;
              respawnPlayer();
            }
          }
        }

        // Enemy touches player
        if (e.alive && !player.invincible) {
          if (rectsOverlap(player.x, player.y, player.width, player.height, e.x, e.y, e.width, e.height)) {
            player.hp -= 1;
            player.invincible = true;
            player.invincibleTimer = 1.5;
            // Knockback player away from enemy
            player.vx = (player.x > e.x ? 1 : -1) * 200;
            player.vy = -150;

            if (player.hp <= 0) {
              player.hp = player.maxHp;
              respawnPlayer();
            }
          }
        }
      }
    }

    function renderEnemies() {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        const screenX = Math.round(e.x - camera.x);
        const screenY = Math.round(e.y - camera.y);

        // Skip if off screen
        if (screenX + e.width < 0 || screenX > canvas.width || screenY + e.height < 0 || screenY > canvas.height) continue;

        ctx.save();

        if (!e.alive) {
          // Death fade out
          ctx.globalAlpha = Math.max(0, 1 - e.deathTimer / 0.5);
        } else if (e.hitTimer > 0) {
          // Flash white when hit
          ctx.globalAlpha = (Math.floor(e.hitTimer * 20) % 2 === 0) ? 0.4 : 1;
        }

        const spriteFrames = e.type === 'guard' ? GUARD_SPRITE_FRAMES : THUG_SPRITE_FRAMES;
        let animState = 'walk';
        if (e.hitTimer > 0) animState = 'hit';
        else if (e.type === 'guard' && e.detecting) animState = 'alert';
        const frames = spriteFrames[animState] || spriteFrames.walk;
        const spriteData = frames[e.anim.frame % frames.length];
        const flip = e.facing === -1;
        drawSprite(spriteData, screenX, screenY, flip);

        // Guard sword swing visual effect
        if (e.type === 'guard' && e.attacking && e.alive) {
          const progress = e.attackTimer / e.attackDuration;
          const alpha = Math.max(0, 1 - progress * 1.5);
          const cx = screenX + e.width / 2 + e.facing * (e.width / 2 + 12);
          const cy = screenY + e.height / 2 - 4;
          const radius = 16 + progress * 8;
          const startAngle = e.facing === 1 ? -Math.PI * 0.6 : Math.PI * 0.4;
          const endAngle = e.facing === 1 ? Math.PI * 0.6 : Math.PI * 1.6;

          ctx.save();
          ctx.globalAlpha = alpha * 0.8;
          ctx.strokeStyle = '#cc3333';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, startAngle, endAngle);
          ctx.stroke();

          ctx.globalAlpha = alpha * 0.4;
          ctx.strokeStyle = '#ff6644';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(cx, cy, radius * 0.6, startAngle, endAngle);
          ctx.stroke();
          ctx.restore();
        }

        ctx.restore();
      }
    }

    // --- Place thugs in the Slums (cols 0-69) ---
    // Ground is at row 17, so standing y = 17*32 - 36 = 508
    // Raised section cols 34-40 at row 15, y = 15*32 - 36 = 444
    // Wide raised area cols 54-62 at row 15, y = 15*32 - 36 = 444
    enemies.push(createThug(10 * 32, 17 * 32 - 36, 1 * 32, 12 * 32));    // patrol on ground cols 1-12
    enemies.push(createThug(25 * 32, 17 * 32 - 36, 22 * 32, 29 * 32));   // patrol on ground cols 22-29
    enemies.push(createThug(37 * 32, 15 * 32 - 36, 34 * 32, 40 * 32));   // on raised section cols 34-40
    enemies.push(createThug(57 * 32, 15 * 32 - 36, 54 * 32, 62 * 32));   // on wide raised area cols 54-62
    enemies.push(createThug(64 * 32, 17 * 32 - 36, 60 * 32, 67 * 32));   // near section end

    // --- Place guards in the Border (cols 70-139) ---
    // Ground at row 17, y = 17*32 - 40 = 504
    // Tall building cols 70-75, top at row 8, surface y = 8*32 - 40 = 216
    // Building cols 80-85, top at row 11, y = 11*32 - 40 = 312
    // Raised terrain cols 113-120, top at row 13, y = 13*32 - 40 = 376
    // Tall structure cols 124-130, top at row 7, y = 7*32 - 40 = 184
    enemies.push(createGuard(72 * 32, 8 * 32 - 40, 70 * 32, 75 * 32));    // on tall building roof
    enemies.push(createGuard(82 * 32, 11 * 32 - 40, 80 * 32, 85 * 32));   // on medium building roof
    enemies.push(createGuard(100 * 32, 10 * 32 - 40, 98 * 32, 103 * 32)); // on building cols 98-103
    enemies.push(createGuard(116 * 32, 13 * 32 - 40, 113 * 32, 120 * 32)); // on raised terrain

    function renderPlayer() {
      const screenX = Math.round(player.x - camera.x);
      const screenY = Math.round(player.y - camera.y);

      const frames = SPRITE_FRAMES[anim.state];
      const spriteData = frames[anim.frame % frames.length];
      const flip = player.facing === -1;

      // Flash during invincibility
      if (player.invincible && Math.floor(player.invincibleTimer * 10) % 2 === 0) {
        ctx.globalAlpha = 0.3;
      }
      drawSprite(spriteData, screenX, screenY, flip);
      ctx.globalAlpha = 1;

      // --- Knife slash visual effect ---
      if (player.attacking) {
        const progress = player.attackTimer / player.attackDuration; // 0 to 1
        const alpha = Math.max(0, 1 - progress * 1.5); // fades out
        const cx = screenX + player.width / 2 + player.facing * (player.width / 2 + 10);
        const cy = screenY + player.height / 2;
        const radius = 14 + progress * 6;
        const startAngle = player.facing === 1 ? -Math.PI * 0.6 : Math.PI * 0.4;
        const endAngle = player.facing === 1 ? Math.PI * 0.6 : Math.PI * 1.6;

        ctx.save();
        ctx.globalAlpha = alpha * 0.7;
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.stroke();

        // Inner brighter arc
        ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.6, startAngle, endAngle);
        ctx.stroke();
        ctx.restore();
      }
    }

    // --- Parallax Background ---
    // Generate procedural background element positions (seeded once)
    const bgElements = {
      // Far layer: Kredik Shaw spires + smokestacks
      farSpires: [],
      farStacks: [],
      // Mid layer: skaa shack rooftops
      midRoofs: [],
      midWindows: [],
      midSteam: [],
      // Near layer: fence posts, barrels, crates
      nearFences: [],
      nearBarrels: [],
      nearCrates: [],
    };

    // Repeating tile width for each layer (in virtual pixels)
    const BG_FAR_W = 1200;
    const BG_MID_W = 900;
    const BG_NEAR_W = 700;

    function seedRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }

    (function generateBgElements() {
      const rng = seedRandom(42);

      // Far layer: Kredik Shaw - a big central spiky palace + flanking spires
      // Main palace body
      bgElements.farSpires.push({ x: 300, w: 200, h: 280, spikes: 7 });
      // Flanking spires
      for (let i = 0; i < 5; i++) {
        bgElements.farSpires.push({
          x: rng() * BG_FAR_W,
          w: 15 + rng() * 30,
          h: 80 + rng() * 180,
          spikes: 1 + Math.floor(rng() * 3),
        });
      }
      // Smokestacks
      for (let i = 0; i < 3; i++) {
        bgElements.farStacks.push({
          x: rng() * BG_FAR_W,
          w: 12 + rng() * 10,
          h: 100 + rng() * 120,
        });
      }

      // Mid layer: skaa rooftops
      for (let i = 0; i < 12; i++) {
        const rx = rng() * BG_MID_W;
        const rw = 40 + rng() * 80;
        const rh = 25 + rng() * 40;
        bgElements.midRoofs.push({ x: rx, w: rw, h: rh, peaked: rng() > 0.5 });
        // Some roofs have lit windows
        if (rng() > 0.4) {
          const wx = rx + 8 + rng() * (rw - 20);
          const wy = rh - 10 - rng() * 10;
          bgElements.midWindows.push({ x: wx, y: wy, w: 5 + rng() * 6, h: 5 + rng() * 5, flicker: rng() * 6.28 });
        }
      }
      // Steam wisps
      for (let i = 0; i < 5; i++) {
        bgElements.midSteam.push({ x: rng() * BG_MID_W, phase: rng() * 6.28 });
      }

      // Near layer: fence posts, barrels, crates
      for (let i = 0; i < 15; i++) {
        bgElements.nearFences.push({ x: i * (BG_NEAR_W / 15) + rng() * 20 });
      }
      for (let i = 0; i < 6; i++) {
        bgElements.nearBarrels.push({ x: rng() * BG_NEAR_W, r: 8 + rng() * 6 });
      }
      for (let i = 0; i < 5; i++) {
        bgElements.nearCrates.push({ x: rng() * BG_NEAR_W, s: 12 + rng() * 14 });
      }
    })();

    let bgTime = 0;

    function renderBackground(dt) {
      bgTime += dt;
      const W = canvas.width;
      const H = canvas.height;

      // Sky gradient (replaces flat clear)
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#2a1520');
      skyGrad.addColorStop(0.3, '#3a2028');
      skyGrad.addColorStop(0.6, '#1e1520');
      skyGrad.addColorStop(1, '#12101a');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // --- Far layer (0.1x camera speed) ---
      const farOffX = -(camera.x * 0.1) % BG_FAR_W;
      const groundBase = H * 0.75; // background ground line

      ctx.save();
      // Draw two tiles for seamless wrapping
      for (let t = -1; t <= Math.ceil(W / BG_FAR_W) + 1; t++) {
        const ox = farOffX + t * BG_FAR_W;

        // Kredik Shaw spires
        bgElements.farSpires.forEach(sp => {
          const sx = ox + sp.x;
          if (sx + sp.w < -50 || sx > W + 50) return;
          const baseY = groundBase - 20;

          ctx.fillStyle = '#1a0f1a';
          // Main body
          ctx.fillRect(sx, baseY - sp.h * 0.4, sp.w, sp.h * 0.4);

          // Spikes on top
          for (let s = 0; s < sp.spikes; s++) {
            const spikeX = sx + (sp.w / (sp.spikes + 1)) * (s + 1);
            const spikeH = sp.h * (0.4 + Math.random() * 0.2);
            ctx.beginPath();
            ctx.moveTo(spikeX - 6, baseY - sp.h * 0.4);
            ctx.lineTo(spikeX, baseY - spikeH);
            ctx.lineTo(spikeX + 6, baseY - sp.h * 0.4);
            ctx.fill();
          }
        });

        // Smokestacks
        bgElements.farStacks.forEach(st => {
          const sx = ox + st.x;
          if (sx + st.w < -20 || sx > W + 20) return;
          const baseY = groundBase - 20;

          ctx.fillStyle = '#1a0f1a';
          ctx.fillRect(sx, baseY - st.h, st.w, st.h);

          // Orange glow at top
          const glow = ctx.createRadialGradient(sx + st.w / 2, baseY - st.h, 2, sx + st.w / 2, baseY - st.h, 15 + Math.sin(bgTime * 2 + st.x) * 5);
          glow.addColorStop(0, 'rgba(255, 120, 40, 0.6)');
          glow.addColorStop(1, 'rgba(255, 80, 20, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(sx + st.w / 2, baseY - st.h, 18, 0, Math.PI * 2);
          ctx.fill();
        });
      }
      ctx.restore();

      // --- Mid layer (0.3x camera speed) ---
      const midOffX = -(camera.x * 0.3) % BG_MID_W;
      const midBase = H * 0.82;

      ctx.save();
      for (let t = -1; t <= Math.ceil(W / BG_MID_W) + 1; t++) {
        const ox = midOffX + t * BG_MID_W;

        // Rooftops
        bgElements.midRoofs.forEach(rf => {
          const rx = ox + rf.x;
          if (rx + rf.w < -20 || rx > W + 20) return;
          const ry = midBase;

          ctx.fillStyle = '#221a25';
          if (rf.peaked) {
            // Peaked roof
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx + rf.w / 2, ry - rf.h);
            ctx.lineTo(rx + rf.w, ry);
            ctx.closePath();
            ctx.fill();
            // Wall below
            ctx.fillRect(rx + 5, ry, rf.w - 10, 30);
          } else {
            // Flat roof building
            ctx.fillRect(rx, ry - rf.h, rf.w, rf.h + 30);
          }
        });

        // Lit windows
        bgElements.midWindows.forEach(win => {
          const wx = ox + win.x;
          if (wx < -20 || wx > W + 20) return;
          const wy = midBase - win.y;

          // Flicker
          const brightness = 0.6 + 0.4 * Math.sin(bgTime * 3 + win.flicker);
          const alpha = 0.4 + brightness * 0.5;
          ctx.fillStyle = `rgba(255, 180, 60, ${alpha})`;
          ctx.fillRect(wx, wy, win.w, win.h);

          // Glow around window
          ctx.fillStyle = `rgba(255, 150, 40, ${alpha * 0.2})`;
          ctx.fillRect(wx - 3, wy - 3, win.w + 6, win.h + 6);
        });

        // Steam wisps
        bgElements.midSteam.forEach(st => {
          const sx = ox + st.x;
          if (sx < -30 || sx > W + 30) return;

          ctx.strokeStyle = 'rgba(150, 140, 160, 0.15)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          for (let i = 0; i < 30; i++) {
            const py = midBase - 40 - i * 3;
            const px = sx + Math.sin(bgTime * 0.8 + st.phase + i * 0.3) * 12;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.stroke();
        });
      }
      ctx.restore();

      // --- Near layer (0.6x camera speed) ---
      const nearOffX = -(camera.x * 0.6) % BG_NEAR_W;
      const nearBase = H * 0.88;

      ctx.save();
      for (let t = -1; t <= Math.ceil(W / BG_NEAR_W) + 1; t++) {
        const ox = nearOffX + t * BG_NEAR_W;

        // Fence posts
        ctx.fillStyle = '#0f0a12';
        bgElements.nearFences.forEach(fp => {
          const fx = ox + fp.x;
          if (fx < -10 || fx > W + 10) return;
          ctx.fillRect(fx, nearBase - 30, 3, 35);
        });

        // Fence rail connecting posts
        ctx.strokeStyle = '#0f0a12';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ox, nearBase - 18);
        ctx.lineTo(ox + BG_NEAR_W, nearBase - 18);
        ctx.stroke();

        // Barrels
        bgElements.nearBarrels.forEach(br => {
          const bx = ox + br.x;
          if (bx < -20 || bx > W + 20) return;
          ctx.fillStyle = '#0d0810';
          ctx.beginPath();
          ctx.ellipse(bx, nearBase - br.r, br.r, br.r * 1.2, 0, 0, Math.PI * 2);
          ctx.fill();
          // Rim highlight
          ctx.strokeStyle = '#1a1220';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(bx, nearBase - br.r, br.r, br.r * 0.4, 0, 0, Math.PI * 2);
          ctx.stroke();
        });

        // Crates
        bgElements.nearCrates.forEach(cr => {
          const cx = ox + cr.x;
          if (cx < -20 || cx > W + 20) return;
          ctx.fillStyle = '#0d0810';
          ctx.fillRect(cx, nearBase - cr.s, cr.s, cr.s);
          // Cross detail
          ctx.strokeStyle = '#1a1220';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(cx, nearBase - cr.s);
          ctx.lineTo(cx + cr.s, nearBase);
          ctx.moveTo(cx + cr.s, nearBase - cr.s);
          ctx.lineTo(cx, nearBase);
          ctx.stroke();
        });
      }
      ctx.restore();
    }

    // --- Ash Particle System ---
    const ASH_COUNT = 80;
    const EMBER_COUNT = 10;
    const particles = [];

    function initParticles() {
      for (let i = 0; i < ASH_COUNT + EMBER_COUNT; i++) {
        particles.push(createParticle(i >= ASH_COUNT, true));
      }
    }

    function createParticle(isEmber, randomY) {
      const colors = isEmber
        ? ['#ff6633', '#ff4422', '#ff5533', '#ee4411']
        : ['#999', '#aaa', '#bbb', '#777', '#888'];
      return {
        x: Math.random() * canvas.width,
        y: randomY ? Math.random() * canvas.height : -Math.random() * 20,
        speed: isEmber ? (25 + Math.random() * 40) : (20 + Math.random() * 40),
        size: isEmber ? (2 + Math.random() * 2) : (1 + Math.random() * 2),
        color: colors[Math.floor(Math.random() * colors.length)],
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.5 + Math.random() * 1.5,
        wobbleAmp: 10 + Math.random() * 25,
        drift: (Math.random() - 0.5) * 15,
        isEmber: isEmber,
        alpha: isEmber ? (0.7 + Math.random() * 0.3) : (0.3 + Math.random() * 0.5),
      };
    }

    function updateParticles(dt) {
      const W = canvas.width;
      const H = canvas.height;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.y += p.speed * dt;
        p.x += (Math.sin(bgTime * p.wobbleSpeed + p.wobblePhase) * p.wobbleAmp * dt) + p.drift * dt;

        // Wrap around screen edges
        if (p.y > H + 10) {
          p.y = -10;
          p.x = Math.random() * W;
        }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
      }
    }

    function renderParticles() {
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    initParticles();

    // Initialize camera to player start
    camera.x = Math.max(0, player.x - canvas.width / 3);
    camera.y = Math.max(0, player.y - canvas.height / 2);

    let lastTime = 0;
    function gameLoop(timestamp) {
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      const safeDt = Math.min(dt, 0.1);

      // Update
      updatePlayer(safeDt);
      updateEnemies(safeDt);
      updateCombat(safeDt);
      updateAnimation(safeDt);
      updateCamera();

      // Clear + background (sky gradient replaces flat clear)
      renderBackground(safeDt);

      // Render tiles and player
      renderTiles();
      renderEnemies();
      renderPlayer();

      // Ash particles (screen-space, in front of everything except HUD)
      updateParticles(safeDt);
      renderParticles();

      // HUD (not affected by camera)
      ctx.fillStyle = '#666';
      ctx.font = '12px monospace';
      const fps = safeDt > 0 ? Math.round(1 / safeDt) : '--';
      ctx.fillText(`FPS: ${fps}`, 10, 20);

      // Input debug display
      const inputNames = ['left', 'right', 'jump', 'attack', 'luck'];
      const inputY = 40;
      inputNames.forEach((name, i) => {
        const active = input[name];
        ctx.fillStyle = active ? '#4ade80' : '#333';
        ctx.fillRect(10 + i * 60, inputY, 50, 20);
        ctx.fillStyle = active ? '#000' : '#666';
        ctx.font = '11px monospace';
        ctx.fillText(name, 14 + i * 60, inputY + 14);
      });

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
