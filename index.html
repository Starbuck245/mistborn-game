    // --- Render falling ash clumps ---
    function renderAshClumps() {
      for (let i = 0; i < ashClumps.length; i++) {
        const ac = ashClumps[i];
        const sx = ac.x - camera.x;
        const sy = ac.y - camera.y;

        // Warning shadow on ground below
        const shadowY = ac.groundY - camera.y;
        const distToGround = ac.groundY - ac.y;
        if (distToGround > 0 && distToGround < 300) {
          const shadowAlpha = Math.max(0, 0.4 * (1 - distToGround / 300));
          const shadowSize = 6 + 8 * (1 - distToGround / 300);
          ctx.save();
          ctx.globalAlpha = shadowAlpha;
          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.ellipse(sx + ac.width / 2, shadowY, shadowSize, shadowSize * 0.3, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // The ash clump itself
        ctx.save();
        ctx.fillStyle = '#3a3a3a';
        ctx.beginPath();
        ctx.arc(sx + ac.width / 2, sy + ac.height / 2, ac.width / 2, 0, Math.PI * 2);
        ctx.fill();
        // Darker core
        ctx.fillStyle = '#2a2a2a';
        ctx.beginPath();
        ctx.arc(sx + ac.width / 2 - 1, sy + ac.height / 2 - 1, ac.width / 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function renderSoothedIndicators() {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.soothed || !e.alive) continue;
        const screenX = Math.round(e.x - camera.x);
        const screenY = Math.round(e.y - camera.y);

        // Blue tint overlay on enemy
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#4466cc';
        ctx.fillRect(screenX, screenY, e.width, e.height);
        ctx.restore();

        // Swirling particles above head
        const t = performance.now() / 1000;
        const cx = screenX + e.width / 2;
        const cy = screenY - 8;
        for (let p = 0; p < 3; p++) {
          const angle = t * 3 + (p * Math.PI * 2 / 3);
          const px = cx + Math.cos(angle) * 6;
          const py = cy + Math.sin(angle * 0.7) * 3 - 2;
          ctx.save();
          ctx.globalAlpha = 0.7;
          ctx.fillStyle = '#6688ff';
          ctx.beginPath();
          ctx.arc(px, py, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // Confused indicator "?" or stars
        ctx.save();
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#8888ff';
        ctx.font = '10px monospace';
        ctx.fillText('?', cx - 3, screenY - 14);
        ctx.restore();
      }
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];

        // Handle death fade
        if (!e.alive) {
          e.deathTimer += dt;
          if (e.deathTimer >= 0.5) {
            enemies.splice(i, 1);
          }
          continue;
        }

        // Soothed state: freeze enemy
        if (e.soothed) {
          e.sootheTimer -= dt;
          e.vx = 0;
          if (e.sootheTimer <= 0) {
            e.soothed = false;
            e.sootheTimer = 0;
          }
          // Still apply gravity while soothed
          e.vy += 980 * dt;
          e.y += e.vy * dt;
          resolveEnemyVertical(e);
          continue;
        }

        // Hit stun
        if (e.hitTimer > 0) {
          e.hitTimer -= dt;
          // Still apply gravity during hit stun
          e.vy += 980 * dt;
          e.y += e.vy * dt;
          resolveEnemyVertical(e);
          // Apply knockback decel
          e.x += e.vx * dt;
          resolveEnemyHorizontal(e);
          e.vx *= 0.9;
          continue;
        }

        // Guard-specific AI: detection and attack
        if (e.type === 'guard') {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const absDx = Math.abs(dx);
          const absDy = Math.abs(dy);

          // Update attack timer
          if (e.attacking) {
            e.attackTimer += dt;
            if (e.attackTimer >= e.attackDuration) {
              e.attacking = false;
              e.attackTimer = e.attackCooldown; // start cooldown
            }
          } else if (e.attackTimer > 0) {
            e.attackTimer -= dt;
            if (e.attackTimer < 0) e.attackTimer = 0;
          }

          // Detection: within 150px horizontal and 64px vertical
          const wasDetecting = e.detecting;
          e.detecting = absDx < 150 && absDy < 64 && player.alive !== false;

          if (e.detecting && !wasDetecting) {
            playSound('guardAlert');
          }
          if (e.detecting) {
            // Face the player
            e.facing = dx > 0 ? 1 : -1;

            if (absDx < 40) {
              // In attack range: stop and swing sword
              e.vx = 0;
              if (!e.attacking && e.attackTimer <= 0) {
                e.attacking = true;
                e.attackTimer = 0;
                // Update sword hitbox position
                e.swordHitbox.x = e.facing === 1 ? e.x + e.width : e.x - 30;
                e.swordHitbox.y = e.y + 8;
              }
            } else {
              // Chase the player
              e.vx = e.facing * e.speed;
              e.attacking = false;
            }
          } else {
            // Patrol AI (same as thug)
            e.detecting = false;
            e.attacking = false;
            e.vx = e.facing * e.speed;

            if (e.x <= e.patrolLeft) {
              e.facing = 1;
              e.x = e.patrolLeft;
            } else if (e.x + e.width >= e.patrolRight) {
              e.facing = -1;
              e.x = e.patrolRight - e.width;
            }
          }

          // Update sword hitbox each frame while attacking
          if (e.attacking) {
            e.swordHitbox.x = e.facing === 1 ? e.x + e.width : e.x - 30;
            e.swordHitbox.y = e.y + 8;
          }
        } else {
          // Thug patrol AI
          e.vx = e.facing * e.speed;

          // Reverse at patrol bounds
          if (e.x <= e.patrolLeft) {
            e.facing = 1;
            e.x = e.patrolLeft;
          } else if (e.x + e.width >= e.patrolRight) {
            e.facing = -1;
            e.x = e.patrolRight - e.width;
          }
        }

        // Don't walk off edges
        if (e.onGround && !hasGroundAhead(e)) {
          e.facing *= -1;
          e.vx = 0;
        }

        // Apply gravity
        e.vy += 980 * dt;

        // Move
        e.x += e.vx * dt;
        resolveEnemyHorizontal(e);
        e.y += e.vy * dt;
        resolveEnemyVertical(e);

        // Update animation
        const spriteFrames = e.type === 'guard' ? GUARD_SPRITE_FRAMES : THUG_SPRITE_FRAMES;
        if (e.type === 'guard' && e.detecting && !e.attacking) {
          e.anim.state = 'alert';
        } else if (e.hitTimer > 0) {
          e.anim.state = 'hit';
        } else {
          e.anim.state = 'walk';
        }
        e.anim.timer += dt;
        if (e.anim.timer >= 0.15) {
          e.anim.timer -= 0.15;
          e.anim.frame = (e.anim.frame + 1) % spriteFrames[e.anim.state].length;
        }
      }
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function updateCombat(dt) {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.alive) continue;

        // Player attack hits enemy
        if (player.attacking && player.attackTimer < 0.15) {
          const hb = player.attackHitbox;
          if (rectsOverlap(hb.x, hb.y, hb.width, hb.height, e.x, e.y, e.width, e.height)) {
            e.hp -= 1;
            e.hitTimer = 0.3;
            // Knockback away from player
            e.vx = (e.x > player.x ? 1 : -1) * 200;
            e.vy = -100;
            e.anim.state = 'hit';
            e.anim.frame = 0;
            playSound('enemyHit');

            if (e.hp <= 0) {
              e.alive = false;
              e.deathTimer = 0;
              playSound('enemyDeath');
            }
          }
        }

        // Guard sword attack hits player
        if (e.type === 'guard' && e.attacking && e.alive && !player.invincible) {
          const sh = e.swordHitbox;
          if (rectsOverlap(player.x, player.y, player.width, player.height, sh.x, sh.y, sh.width, sh.height)) {
            player.hp -= 1;
            player.invincible = true;
            player.invincibleTimer = 1.5;
            player.vx = (player.x > e.x ? 1 : -1) * 250;
            player.vy = -150;
            playSound('playerHurt');

            if (player.hp <= 0) {
              player.hp = player.maxHp;
              respawnPlayer();
            }
          }
        }

        // Enemy touches player
        if (e.alive && !player.invincible) {
          if (rectsOverlap(player.x, player.y, player.width, player.height, e.x, e.y, e.width, e.height)) {
            player.hp -= 1;
            player.invincible = true;
            player.invincibleTimer = 1.5;
            // Knockback player away from enemy
            player.vx = (player.x > e.x ? 1 : -1) * 200;
            player.vy = -150;
            playSound('playerHurt');

            if (player.hp <= 0) {
              player.hp = player.maxHp;
              respawnPlayer();
            }
          }
        }
      }
    }

    function renderEnemies() {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        const screenX = Math.round(e.x - camera.x);
        const screenY = Math.round(e.y - camera.y);

        // Skip if off screen
        if (screenX + e.width < 0 || screenX > canvas.width || screenY + e.height < 0 || screenY > canvas.height) continue;

        ctx.save();

        if (!e.alive) {
          // Death fade out
          ctx.globalAlpha = Math.max(0, 1 - e.deathTimer / 0.5);
        } else if (e.hitTimer > 0) {
          // Flash white when hit
          ctx.globalAlpha = (Math.floor(e.hitTimer * 20) % 2 === 0) ? 0.4 : 1;
        }

        const spriteFrames = e.type === 'guard' ? GUARD_SPRITE_FRAMES : THUG_SPRITE_FRAMES;
        let animState = 'walk';
        if (e.hitTimer > 0) animState = 'hit';
        else if (e.type === 'guard' && e.detecting) animState = 'alert';
        const frames = spriteFrames[animState] || spriteFrames.walk;
        const spriteData = frames[e.anim.frame % frames.length];
        const flip = e.facing === -1;
        drawSprite(spriteData, screenX, screenY, flip);

        // Guard sword swing visual effect
        if (e.type === 'guard' && e.attacking && e.alive) {
          const progress = e.attackTimer / e.attackDuration;
          const alpha = Math.max(0, 1 - progress * 1.5);
          const cx = screenX + e.width / 2 + e.facing * (e.width / 2 + 12);
          const cy = screenY + e.height / 2 - 4;
          const radius = 16 + progress * 8;
          const startAngle = e.facing === 1 ? -Math.PI * 0.6 : Math.PI * 0.4;
          const endAngle = e.facing === 1 ? Math.PI * 0.6 : Math.PI * 1.6;

          ctx.save();
          ctx.globalAlpha = alpha * 0.8;
          ctx.strokeStyle = '#cc3333';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, startAngle, endAngle);
          ctx.stroke();

          ctx.globalAlpha = alpha * 0.4;
          ctx.strokeStyle = '#ff6644';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(cx, cy, radius * 0.6, startAngle, endAngle);
          ctx.stroke();
          ctx.restore();
        }

        ctx.restore();
      }
    }

    // --- Place thugs in the Slums (cols 0-69) ---
    // Ground is at row 17, so standing y = 17*32 - 36 = 508
    // Raised section cols 34-40 at row 15, y = 15*32 - 36 = 444
    // Wide raised area cols 54-62 at row 15, y = 15*32 - 36 = 444
    enemies.push(createThug(10 * 32, 17 * 32 - 36, 1 * 32, 12 * 32));    // patrol on ground cols 1-12
    enemies.push(createThug(25 * 32, 17 * 32 - 36, 22 * 32, 29 * 32));   // patrol on ground cols 22-29
    enemies.push(createThug(37 * 32, 15 * 32 - 36, 34 * 32, 40 * 32));   // on raised section cols 34-40
    enemies.push(createThug(57 * 32, 15 * 32 - 36, 54 * 32, 62 * 32));   // on wide raised area cols 54-62
    enemies.push(createThug(64 * 32, 17 * 32 - 36, 60 * 32, 67 * 32));   // near section end

    // --- Place guards in the Border (cols 70-139) ---
    // Ground at row 17, y = 17*32 - 40 = 504
    // Tall building cols 70-75, top at row 8, surface y = 8*32 - 40 = 216
    // Building cols 80-85, top at row 11, y = 11*32 - 40 = 312
    // Raised terrain cols 113-120, top at row 13, y = 13*32 - 40 = 376
    // Tall structure cols 124-130, top at row 7, y = 7*32 - 40 = 184
    enemies.push(createGuard(72 * 32, 8 * 32 - 40, 70 * 32, 75 * 32));    // on tall building roof
    enemies.push(createGuard(82 * 32, 11 * 32 - 40, 80 * 32, 85 * 32));   // on medium building roof
    enemies.push(createGuard(100 * 32, 10 * 32 - 40, 98 * 32, 103 * 32)); // on building cols 98-103
    enemies.push(createGuard(116 * 32, 13 * 32 - 40, 113 * 32, 120 * 32)); // on raised terrain

    // --- Dead End Guards (cols 165-195) ---
    // These guards corner the player in the dead end
    const deadEndGuard1 = createGuard(168 * 32, 14 * 32 - 40, 165 * 32, 175 * 32);
    const deadEndGuard2 = createGuard(175 * 32, 14 * 32 - 40, 170 * 32, 180 * 32);
    const deadEndGuard3 = createGuard(182 * 32, 13 * 32 - 40, 178 * 32, 190 * 32);
    enemies.push(deadEndGuard1);
    enemies.push(deadEndGuard2);
    enemies.push(deadEndGuard3);
    deadEndGuards = [deadEndGuard1, deadEndGuard2, deadEndGuard3];

    function renderPlayer() {
      const screenX = Math.round(player.x - camera.x);
      const screenY = Math.round(player.y - camera.y);

      const frames = SPRITE_FRAMES[anim.state];
      const spriteData = frames[anim.frame % frames.length];
      const flip = player.facing === -1;

      // Flash during invincibility
      if (player.invincible && Math.floor(player.invincibleTimer * 10) % 2 === 0) {
        ctx.globalAlpha = 0.3;
      }
      drawSprite(spriteData, screenX, screenY, flip);
      ctx.globalAlpha = 1;

      // --- Knife slash visual effect ---
      if (player.attacking) {
        const progress = player.attackTimer / player.attackDuration; // 0 to 1
        const alpha = Math.max(0, 1 - progress * 1.5); // fades out
        const cx = screenX + player.width / 2 + player.facing * (player.width / 2 + 10);
        const cy = screenY + player.height / 2;
        const radius = 14 + progress * 6;
        const startAngle = player.facing === 1 ? -Math.PI * 0.6 : Math.PI * 0.4;
        const endAngle = player.facing === 1 ? Math.PI * 0.6 : Math.PI * 1.6;

        ctx.save();
        ctx.globalAlpha = alpha * 0.7;
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.stroke();

        // Inner brighter arc
        ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.6, startAngle, endAngle);
        ctx.stroke();
        ctx.restore();
      }
    }

    // --- Parallax Background ---
    // Generate procedural background element positions (seeded once)
    const bgElements = {
      // Far layer: Kredik Shaw spires + smokestacks
      farSpires: [],
      farStacks: [],
      // Mid layer: skaa shack rooftops
      midRoofs: [],
      midWindows: [],
      midSteam: [],
      // Near layer: fence posts, barrels, crates
      nearFences: [],
      nearBarrels: [],
      nearCrates: [],
    };

    // Repeating tile width for each layer (in virtual pixels)
    const BG_FAR_W = 1200;
    const BG_MID_W = 900;
    const BG_NEAR_W = 700;

    function seedRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }

    (function generateBgElements() {
      const rng = seedRandom(42);

      // Far layer: Kredik Shaw - a big central spiky palace + flanking spires
      // Main palace body
      bgElements.farSpires.push({ x: 300, w: 200, h: 280, spikes: 7 });
      // Flanking spires
      for (let i = 0; i < 5; i++) {
        bgElements.farSpires.push({
          x: rng() * BG_FAR_W,
          w: 15 + rng() * 30,
          h: 80 + rng() * 180,
          spikes: 1 + Math.floor(rng() * 3),
        });
      }
      // Smokestacks
      for (let i = 0; i < 3; i++) {
        bgElements.farStacks.push({
          x: rng() * BG_FAR_W,
          w: 12 + rng() * 10,
          h: 100 + rng() * 120,
        });
      }

      // Mid layer: skaa rooftops
      for (let i = 0; i < 12; i++) {
        const rx = rng() * BG_MID_W;
        const rw = 40 + rng() * 80;
        const rh = 25 + rng() * 40;
        bgElements.midRoofs.push({ x: rx, w: rw, h: rh, peaked: rng() > 0.5 });
        // Some roofs have lit windows
        if (rng() > 0.4) {
          const wx = rx + 8 + rng() * (rw - 20);
          const wy = rh - 10 - rng() * 10;
          bgElements.midWindows.push({ x: wx, y: wy, w: 5 + rng() * 6, h: 5 + rng() * 5, flicker: rng() * 6.28 });
        }
      }
      // Steam wisps
      for (let i = 0; i < 5; i++) {
        bgElements.midSteam.push({ x: rng() * BG_MID_W, phase: rng() * 6.28 });
      }

      // Near layer: fence posts, barrels, crates
      for (let i = 0; i < 15; i++) {
        bgElements.nearFences.push({ x: i * (BG_NEAR_W / 15) + rng() * 20 });
      }
      for (let i = 0; i < 6; i++) {
        bgElements.nearBarrels.push({ x: rng() * BG_NEAR_W, r: 8 + rng() * 6 });
      }
      for (let i = 0; i < 5; i++) {
        bgElements.nearCrates.push({ x: rng() * BG_NEAR_W, s: 12 + rng() * 14 });
      }
    })();

    let bgTime = 0;

    function renderBackground(dt) {
      bgTime += dt;
      const W = canvas.width;
      const H = canvas.height;

      // Sky gradient (replaces flat clear)
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#2a1520');
      skyGrad.addColorStop(0.3, '#3a2028');
      skyGrad.addColorStop(0.6, '#1e1520');
      skyGrad.addColorStop(1, '#12101a');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // --- Far layer (0.1x camera speed) ---
      const farOffX = -(camera.x * 0.1) % BG_FAR_W;
      const groundBase = H * 0.75; // background ground line

      ctx.save();
      // Draw two tiles for seamless wrapping
      for (let t = -1; t <= Math.ceil(W / BG_FAR_W) + 1; t++) {
        const ox = farOffX + t * BG_FAR_W;

        // Kredik Shaw spires
        bgElements.farSpires.forEach(sp => {
          const sx = ox + sp.x;
          if (sx + sp.w < -50 || sx > W + 50) return;
          const baseY = groundBase - 20;

          ctx.fillStyle = '#1a0f1a';
          // Main body
          ctx.fillRect(sx, baseY - sp.h * 0.4, sp.w, sp.h * 0.4);

          // Spikes on top
          for (let s = 0; s < sp.spikes; s++) {
            const spikeX = sx + (sp.w / (sp.spikes + 1)) * (s + 1);
            const spikeH = sp.h * (0.4 + Math.random() * 0.2);
            ctx.beginPath();
            ctx.moveTo(spikeX - 6, baseY - sp.h * 0.4);
            ctx.lineTo(spikeX, baseY - spikeH);
            ctx.lineTo(spikeX + 6, baseY - sp.h * 0.4);
            ctx.fill();
          }
        });

        // Smokestacks
        bgElements.farStacks.forEach(st => {
          const sx = ox + st.x;
          if (sx + st.w < -20 || sx > W + 20) return;
          const baseY = groundBase - 20;

          ctx.fillStyle = '#1a0f1a';
          ctx.fillRect(sx, baseY - st.h, st.w, st.h);

          // Orange glow at top
          const glow = ctx.createRadialGradient(sx + st.w / 2, baseY - st.h, 2, sx + st.w / 2, baseY - st.h, 15 + Math.sin(bgTime * 2 + st.x) * 5);
          glow.addColorStop(0, 'rgba(255, 120, 40, 0.6)');
          glow.addColorStop(1, 'rgba(255, 80, 20, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(sx + st.w / 2, baseY - st.h, 18, 0, Math.PI * 2);
          ctx.fill();
        });
      }
      ctx.restore();

      // --- Mid layer (0.3x camera speed) ---
      const midOffX = -(camera.x * 0.3) % BG_MID_W;
      const midBase = H * 0.82;

      ctx.save();
      for (let t = -1; t <= Math.ceil(W / BG_MID_W) + 1; t++) {
        const ox = midOffX + t * BG_MID_W;

        // Rooftops
        bgElements.midRoofs.forEach(rf => {
          const rx = ox + rf.x;
          if (rx + rf.w < -20 || rx > W + 20) return;
          const ry = midBase;

          ctx.fillStyle = '#221a25';
          if (rf.peaked) {
            // Peaked roof
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx + rf.w / 2, ry - rf.h);
            ctx.lineTo(rx + rf.w, ry);
            ctx.closePath();
            ctx.fill();
            // Wall below
            ctx.fillRect(rx + 5, ry, rf.w - 10, 30);
          } else {
            // Flat roof building
            ctx.fillRect(rx, ry - rf.h, rf.w, rf.h + 30);
          }
        });

        // Lit windows
        bgElements.midWindows.forEach(win => {
          const wx = ox + win.x;
          if (wx < -20 || wx > W + 20) return;
          const wy = midBase - win.y;

          // Flicker
          const brightness = 0.6 + 0.4 * Math.sin(bgTime * 3 + win.flicker);
          const alpha = 0.4 + brightness * 0.5;
          ctx.fillStyle = `rgba(255, 180, 60, ${alpha})`;
          ctx.fillRect(wx, wy, win.w, win.h);

          // Glow around window
          ctx.fillStyle = `rgba(255, 150, 40, ${alpha * 0.2})`;
          ctx.fillRect(wx - 3, wy - 3, win.w + 6, win.h + 6);
        });

        // Steam wisps
        bgElements.midSteam.forEach(st => {
          const sx = ox + st.x;
          if (sx < -30 || sx > W + 30) return;

          ctx.strokeStyle = 'rgba(150, 140, 160, 0.15)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          for (let i = 0; i < 30; i++) {
            const py = midBase - 40 - i * 3;
            const px = sx + Math.sin(bgTime * 0.8 + st.phase + i * 0.3) * 12;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.stroke();
        });
      }
      ctx.restore();

      // --- Near layer (0.6x camera speed) ---
      const nearOffX = -(camera.x * 0.6) % BG_NEAR_W;
      const nearBase = H * 0.88;

      ctx.save();
      for (let t = -1; t <= Math.ceil(W / BG_NEAR_W) + 1; t++) {
        const ox = nearOffX + t * BG_NEAR_W;

        // Fence posts
        ctx.fillStyle = '#0f0a12';
        bgElements.nearFences.forEach(fp => {
          const fx = ox + fp.x;
          if (fx < -10 || fx > W + 10) return;
          ctx.fillRect(fx, nearBase - 30, 3, 35);
        });

        // Fence rail connecting posts
        ctx.strokeStyle = '#0f0a12';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ox, nearBase - 18);
        ctx.lineTo(ox + BG_NEAR_W, nearBase - 18);
        ctx.stroke();

        // Barrels
        bgElements.nearBarrels.forEach(br => {
          const bx = ox + br.x;
          if (bx < -20 || bx > W + 20) return;
          ctx.fillStyle = '#0d0810';
          ctx.beginPath();
          ctx.ellipse(bx, nearBase - br.r, br.r, br.r * 1.2, 0, 0, Math.PI * 2);
          ctx.fill();
          // Rim highlight
          ctx.strokeStyle = '#1a1220';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(bx, nearBase - br.r, br.r, br.r * 0.4, 0, 0, Math.PI * 2);
          ctx.stroke();
        });

        // Crates
        bgElements.nearCrates.forEach(cr => {
          const cx = ox + cr.x;
          if (cx < -20 || cx > W + 20) return;
          ctx.fillStyle = '#0d0810';
          ctx.fillRect(cx, nearBase - cr.s, cr.s, cr.s);
          // Cross detail
          ctx.strokeStyle = '#1a1220';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(cx, nearBase - cr.s);
          ctx.lineTo(cx + cr.s, nearBase);
          ctx.moveTo(cx + cr.s, nearBase - cr.s);
          ctx.lineTo(cx, nearBase);
          ctx.stroke();
        });
      }
      ctx.restore();
    }

    // --- Ash Particle System ---
    const ASH_COUNT = 80;
    const EMBER_COUNT = 10;
    const particles = [];

    function initParticles() {
      for (let i = 0; i < ASH_COUNT + EMBER_COUNT; i++) {
        particles.push(createParticle(i >= ASH_COUNT, true));
      }
    }

    function createParticle(isEmber, randomY) {
      const colors = isEmber
        ? ['#ff6633', '#ff4422', '#ff5533', '#ee4411']
        : ['#999', '#aaa', '#bbb', '#777', '#888'];
      return {
        x: Math.random() * canvas.width,
        y: randomY ? Math.random() * canvas.height : -Math.random() * 20,
        speed: isEmber ? (25 + Math.random() * 40) : (20 + Math.random() * 40),
        size: isEmber ? (2 + Math.random() * 2) : (1 + Math.random() * 2),
        color: colors[Math.floor(Math.random() * colors.length)],
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.5 + Math.random() * 1.5,
        wobbleAmp: 10 + Math.random() * 25,
        drift: (Math.random() - 0.5) * 15,
        isEmber: isEmber,
        alpha: isEmber ? (0.7 + Math.random() * 0.3) : (0.3 + Math.random() * 0.5),
      };
    }

    function updateParticles(dt) {
      const W = canvas.width;
      const H = canvas.height;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.y += p.speed * dt;
        p.x += (Math.sin(bgTime * p.wobbleSpeed + p.wobblePhase) * p.wobbleAmp * dt) + p.drift * dt;

        // Wrap around screen edges
        if (p.y > H + 10) {
          p.y = -10;
          p.x = Math.random() * W;
        }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
      }
    }

    function renderParticles() {
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    initParticles();

    // Initialize camera to player start
    camera.x = Math.max(0, player.x - canvas.width / 3);
    camera.y = Math.max(0, player.y - canvas.height / 2);

    // --- HUD Rendering ---
    function renderHUD() {
      // Top-left: Health vials
      const vialX = 15;
      const vialY = 15;
      for (let i = 0; i < player.maxHp; i++) {
        const x = vialX + i * 25;
        const y = vialY;
        const full = i < player.hp;
        const draining = (i === player.hp && player.vialDrainAnim > 0);

        if (full) {
          // Full vial - bright silver-blue
          ctx.fillStyle = '#aaccee';
          ctx.fillRect(x + 2, y + 4, 8, 12);
          ctx.fillRect(x + 3, y, 6, 5);
          ctx.fillStyle = '#889';
          ctx.fillRect(x + 4, y - 1, 4, 2);
          // Highlight
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.fillRect(x + 3, y + 5, 2, 8);
        } else if (draining) {
          // Draining animation
          const drainPct = player.vialDrainAnim;
          // Empty outline
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 2, y + 4, 8, 12);
          ctx.strokeRect(x + 3, y, 6, 5);
          // Partial fill from bottom
          const fillH = Math.floor(12 * drainPct);
          ctx.fillStyle = '#aaccee';
          ctx.globalAlpha = 0.7;
          ctx.fillRect(x + 2, y + 4 + (12 - fillH), 8, fillH);
          ctx.globalAlpha = 1;
          ctx.fillStyle = '#889';
          ctx.fillRect(x + 4, y - 1, 4, 2);
        } else {
          // Empty vial - dark outline
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 2, y + 4, 8, 12);
          ctx.strokeRect(x + 3, y, 6, 5);
          ctx.fillStyle = '#333';
          ctx.fillRect(x + 4, y - 1, 4, 2);
        }
      }

      // Top-right: Boxing (coin) count
      const coinX = canvas.width - 80;
      const coinY = 22;
      // Gold coin icon
      ctx.fillStyle = '#daa520';
      ctx.beginPath();
      ctx.arc(coinX, coinY, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c89418';
      ctx.beginPath();
      ctx.arc(coinX, coinY, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(coinX - 1, coinY - 1, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Count text
      ctx.fillStyle = '#fff';
      ctx.font = '14px monospace';
      ctx.fillText(` ${player.boxings}`, coinX + 10, coinY + 5);

      // Bottom-center: Luck cooldown bar
      const barW = 200;
      const barH = 6;
      const barX = (canvas.width - barW) / 2;
      const barY = canvas.height - 30;
      // Label
      ctx.fillStyle = '#9988bb';
      ctx.font = '10px monospace';
      ctx.fillText('LUCK', barX + barW / 2 - 14, barY - 4);
      // Background
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      // Fill
      if (player.luckCooldown <= 0) {
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(barX, barY, barW, barH);
      } else {
        const pct = 1 - (player.luckCooldown / player.luckMaxCooldown);
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(barX, barY, barW * pct, barH);
      }
      // Border
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);
    }

    // --- Typewriter Helper ---
    function typewriterUpdate(text, charIndex, charTimer, dt, speed) {
      charTimer += dt;
      while (charTimer >= speed && charIndex < text.length) {
        charTimer -= speed;
        charIndex++;
      }
      return { charIndex, charTimer };
    }

    // --- Opening Cutscene ---
    function updateOpening(dt) {
      openingTimer += dt;

      // Fade in over first second
      if (openingFadeIn < 1) {
        openingFadeIn = Math.min(1, openingFadeIn + dt);
      }

      // Fading out after key press
      if (openingFadingOut) {
        openingFadeOut += dt * 2; // fade to black in 0.5s
        if (openingFadeOut >= 1.5) {
          gameState = 'playing';
          openingFadingOut = false;
        }
        return;
      }

      // Any key to begin
      if (openingDone) {
        openingBlinkTimer += dt;
        if (anyKeyFlag && openingAnyKeyReady) {
          openingFadingOut = true;
          openingFadeOut = 0;
          anyKeyFlag = false;
        }
        if (!openingAnyKeyReady && openingTimer > 1) {
          openingAnyKeyReady = true;
          anyKeyFlag = false; // reset so they need a fresh press
        }
        return;
      }

      // Pause between lines
      if (openingPauseTimer > 0) {
        openingPauseTimer -= dt;
        if (openingPauseTimer <= 0) {
          openingLineIndex++;
          openingCharIndex = 0;
          openingCharTimer = 0;
          if (openingLineIndex >= openingLines.length) {
            openingDone = true;
            openingTimer = 0;
          }
        }
        return;
      }

      // Typewriter current line
      if (openingLineIndex < openingLines.length) {
        const line = openingLines[openingLineIndex];
        const tw = typewriterUpdate(line, openingCharIndex, openingCharTimer, dt, 0.04);
        openingCharIndex = tw.charIndex;
        openingCharTimer = tw.charTimer;

        // Build displayed lines
        openingDisplayedLines[openingLineIndex] = line.substring(0, openingCharIndex);

        // Line done? start pause
        if (openingCharIndex >= line.length) {
          openingPauseTimer = openingPauses[openingLineIndex] || 0.5;
        }
      }
    }

    function renderOpening() {
      // Black background
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw text
      ctx.save();
      ctx.globalAlpha = openingFadeIn;
      ctx.fillStyle = '#e8e0d0';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';

      const lineHeight = 28;
      const startY = canvas.height / 2 - (openingLines.length * lineHeight) / 2;

      for (let i = 0; i <= openingLineIndex && i < openingLines.length; i++) {
        const text = openingDisplayedLines[i] || '';
        if (text) {
          ctx.fillText(text, canvas.width / 2, startY + i * lineHeight);
        }
      }

      // "Press any key" blinking
      if (openingDone && openingAnyKeyReady) {
        const blink = Math.sin(openingBlinkTimer * 3) > 0;
        if (blink) {
          ctx.globalAlpha = 0.7;
          ctx.font = '14px monospace';
          ctx.fillText('Press any key to begin', canvas.width / 2, startY + openingLines.length * lineHeight + 40);
        }
      }

      ctx.restore();

      // Fade out overlay
      if (openingFadingOut) {
        const alpha = Math.min(openingFadeOut, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- Ending Cutscene ---
    const endingTexts = [
      "There was nowhere left to run.",
      "She didn't understand what she'd done. Only that it worked.",
      "Someone was watching."
    ];

    function updateEnding(dt) {
      endingTimer += dt;

      switch (endingPhase) {
        case 0: // Vignette darkens, first text
          endingVignetteAlpha = Math.min(0.6, endingVignetteAlpha + dt * 0.5);
          if (!endingDisplayedText && endingTimer > 0.5) {
            endingText = endingTexts[0];
            endingCharIndex = 0;
            endingCharTimer = 0;
            endingDisplayedText = ' '; // mark started
          }
          if (endingText) {
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 3) {
              endingPhase = 1;
              endingTimer = 0;
            }
          }
          break;

        case 1: // Luck pulse + guards flee
          endingPulseTimer += dt;
          // Create a big pulse effect at start
          if (endingTimer < 0.1) {
            effects.push({
              type: 'luckPulse',
              x: player.x + player.width / 2,
              y: player.y + player.height / 2,
              radius: 0,
              maxRadius: 300,
              timer: 0,
              duration: 1.5,
            });
          }
          // Make guards wander away
          if (!endingGuardsCleared) {
            for (const g of deadEndGuards) {
              if (g.alive) {
                g.soothed = true;
                g.sootheTimer = 999;
                g.detecting = false;
                g.facing = -1; // face left (away from dead end)
                g.x -= 80 * dt; // move them offscreen to the left
              }
            }
            if (endingTimer > 3) {
              endingGuardsCleared = true;
              // Remove them
              for (const g of deadEndGuards) {
                g.alive = false;
                g.deathTimer = 999;
              }
            }
          }
          if (endingTimer > 3.5) {
            endingPhase = 2;
            endingTimer = 0;
            endingText = endingTexts[1];
            endingCharIndex = 0;
            endingCharTimer = 0;
            endingDisplayedText = '';
          }
          break;

        case 2: // Second text
          {
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 3) {
              endingPhase = 3;
              endingTimer = 0;
              endingDisplayedText = '';
              // Store target for camera pan up
              endingCameraPanTarget = camera.y - 200;
            }
          }
          break;

        case 3: // Camera pans up to rooftop
          {
            const panDuration = 2;
            const t = Math.min(endingTimer / panDuration, 1);
            const eased = t * t * (3 - 2 * t); // smoothstep
            camera.y = camera.y + (endingCameraPanTarget - camera.y) * 0.03;
            if (endingTimer > panDuration) {
              endingPhase = 4;
              endingTimer = 0;
              endingText = endingTexts[2];
              endingCharIndex = 0;
              endingCharTimer = 0;
              endingDisplayedText = '';
            }
          }
          break;

        case 4: // Kelsier silhouette + "Someone was watching."
          {
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 3) {
              endingPhase = 5;
              endingTimer = 0;
            }
          }
          break;

        case 5: // Fade to black
          endingFadeAlpha = Math.min(1, endingFadeAlpha + dt * 0.5);
          if (endingTimer > 2) {
            gameState = 'complete';
          }
          break;
      }
    }

    function renderKelsierSilhouette() {
      // Draw Kelsier on the rooftop (around col 190, row 7 area)
      const kx = 190 * TILE - camera.x;
      const ky = 7 * TILE - camera.y - 48; // standing on rooftop

      ctx.save();
      ctx.fillStyle = '#0a0a12';

      // Body - broad shoulders, confident stance
      // Torso
      ctx.fillRect(kx - 10, ky + 16, 20, 20);
      // Shoulders (broad)
      ctx.fillRect(kx - 16, ky + 16, 32, 6);
      // Head
      ctx.beginPath();
      ctx.arc(kx, ky + 10, 8, 0, Math.PI * 2);
      ctx.fill();
      // Hair - messy spikes going up
      ctx.beginPath();
      ctx.moveTo(kx - 6, ky + 4);
      ctx.lineTo(kx - 3, ky - 6);
      ctx.lineTo(kx, ky + 2);
      ctx.lineTo(kx + 2, ky - 8);
      ctx.lineTo(kx + 5, ky + 1);
      ctx.lineTo(kx + 7, ky - 5);
      ctx.lineTo(kx + 8, ky + 4);
      ctx.closePath();
      ctx.fill();
      // Arms crossed
      ctx.fillRect(kx - 16, ky + 22, 12, 5);
      ctx.fillRect(kx + 4, ky + 22, 12, 5);
      // Forearms crossed over chest
      ctx.fillRect(kx - 8, ky + 26, 16, 4);
      // Legs
      ctx.fillRect(kx - 8, ky + 36, 7, 14);
      ctx.fillRect(kx + 1, ky + 36, 7, 14);
      // Mistcloak tails flowing
      ctx.beginPath();
      ctx.moveTo(kx - 16, ky + 22);
      ctx.lineTo(kx - 20, ky + 50);
      ctx.lineTo(kx - 14, ky + 46);
      ctx.lineTo(kx - 18, ky + 54);
      ctx.lineTo(kx - 10, ky + 36);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(kx + 16, ky + 22);
      ctx.lineTo(kx + 20, ky + 50);
      ctx.lineTo(kx + 14, ky + 46);
      ctx.lineTo(kx + 18, ky + 54);
      ctx.lineTo(kx + 10, ky + 36);
      ctx.fill();

      // Glint for smile - small bright highlight
      ctx.fillStyle = '#e8e0d0';
      ctx.globalAlpha = 0.5 + Math.sin(endingTimer * 2) * 0.3;
      ctx.fillRect(kx - 3, ky + 13, 6, 1);

      ctx.restore();
    }

    function renderEndingOverlay() {
      // Vignette
      if (endingVignetteAlpha > 0) {
        ctx.save();
        const gradient = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, canvas.width * 0.2,
          canvas.width / 2, canvas.height / 2, canvas.width * 0.7
        );
        gradient.addColorStop(0, 'rgba(0,0,0,0)');
        gradient.addColorStop(1, `rgba(0,0,0,${endingVignetteAlpha})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      // Blue-purple pulse during phase 1
      if (endingPhase === 1 && endingPulseTimer < 1.5) {
        const pulseAlpha = Math.max(0, 0.3 - endingPulseTimer * 0.2);
        ctx.save();
        ctx.globalAlpha = pulseAlpha;
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      // Kelsier silhouette during phases 4+
      if (endingPhase >= 4) {
        renderKelsierSilhouette();
      }

      // Text overlay
      if (endingDisplayedText && endingDisplayedText.trim()) {
        ctx.save();
        ctx.fillStyle = '#e8e0d0';
        ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        ctx.globalAlpha = 0.9;
        ctx.fillText(endingDisplayedText, canvas.width / 2, canvas.height - 60);
        ctx.restore();
      }

      // Final fade to black
      if (endingFadeAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = endingFadeAlpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- Completion Screen ---
    let completeBlinkTimer = 0;
    let completeAnyKeyReady = false;
    let completeTimer = 0;

    function updateComplete(dt) {
      completeTimer += dt;
      completeBlinkTimer += dt;
      if (!completeAnyKeyReady && completeTimer > 1) {
        completeAnyKeyReady = true;
        anyKeyFlag = false;
      }
      if (completeAnyKeyReady && anyKeyFlag) {
        resetGame();
        anyKeyFlag = false;
      }
    }

    function renderComplete() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Ash particles still fall
      updateParticles(0.016);
      renderParticles();

      ctx.save();
      ctx.fillStyle = '#e8e0d0';
      ctx.textAlign = 'center';

      // "Level 1 Complete"
      ctx.font = '28px monospace';
      ctx.fillText('Level 1 Complete', canvas.width / 2, canvas.height / 2 - 40);

      // Boxings collected
      ctx.font = '16px monospace';
      ctx.fillText('Boxings collected: ' + player.boxings, canvas.width / 2, canvas.height / 2 + 10);

      // "To be continued..."
      const blink1 = Math.sin(completeBlinkTimer * 2) > 0;
      if (blink1) {
        ctx.globalAlpha = 0.8;
        ctx.fillText('To be continued...', canvas.width / 2, canvas.height / 2 + 50);
      }

      // "Press any key to play again"
      if (completeAnyKeyReady) {
        const blink2 = Math.sin(completeBlinkTimer * 3) > 0;
        if (blink2) {
          ctx.globalAlpha = 0.6;
          ctx.font = '14px monospace';
          ctx.fillText('Press any key to play again', canvas.width / 2, canvas.height / 2 + 90);
        }
      }

      ctx.restore();
    }

    // --- Reset Game ---
    function resetGame() {
      gameState = 'opening';
      // Reset opening state
      openingTimer = 0;
      openingFadeIn = 0;
      openingLineIndex = 0;
      openingCharIndex = 0;
      openingCharTimer = 0;
      openingPauseTimer = 0;
      openingDone = false;
      openingBlinkTimer = 0;
      openingDisplayedLines = [];
      openingFadeOut = 0;
      openingFadingOut = false;
      openingAnyKeyReady = false;
      // Reset ending state
      endingPhase = 0;
      endingTimer = 0;
      endingText = '';
      endingCharIndex = 0;
      endingCharTimer = 0;
      endingPauseTimer = 0;
      endingDisplayedText = '';
      endingVignetteAlpha = 0;
      endingPulseTimer = 0;
      endingCameraPanTarget = 0;
      endingFadeAlpha = 0;
      endingGuardsCleared = false;
      // Reset completion state
      completeBlinkTimer = 0;
      completeAnyKeyReady = false;
      completeTimer = 0;
      // Reset player
      player.x = SPAWN_X;
      player.y = 14 * TILE;
      player.vx = 0;
      player.vy = 0;
      player.hp = player.maxHp;
      player.boxings = 0;
      player.dead = false;
      player.deadTimer = 0;
      player.checkpoint = 0;
      player.invincible = false;
      player.invincibleTimer = 0;
      player.attacking = false;
      player.attackTimer = 0;
      player.luckCooldown = 0;
      player.luckActive = false;
      player.onGround = false;
      // Reset dead end guards
      deadEndGuard1.alive = true; deadEndGuard1.hp = 2; deadEndGuard1.deathTimer = 0;
      deadEndGuard1.x = 168 * 32; deadEndGuard1.soothed = false;
      deadEndGuard2.alive = true; deadEndGuard2.hp = 2; deadEndGuard2.deathTimer = 0;
      deadEndGuard2.x = 175 * 32; deadEndGuard2.soothed = false;
      deadEndGuard3.alive = true; deadEndGuard3.hp = 2; deadEndGuard3.deathTimer = 0;
      deadEndGuard3.x = 182 * 32; deadEndGuard3.soothed = false;
      // Reset other enemies
      for (const e of enemies) {
        if (!deadEndGuards.includes(e)) {
          e.alive = true;
          e.hp = e.maxHp;
          e.deathTimer = 0;
          e.soothed = false;
          e.sootheTimer = 0;
        }
      }
      anyKeyFlag = false;
    }

    // --- Dead End Trigger ---
    function checkDeadEndTrigger() {
      if (gameState === 'playing' && player.x > 185 * 32) {
        gameState = 'ending';
        endingPhase = 0;
        endingTimer = 0;
        endingDisplayedText = '';
        endingVignetteAlpha = 0;
        endingPulseTimer = 0;
        endingFadeAlpha = 0;
        endingGuardsCleared = false;
      }
    }

    let lastTime = 0;
    function gameLoop(timestamp) {
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      const safeDt = Math.min(dt, 0.1);

      if (gameState === 'opening') {
        updateOpening(safeDt);
        renderOpening();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === 'complete') {
        updateComplete(safeDt);
        renderComplete();
        requestAnimationFrame(gameLoop);
        return;
      }

      // Update gameplay (only when playing)
      if (gameState === 'playing') {
        updatePlayer(safeDt);
        updatePickups(safeDt);
        updateEnemies(safeDt);
        updateCombat(safeDt);
        updateCrumbleTiles(safeDt);
        updateAshClumps(safeDt);
        updateEffects(safeDt);
        updateAnimation(safeDt);
        updateCamera();
        updateMusicIntensity();
        checkDeadEndTrigger();
      }

      if (gameState === 'ending') {
        updateEnding(safeDt);
        updateEffects(safeDt);
        updateAnimation(safeDt);
        // Camera update handled by ending phases
      }

      // Always render world
      renderBackground(safeDt);
      renderTiles();
      renderAshClumps();
      renderPickups();
      renderEnemies();
      renderSoothedIndicators();
      renderEffects();
      renderPlayer();

      // Ash particles
      updateParticles(safeDt);
      renderParticles();

      // Death overlay (only during playing)
      if (gameState === 'playing' && player.dead) {
        const deathAlpha = Math.min(player.deadTimer / 0.5, 0.7);
        ctx.save();
        ctx.globalAlpha = deathAlpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
        if (player.deadTimer > 0.5) {
          ctx.save();
          ctx.globalAlpha = Math.min((player.deadTimer - 0.5) / 0.3, 1);
          ctx.fillStyle = '#8866aa';
          ctx.font = '24px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('The mists claim another...', canvas.width / 2, canvas.height / 2);
          ctx.textAlign = 'left';
          ctx.restore();
        }
      }

      // Ending overlay
      if (gameState === 'ending') {
        renderEndingOverlay();
      }

      // HUD (only during playing)
      if (gameState === 'playing') {
        renderHUD();
      }

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
