<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mistborn: Ash and Shadows</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Input System ---
    const keys = {};
    const input = {
      get left() { return keys['ArrowLeft'] || keys['KeyA']; },
      get right() { return keys['ArrowRight'] || keys['KeyD']; },
      get jump() { return keys['Space']; },
      get attack() { return keys['KeyX'] || keys['KeyJ']; },
      get luck() { return keys['KeyZ'] || keys['KeyK']; },
    };
    window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    let lastTime = 0;
    function gameLoop(timestamp) {
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      // Clamp dt to avoid spiral of death on first frame or tab-switch
      const safeDt = Math.min(dt, 0.1);

      // Clear
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // FPS debug (skip display on first frame where dt is unreliable)
      ctx.fillStyle = '#666';
      ctx.font = '12px monospace';
      const fps = safeDt > 0 ? Math.round(1 / safeDt) : '--';
      ctx.fillText(`FPS: ${fps}`, 10, 20);

      // Input debug display
      const inputNames = ['left', 'right', 'jump', 'attack', 'luck'];
      const inputY = 40;
      inputNames.forEach((name, i) => {
        const active = input[name];
        ctx.fillStyle = active ? '#4ade80' : '#333';
        ctx.fillRect(10 + i * 60, inputY, 50, 20);
        ctx.fillStyle = active ? '#000' : '#666';
        ctx.font = '11px monospace';
        ctx.fillText(name, 14 + i * 60, inputY + 14);
      });

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
