      enemies.push(dg1);
      enemies.push(dg2);
      enemies.push(dg3);
      deadEndGuards = [dg1, dg2, dg3];
    }
    initEnemies();

    // --- Mistcloak tendril system ---
    let cloakTime = 0;
    const CLOAK_TENDRILS = 7; // number of tendril strips
    const CLOAK_COLORS = ['#2a3a4a', '#3a4a5a', '#3a5a6a', '#4a5a6a', '#2a3a4a', '#3a5a6a', '#4a6d8c'];
    const CLOAK_ALPHAS = [0.75, 0.7, 0.65, 0.7, 0.75, 0.65, 0.6];
    const CLOAK_LENGTHS = [44, 40, 50, 36, 46, 38, 42]; // px length per tendril (scaled 2x)
    const CLOAK_WIDTHS = [5, 4, 6, 4, 5, 4, 5];
    const CLOAK_PHASES = [0, 0.9, 1.8, 2.7, 3.6, 4.5, 5.4]; // sine phase offsets

    function renderMistcloak(screenX, screenY, facing, vx, vy, dt) {
      cloakTime += dt;
      ctx.save();

      // Cloak attaches at upper-mid back (around row 12-14 of sprite)
      // For facing right: back is on the left side of sprite (x ~ screenX + 5)
      // For facing left (flipped): back is on the right side
      const backX = facing === 1 ? screenX + 10 : screenX + player.width - 10;
      const backY = screenY + 28; // shoulder/upper-back area (scaled 2x)

      // Determine tendril direction based on velocity
      // When running right, tendrils flow left (and vice versa)
      // When falling, tendrils float up; when jumping, tendrils billow up
      const speed = Math.sqrt(vx * vx + vy * vy);
      const isIdle = Math.abs(vx) < 30 && Math.abs(vy) < 30;
      const isJumping = vy < -50;
      const isFalling = vy > 50;

      for (let i = 0; i < CLOAK_TENDRILS; i++) {
        const len = CLOAK_LENGTHS[i];
        const phase = CLOAK_PHASES[i];
        const t = cloakTime * 3 + phase;

        // Base direction: behind the character
        let dirX, dirY;
        if (isIdle) {
          // Tendrils hang down with gentle sway
          dirX = Math.sin(t * 0.8) * 3 * -facing;
          dirY = len * 0.9;
        } else if (isJumping) {
          // Tendrils billow upward and behind
          dirX = -facing * (6 + Math.sin(t) * 4);
          dirY = -(len * 0.5 + Math.sin(t * 1.2 + phase) * 5);
        } else if (isFalling) {
          // Tendrils float upward dramatically
          dirX = -facing * (4 + Math.sin(t * 1.1) * 3);
          dirY = -(len * 0.7 + Math.sin(t * 0.9 + phase) * 4);
        } else {
          // Running: tendrils stream far behind
          const trailStr = Math.min(Math.abs(vx) / 150, 1);
          dirX = -facing * (len * 0.8 * trailStr + Math.sin(t) * 3);
          dirY = len * 0.3 + Math.sin(t * 1.3 + phase) * 4 - trailStr * 4;
        }

        // Spread tendrils vertically from attach point
        const attachOffsetY = (i - CLOAK_TENDRILS / 2) * 3;
        const startX = backX;
        const startY = backY + attachOffsetY;

        // Control points for bezier curve
        const midX = startX + dirX * 0.4 + Math.sin(t * 1.5 + phase * 0.7) * 2;
        const midY = startY + dirY * 0.4 + Math.cos(t * 1.2 + phase) * 2;
        const endX = startX + dirX + Math.sin(t * 0.7 + phase) * 2;
        const endY = startY + dirY + Math.cos(t * 0.9 + phase * 1.3) * 2;

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(
          midX, midY,
          startX + dirX * 0.7, startY + dirY * 0.7,
          endX, endY
        );
        ctx.strokeStyle = CLOAK_COLORS[i];
        ctx.globalAlpha = CLOAK_ALPHAS[i];
        ctx.lineWidth = CLOAK_WIDTHS[i];
        ctx.lineCap = 'round';
        ctx.stroke();
      }

      ctx.restore();
    }

    function renderPlayer() {
      const screenX = Math.round(player.x - camera.x);
      const screenY = Math.round(player.y - camera.y);

      const frames = SPRITE_FRAMES[anim.state];
      const spriteData = frames[anim.frame % frames.length];
      const flip = player.facing === -1;

      // Flash during invincibility
      if (player.invincible && Math.floor(player.invincibleTimer * 10) % 2 === 0) {
        ctx.globalAlpha = 0.3;
      }

      // Render mistcloak tendrils BEHIND the sprite
      renderMistcloak(screenX, screenY, player.facing, player.vx, player.vy, 0.016);

      drawSprite(spriteData, screenX, screenY, flip);
      ctx.globalAlpha = 1;

      // --- Knife slash visual effect ---
      if (player.attacking) {
        const progress = player.attackTimer / player.attackDuration; // 0 to 1
        const alpha = Math.max(0, 1 - progress * 1.5); // fades out
        const cx = screenX + player.width / 2 + player.facing * (player.width / 2 + 10);
        const cy = screenY + player.height / 2;
        const radius = 28 + progress * 12;
        const startAngle = player.facing === 1 ? -Math.PI * 0.6 : Math.PI * 0.4;
        const endAngle = player.facing === 1 ? Math.PI * 0.6 : Math.PI * 1.6;

        ctx.save();
        ctx.globalAlpha = alpha * 0.7;
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.stroke();

        // Inner brighter arc
        ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.6, startAngle, endAngle);
        ctx.stroke();
        ctx.restore();
      }
    }

    // --- Parallax Background ---
    // Generate procedural background element positions (seeded once)
    const bgElements = {
      // Far layer: Kredik Shaw spires + smokestacks
      farSpires: [],
      farStacks: [],
      // Mid layer: skaa shack rooftops
      midRoofs: [],
      midWindows: [],
      midSteam: [],
      // Near layer: fence posts, barrels, crates
      nearFences: [],
      nearBarrels: [],
      nearCrates: [],
    };

    // Repeating tile width for each layer (in virtual pixels)
    const BG_FAR_W = 1200;
    const BG_MID_W = 900;
    const BG_NEAR_W = 700;

    function seedRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }

    (function generateBgElements() {
      const rng = seedRandom(42);

      // Far layer: Kredik Shaw - a big central spiky palace + flanking spires
      // Main palace body
      bgElements.farSpires.push({ x: 300, w: 200, h: 280, spikes: 7 });
      // Flanking spires
      for (let i = 0; i < 5; i++) {
        bgElements.farSpires.push({
          x: rng() * BG_FAR_W,
          w: 15 + rng() * 30,
          h: 80 + rng() * 180,
          spikes: 1 + Math.floor(rng() * 3),
        });
      }
      // Smokestacks
      for (let i = 0; i < 3; i++) {
        bgElements.farStacks.push({
          x: rng() * BG_FAR_W,
          w: 12 + rng() * 10,
          h: 100 + rng() * 120,
        });
      }

      // Mid layer: skaa rooftops
      for (let i = 0; i < 12; i++) {
        const rx = rng() * BG_MID_W;
        const rw = 40 + rng() * 80;
        const rh = 25 + rng() * 40;
        bgElements.midRoofs.push({ x: rx, w: rw, h: rh, peaked: rng() > 0.5 });
        // Some roofs have lit windows
        if (rng() > 0.4) {
          const wx = rx + 8 + rng() * (rw - 20);
          const wy = rh - 10 - rng() * 10;
          bgElements.midWindows.push({ x: wx, y: wy, w: 5 + rng() * 6, h: 5 + rng() * 5, flicker: rng() * 6.28 });
        }
      }
      // Steam wisps
      for (let i = 0; i < 5; i++) {
        bgElements.midSteam.push({ x: rng() * BG_MID_W, phase: rng() * 6.28 });
      }

      // Near layer: fence posts, barrels, crates
      for (let i = 0; i < 15; i++) {
        bgElements.nearFences.push({ x: i * (BG_NEAR_W / 15) + rng() * 20 });
      }
      for (let i = 0; i < 6; i++) {
        bgElements.nearBarrels.push({ x: rng() * BG_NEAR_W, r: 8 + rng() * 6 });
      }
      for (let i = 0; i < 5; i++) {
        bgElements.nearCrates.push({ x: rng() * BG_NEAR_W, s: 12 + rng() * 14 });
      }
    })();

    let bgTime = 0;

    function renderBackground(dt) {
      bgTime += dt;
      const W = canvas.width;
      const H = canvas.height;

      // Sky gradient (replaces flat clear)
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#2a1520');
      skyGrad.addColorStop(0.3, '#3a2028');
      skyGrad.addColorStop(0.6, '#1e1520');
      skyGrad.addColorStop(1, '#12101a');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // --- Far layer (0.1x camera speed) ---
      const farOffX = -(camera.x * 0.1) % BG_FAR_W;
      const groundBase = H * 0.75; // background ground line

      ctx.save();
      // Draw two tiles for seamless wrapping
      for (let t = -1; t <= Math.ceil(W / BG_FAR_W) + 1; t++) {
        const ox = farOffX + t * BG_FAR_W;

        // Kredik Shaw spires
        bgElements.farSpires.forEach(sp => {
          const sx = ox + sp.x;
          if (sx + sp.w < -50 || sx > W + 50) return;
          const baseY = groundBase - 20;

          ctx.fillStyle = '#1a0f1a';
          // Main body
          ctx.fillRect(sx, baseY - sp.h * 0.4, sp.w, sp.h * 0.4);

          // Spikes on top
          for (let s = 0; s < sp.spikes; s++) {
            const spikeX = sx + (sp.w / (sp.spikes + 1)) * (s + 1);
            const spikeH = sp.h * (0.4 + Math.random() * 0.2);
            ctx.beginPath();
            ctx.moveTo(spikeX - 6, baseY - sp.h * 0.4);
            ctx.lineTo(spikeX, baseY - spikeH);
            ctx.lineTo(spikeX + 6, baseY - sp.h * 0.4);
            ctx.fill();
          }
        });

        // Smokestacks
        bgElements.farStacks.forEach(st => {
          const sx = ox + st.x;
          if (sx + st.w < -20 || sx > W + 20) return;
          const baseY = groundBase - 20;

          ctx.fillStyle = '#1a0f1a';
          ctx.fillRect(sx, baseY - st.h, st.w, st.h);

          // Orange glow at top
          const glow = ctx.createRadialGradient(sx + st.w / 2, baseY - st.h, 2, sx + st.w / 2, baseY - st.h, 15 + Math.sin(bgTime * 2 + st.x) * 5);
          glow.addColorStop(0, 'rgba(255, 120, 40, 0.6)');
          glow.addColorStop(1, 'rgba(255, 80, 20, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(sx + st.w / 2, baseY - st.h, 18, 0, Math.PI * 2);
          ctx.fill();
        });
      }
      ctx.restore();

      // --- Mid layer (0.3x camera speed) ---
      const midOffX = -(camera.x * 0.3) % BG_MID_W;
      const midBase = H * 0.82;

      ctx.save();
      for (let t = -1; t <= Math.ceil(W / BG_MID_W) + 1; t++) {
        const ox = midOffX + t * BG_MID_W;

        // Rooftops
        bgElements.midRoofs.forEach(rf => {
          const rx = ox + rf.x;
          if (rx + rf.w < -20 || rx > W + 20) return;
          const ry = midBase;

          ctx.fillStyle = '#221a25';
          if (rf.peaked) {
            // Peaked roof
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx + rf.w / 2, ry - rf.h);
            ctx.lineTo(rx + rf.w, ry);
            ctx.closePath();
            ctx.fill();
            // Wall below
            ctx.fillRect(rx + 5, ry, rf.w - 10, 30);
          } else {
            // Flat roof building
            ctx.fillRect(rx, ry - rf.h, rf.w, rf.h + 30);
          }
        });

        // Lit windows
        bgElements.midWindows.forEach(win => {
          const wx = ox + win.x;
          if (wx < -20 || wx > W + 20) return;
          const wy = midBase - win.y;

          // Flicker
          const brightness = 0.6 + 0.4 * Math.sin(bgTime * 3 + win.flicker);
          const alpha = 0.4 + brightness * 0.5;
          ctx.fillStyle = `rgba(255, 180, 60, ${alpha})`;
          ctx.fillRect(wx, wy, win.w, win.h);

          // Glow around window
          ctx.fillStyle = `rgba(255, 150, 40, ${alpha * 0.2})`;
          ctx.fillRect(wx - 3, wy - 3, win.w + 6, win.h + 6);
        });

        // Steam wisps
        bgElements.midSteam.forEach(st => {
          const sx = ox + st.x;
          if (sx < -30 || sx > W + 30) return;

          ctx.strokeStyle = 'rgba(150, 140, 160, 0.15)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          for (let i = 0; i < 30; i++) {
            const py = midBase - 40 - i * 3;
            const px = sx + Math.sin(bgTime * 0.8 + st.phase + i * 0.3) * 12;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.stroke();
        });
      }
      ctx.restore();

      // --- Near layer (0.6x camera speed) ---
      const nearOffX = -(camera.x * 0.6) % BG_NEAR_W;
      const nearBase = H * 0.88;

      ctx.save();
      for (let t = -1; t <= Math.ceil(W / BG_NEAR_W) + 1; t++) {
        const ox = nearOffX + t * BG_NEAR_W;

        // Fence posts
        ctx.fillStyle = '#0f0a12';
        bgElements.nearFences.forEach(fp => {
          const fx = ox + fp.x;
          if (fx < -10 || fx > W + 10) return;
          ctx.fillRect(fx, nearBase - 30, 3, 35);
        });

        // Fence rail connecting posts
        ctx.strokeStyle = '#0f0a12';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ox, nearBase - 18);
        ctx.lineTo(ox + BG_NEAR_W, nearBase - 18);
        ctx.stroke();

        // Barrels
        bgElements.nearBarrels.forEach(br => {
          const bx = ox + br.x;
          if (bx < -20 || bx > W + 20) return;
          ctx.fillStyle = '#0d0810';
          ctx.beginPath();
          ctx.ellipse(bx, nearBase - br.r, br.r, br.r * 1.2, 0, 0, Math.PI * 2);
          ctx.fill();
          // Rim highlight
          ctx.strokeStyle = '#1a1220';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(bx, nearBase - br.r, br.r, br.r * 0.4, 0, 0, Math.PI * 2);
          ctx.stroke();
        });

        // Crates
        bgElements.nearCrates.forEach(cr => {
          const cx = ox + cr.x;
          if (cx < -20 || cx > W + 20) return;
          ctx.fillStyle = '#0d0810';
          ctx.fillRect(cx, nearBase - cr.s, cr.s, cr.s);
          // Cross detail
          ctx.strokeStyle = '#1a1220';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(cx, nearBase - cr.s);
          ctx.lineTo(cx + cr.s, nearBase);
          ctx.moveTo(cx + cr.s, nearBase - cr.s);
          ctx.lineTo(cx, nearBase);
          ctx.stroke();
        });
      }
      ctx.restore();
    }

    // --- Ash Particle System ---
    const ASH_COUNT = 80;
    const EMBER_COUNT = 10;
    const particles = [];

    function initParticles() {
      for (let i = 0; i < ASH_COUNT + EMBER_COUNT; i++) {
        particles.push(createParticle(i >= ASH_COUNT, true));
      }
    }

    function createParticle(isEmber, randomY) {
      const colors = isEmber
        ? ['#ff6633', '#ff4422', '#ff5533', '#ee4411']
        : ['#999', '#aaa', '#bbb', '#777', '#888'];
      return {
        x: Math.random() * canvas.width,
        y: randomY ? Math.random() * canvas.height : -Math.random() * 20,
        speed: isEmber ? (25 + Math.random() * 40) : (20 + Math.random() * 40),
        size: isEmber ? (2 + Math.random() * 2) : (1 + Math.random() * 2),
        color: colors[Math.floor(Math.random() * colors.length)],
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.5 + Math.random() * 1.5,
        wobbleAmp: 10 + Math.random() * 25,
        drift: (Math.random() - 0.5) * 15,
        isEmber: isEmber,
        alpha: isEmber ? (0.7 + Math.random() * 0.3) : (0.3 + Math.random() * 0.5),
      };
    }

    function updateParticles(dt) {
      const W = canvas.width;
      const H = canvas.height;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.y += p.speed * dt;
        p.x += (Math.sin(bgTime * p.wobbleSpeed + p.wobblePhase) * p.wobbleAmp * dt) + p.drift * dt;

        // Wrap around screen edges
        if (p.y > H + 10) {
          p.y = -10;
          p.x = Math.random() * W;
        }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
      }
    }

    function renderParticles() {
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    initParticles();

    // Initialize camera to player start
    camera.x = Math.max(0, player.x - canvas.width / 3);
    camera.y = Math.max(0, player.y - canvas.height / 2);

    // --- HUD Rendering ---
    function renderHUD() {
      // Top-left: Health vials — narrow glass vials with cork stoppers
      const vialX = 15;
      const vialY = 15;
      for (let i = 0; i < player.maxHp; i++) {
        const x = vialX + i * 14;
        const y = vialY;
        const full = i < player.hp;
        const draining = (i === player.hp && player.vialDrainAnim > 0);

        // Vial shape: 6px wide, 14px tall body
        // Thin neck (2px wide, 3px tall) at top, wider base (6px wide, 9px tall)
        const neckX = x + 2;   // neck left
        const neckY = y + 2;   // neck top
        const neckW = 2;
        const neckH = 3;
        const bodyX = x;       // body left
        const bodyY = y + 5;   // body top (below neck)
        const bodyW = 6;
        const bodyH = 9;

        // Cork stopper at top
        ctx.fillStyle = '#8a6a4a';
        ctx.fillRect(neckX - 0.5, y, neckW + 1, 2);
        // Cork highlight
        ctx.fillStyle = '#a08060';
        ctx.fillRect(neckX, y, 1, 1);

        if (full) {
          // Glass neck outline
          ctx.fillStyle = 'rgba(136,187,238,0.3)';
          ctx.fillRect(neckX, neckY, neckW, neckH);
          // Body filled with silver-blue liquid
          ctx.fillStyle = '#88bbee';
          ctx.fillRect(bodyX, bodyY, bodyW, bodyH);
          // Liquid shine streak (white highlight on left side)
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.fillRect(bodyX + 1, bodyY + 1, 1, bodyH - 2);
          // Subtle second highlight
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          ctx.fillRect(bodyX + 2, bodyY + 2, 1, bodyH - 4);
          // Glass rim at top of body
          ctx.fillStyle = 'rgba(200,220,240,0.4)';
          ctx.fillRect(bodyX, bodyY, bodyW, 1);
          // Glass outline
          ctx.strokeStyle = 'rgba(100,140,180,0.5)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(neckX - 0.25, neckY, neckW + 0.5, neckH);
          ctx.strokeRect(bodyX - 0.25, bodyY, bodyW + 0.5, bodyH);
        } else if (draining) {
          // Draining animation
          const drainPct = player.vialDrainAnim;
          // Glass outline
          ctx.strokeStyle = 'rgba(60,60,60,0.6)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(neckX - 0.25, neckY, neckW + 0.5, neckH);
          ctx.strokeRect(bodyX - 0.25, bodyY, bodyW + 0.5, bodyH);
          // Partial fill from bottom
          const fillH = Math.floor(bodyH * drainPct);
          if (fillH > 0) {
            ctx.fillStyle = '#88bbee';
            ctx.globalAlpha = 0.7;
            ctx.fillRect(bodyX, bodyY + (bodyH - fillH), bodyW, fillH);
            // Shine
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(bodyX + 1, bodyY + (bodyH - fillH) + 1, 1, Math.max(0, fillH - 2));
            ctx.globalAlpha = 1;
          }
        } else {
          // Empty vial - dark glass outline only
          ctx.strokeStyle = 'rgba(60,60,60,0.6)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(neckX - 0.25, neckY, neckW + 0.5, neckH);
          ctx.strokeRect(bodyX - 0.25, bodyY, bodyW + 0.5, bodyH);
          // Slight glass tint inside
          ctx.fillStyle = 'rgba(50,50,60,0.15)';
          ctx.fillRect(bodyX, bodyY, bodyW, bodyH);
        }
      }

      // Top-right: Boxing (coin) count
      const coinX = canvas.width - 80;
      const coinY = 22;
      // Gold coin icon
      ctx.fillStyle = '#daa520';
      ctx.beginPath();
      ctx.arc(coinX, coinY, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c89418';
      ctx.beginPath();
      ctx.arc(coinX, coinY, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(coinX - 1, coinY - 1, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Count text
      ctx.fillStyle = '#fff';
      ctx.font = '14px monospace';
      ctx.fillText(` ${player.boxings}`, coinX + 10, coinY + 5);

      // Bottom-center: Luck cooldown bar
      const barW = 200;
      const barH = 6;
      const barX = (canvas.width - barW) / 2;
      const barY = canvas.height - 30;
      // Label
      ctx.fillStyle = '#9988bb';
      ctx.font = '10px monospace';
      ctx.fillText('LUCK', barX + barW / 2 - 14, barY - 4);
      // Background
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      // Fill
      if (player.luckCooldown <= 0) {
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(barX, barY, barW, barH);
      } else {
        const pct = 1 - (player.luckCooldown / player.luckMaxCooldown);
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(barX, barY, barW * pct, barH);
      }
      // Border
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);
    }

    // --- Typewriter Helper ---
    function typewriterUpdate(text, charIndex, charTimer, dt, speed) {
      charTimer += dt;
      while (charTimer >= speed && charIndex < text.length) {
        charTimer -= speed;
        charIndex++;
      }
      return { charIndex, charTimer };
    }

    // --- Title Screen ---
    function updateTitle(dt) {
      titleTimer += dt;
      if (!titleAnyKeyReady && titleTimer > 0.5) {
        titleAnyKeyReady = true;
        anyKeyFlag = false;
      }
      if (titleFadingOut) {
        titleFadeOut += dt * 2;
        if (titleFadeOut >= 1.0) {
          gameState = 'opening';
          titleFadingOut = false;
        }
        return;
      }
      if (titleAnyKeyReady && anyKeyFlag) {
        titleFadingOut = true;
        titleFadeOut = 0;
        anyKeyFlag = false;
      }
    }

    function renderTitle() {
      const W = canvas.width;
      const H = canvas.height;

      // Dark background with sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#2a1520');
      skyGrad.addColorStop(0.3, '#3a2028');
      skyGrad.addColorStop(0.6, '#1e1520');
      skyGrad.addColorStop(1, '#12101a');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // Static parallax layers (no scrolling, camera.x = 0)
      const savedCamX = camera.x;
      const savedCamY = camera.y;
      camera.x = 0;
      camera.y = 0;
      // Render background layers
      renderBackground(0.016);
      camera.x = savedCamX;
      camera.y = savedCamY;

      // Ash particles
      updateParticles(0.016);
      renderParticles();

      // Dark overlay for readability
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(0, 0, W, H);

      // Title: "MISTBORN"
      ctx.save();
      ctx.textAlign = 'center';

      // Shadow/glow behind title
      ctx.shadowColor = 'rgba(232, 180, 120, 0.4)';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#e8d0b0';
      ctx.font = 'bold 56px monospace';
      ctx.fillText('MISTBORN', W / 2, H / 2 - 40);
      // Second pass for sharper text
      ctx.shadowBlur = 0;
      ctx.fillText('MISTBORN', W / 2, H / 2 - 40);

      // Subtitle
      ctx.fillStyle = '#8a7a6a';
      ctx.font = '20px monospace';
      ctx.fillText('Ash and Shadows', W / 2, H / 2);

      // "Press any key to begin" blinking
      if (titleAnyKeyReady && !titleFadingOut) {
        const blinkAlpha = 0.4 + 0.4 * Math.sin(titleTimer * 3);
        ctx.globalAlpha = blinkAlpha;
        ctx.fillStyle = '#a09080';
        ctx.font = '14px monospace';
        const isMobile = 'ontouchstart' in window;
        ctx.fillText(isMobile ? 'Tap to begin' : 'Press any key to begin', W / 2, H / 2 + 80);
      }

      ctx.restore();

      // Fade out overlay
      if (titleFadingOut) {
        ctx.save();
        ctx.globalAlpha = Math.min(titleFadeOut, 1);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
    }

    // --- Opening Cutscene ---
    function updateOpening(dt) {
      openingTimer += dt;

      // Fade in over first second
      if (openingFadeIn < 1) {
        openingFadeIn = Math.min(1, openingFadeIn + dt);
      }

      // Fading out after key press
      if (openingFadingOut) {
        openingFadeOut += dt * 2; // fade to black in 0.5s
        if (openingFadeOut >= 1.5) {
          gameState = 'controls';
          controlsTimer = 0;
          controlsAnyKeyReady = false;
          anyKeyFlag = false;
          openingFadingOut = false;
        }
        return;
      }

      // Any key to begin
      if (openingDone) {
        openingBlinkTimer += dt;
        if (anyKeyFlag && openingAnyKeyReady) {
          openingFadingOut = true;
          openingFadeOut = 0;
          anyKeyFlag = false;
        }
        if (!openingAnyKeyReady && openingTimer > 1) {
          openingAnyKeyReady = true;
          anyKeyFlag = false; // reset so they need a fresh press
        }
        return;
      }

      // Pause between lines
      if (openingPauseTimer > 0) {
        openingPauseTimer -= dt;
        if (openingPauseTimer <= 0) {
          openingLineIndex++;
          openingCharIndex = 0;
          openingCharTimer = 0;
          if (openingLineIndex >= openingLines.length) {
            openingDone = true;
            openingTimer = 0;
          }
        }
        return;
      }

      // Typewriter current line
      if (openingLineIndex < openingLines.length) {
        const line = openingLines[openingLineIndex];
        const tw = typewriterUpdate(line, openingCharIndex, openingCharTimer, dt, 0.04);
        openingCharIndex = tw.charIndex;
        openingCharTimer = tw.charTimer;

        // Build displayed lines
        openingDisplayedLines[openingLineIndex] = line.substring(0, openingCharIndex);

        // Line done? start pause
        if (openingCharIndex >= line.length) {
          openingPauseTimer = openingPauses[openingLineIndex] || 0.5;
        }
      }
    }

    function renderOpening() {
      // Black background
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw text
      ctx.save();
      ctx.globalAlpha = openingFadeIn;
      ctx.fillStyle = '#e8e0d0';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';

      const lineHeight = 28;
      const startY = canvas.height / 2 - (openingLines.length * lineHeight) / 2;

      for (let i = 0; i <= openingLineIndex && i < openingLines.length; i++) {
        const text = openingDisplayedLines[i] || '';
        if (text) {
          ctx.fillText(text, canvas.width / 2, startY + i * lineHeight);
        }
      }

      // "Press any key" blinking
      if (openingDone && openingAnyKeyReady) {
        const blink = Math.sin(openingBlinkTimer * 3) > 0;
        if (blink) {
          ctx.globalAlpha = 0.7;
          ctx.font = '14px monospace';
          ctx.fillText('Press any key to begin', canvas.width / 2, startY + openingLines.length * lineHeight + 40);
        }
      }

      ctx.restore();

      // Fade out overlay
      if (openingFadingOut) {
        const alpha = Math.min(openingFadeOut, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- Controls Tutorial Screen ---
    let controlsTimer = 0;
    let controlsAnyKeyReady = false;
    let controlsFadingOut = false;
    let controlsFadeOut = 0;

    function updateControls(dt) {
      controlsTimer += dt;
      if (controlsFadingOut) {
        controlsFadeOut += dt * 2;
        if (controlsFadeOut >= 1.0) {
          gameState = 'playing';
          gameplayTimer = 0;
          controlsFadingOut = false;
        }
        return;
      }
      if (!controlsAnyKeyReady && controlsTimer > 0.5) {
        controlsAnyKeyReady = true;
        anyKeyFlag = false;
      }
      if (controlsAnyKeyReady && anyKeyFlag) {
        controlsFadingOut = true;
        controlsFadeOut = 0;
        anyKeyFlag = false;
      }
    }

    function renderControls() {
      ctx.fillStyle = 'rgba(10, 10, 18, 0.92)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.textAlign = 'center';
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      // Title
      ctx.fillStyle = '#e8d0b0';
      ctx.font = 'bold 22px monospace';
      ctx.fillText('CONTROLS', cx, cy - 110);

      // Underline
      ctx.fillStyle = '#6644aa';
      ctx.fillRect(cx - 60, cy - 104, 120, 2);

      ctx.font = '15px monospace';
      ctx.fillStyle = '#e8d0b0';
      const lines = [
        'MOVE:  Arrow Keys / WASD',
        'JUMP:  Space (hold for higher)',
        'ATTACK:  X',
        'LUCK (Soothe):  Z  --  Freezes nearby enemies',
      ];
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], cx, cy - 60 + i * 30);
      }

      // Press any key
      if (controlsAnyKeyReady) {
        const blink = Math.sin(controlsTimer * 3) > 0;
        if (blink) {
          ctx.globalAlpha = 0.7;
          ctx.font = '14px monospace';
          ctx.fillStyle = '#e8d0b0';
          ctx.fillText('Press any key to start', cx, cy + 80);
        }
      }
      ctx.restore();

      // Fade out
      if (controlsFadingOut) {
        ctx.save();
        ctx.globalAlpha = Math.min(controlsFadeOut, 1);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- In-game Hint System ---
    let gameplayTimer = 0;
    let hintAttackShown = false;
    let hintAttackFade = 1;
    let hintJumpShown = false;
    let hintJumpFade = 1;
    let hintLuckShown = false;
    let hintLuckFade = 1;
    let hasAttacked = false;
    let hasJumped = false;
    let hasUsedLuck = false;
    let firstThugLabelShown = false;
    let firstThugLabelTimer = 0;
    let firstGuardLabelShown = false;
    let firstGuardLabelTimer = 0;

    // Lore snippet system
    const loreSnippets = [
      { col: 20, text: "Vin had learned to be invisible. It was the only way to survive.", shown: false, alpha: 0, timer: 0 },
      { col: 50, text: "She could feel it sometimes -- a strange pull in her chest.", shown: false, alpha: 0, timer: 0 },
      { col: 90, text: "The garrison patrols were getting tighter. Something had the nobles nervous.", shown: false, alpha: 0, timer: 0 },
      { col: 130, text: "The alley narrowed. She'd gone too far.", shown: false, alpha: 0, timer: 0 },
    ];

    function renderInGameHints() {
      const playerCol = Math.floor(player.x / TILE);
      const dt = 0.016; // approximate

      // --- Lore snippets ---
      for (const lore of loreSnippets) {
        if (!lore.shown && playerCol >= lore.col) {
          lore.shown = true;
          lore.alpha = 1;
          lore.timer = 0;
        }
        if (lore.shown && lore.alpha > 0) {
          lore.timer += dt;
          if (lore.timer > 3) lore.alpha = Math.max(0, lore.alpha - dt * 0.8);
          if (lore.alpha > 0) {
            ctx.save();
            ctx.globalAlpha = lore.alpha * 0.85;
            ctx.fillStyle = '#e8d0b0';
            ctx.font = 'italic 13px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(lore.text, canvas.width / 2, canvas.height - 60);
            ctx.restore();
          }
        }
      }

      // --- Enemy labels ---
      if (!firstThugLabelShown) {
        for (const e of enemies) {
          if (e.type === 'thug' && e.alive) {
            const sx = e.x - camera.x;
            if (sx > 0 && sx < canvas.width) {
              firstThugLabelShown = true;
              firstThugLabelTimer = 3;
              break;
            }
          }
        }
      }
      if (firstThugLabelTimer > 0) {
        firstThugLabelTimer -= dt;
        const alpha = Math.min(1, firstThugLabelTimer);
        for (const e of enemies) {
          if (e.type === 'thug' && e.alive) {
            const sx = e.x - camera.x + e.width / 2;
            const sy = e.y - camera.y - 16;
            if (sx > 0 && sx < canvas.width) {
              ctx.save();
              ctx.globalAlpha = alpha * 0.9;
              ctx.fillStyle = '#cc8844';
              ctx.font = 'bold 10px monospace';
              ctx.textAlign = 'center';
              ctx.fillText("CAMON'S THUGS", sx, sy);
              ctx.restore();
              break;
            }
          }
        }
      }

      if (!firstGuardLabelShown && playerCol >= 70) {
        for (const e of enemies) {
          if (e.type === 'guard' && e.alive) {
            const sx = e.x - camera.x;
            if (sx > 0 && sx < canvas.width) {
              firstGuardLabelShown = true;
              firstGuardLabelTimer = 3;
              break;
            }
          }
        }
      }
      if (firstGuardLabelTimer > 0) {
        firstGuardLabelTimer -= dt;
        const alpha = Math.min(1, firstGuardLabelTimer);
        for (const e of enemies) {
          if (e.type === 'guard' && e.alive) {
            const sx = e.x - camera.x + e.width / 2;
            const sy = e.y - camera.y - 16;
            if (sx > 0 && sx < canvas.width) {
              ctx.save();
              ctx.globalAlpha = alpha * 0.9;
              ctx.fillStyle = '#cc3333';
              ctx.font = 'bold 10px monospace';
              ctx.textAlign = 'center';
              ctx.fillText("LORD RULER'S GARRISON", sx, sy);
              ctx.restore();
              break;
            }
          }
        }
      }

      // --- Floating gameplay hints (first 30 seconds) ---
      if (gameplayTimer < 30) {
        // Track actions
        if (player.attacking) hasAttacked = true;
        if (!player.onGround && player.vy < 0) hasJumped = true;
        if (player.luckCooldown > 0) hasUsedLuck = true;

        // Attack hint near first thug
        if (!hasAttacked && enemies.length > 0 && enemies[0].alive) {
          const e = enemies[0];
          const dist = Math.abs(player.x - e.x);
          if (dist < 200) {
            ctx.save();
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = '#e8d0b0';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            const sx = e.x - camera.x + e.width / 2;
            const sy = e.y - camera.y - 30;
            ctx.fillText('Press X to attack', sx, sy);
            ctx.restore();
          }
        }

        // Jump hint near first gap (col 13-15)
        if (!hasJumped && playerCol >= 10 && playerCol <= 16) {
          ctx.save();
          ctx.globalAlpha = 0.85;
          ctx.fillStyle = '#e8d0b0';
          ctx.font = '12px monospace';
          ctx.textAlign = 'center';
          const sx = 14 * TILE - camera.x;
          const sy = 13 * TILE - camera.y;
          ctx.fillText('Hold SPACE for higher jump', sx, sy);
          ctx.restore();
        }

        // Luck hint at bottom
        if (!hasUsedLuck) {
          ctx.save();
          ctx.globalAlpha = 0.5;
          ctx.fillStyle = '#e8d0b0';
          ctx.font = '11px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('Z = Luck (Soothe enemies)', canvas.width / 2, canvas.height - 50);
          ctx.restore();
        }
      }

      // --- Section name + progress bar ---
      let sectionName = 'THE SLUMS';
      let sectionProgress = 0;
      if (playerCol >= 140) {
        sectionName = 'THE DEAD END';
        sectionProgress = Math.min(1, (playerCol - 140) / 55);
      } else if (playerCol >= 70) {
        sectionName = 'THE BORDER';
        sectionProgress = Math.min(1, (playerCol - 70) / 70);
      } else {
        sectionProgress = Math.min(1, playerCol / 70);
      }

      ctx.save();
      ctx.textAlign = 'center';
      ctx.fillStyle = '#e8d0b0';
      ctx.globalAlpha = 0.6;
      ctx.font = '11px monospace';
      ctx.fillText(sectionName, canvas.width / 2, 18);
      // Progress underline
      const pbW = 80;
      const pbX = canvas.width / 2 - pbW / 2;
      ctx.fillStyle = '#444';
      ctx.fillRect(pbX, 22, pbW, 2);
      ctx.fillStyle = '#6644aa';
      ctx.fillRect(pbX, 22, pbW * sectionProgress, 2);
      ctx.restore();
    }

    // --- Ending Cutscene ---
    const endingTexts = [
      "There was nowhere left to run.",
      "She didn't understand what she'd done. Only that it worked.",
      "Someone was watching."
    ];

    function updateEnding(dt) {
      endingTimer += dt;

      switch (endingPhase) {
        case 0: // Vignette darkens, first text
          endingVignetteAlpha = Math.min(0.6, endingVignetteAlpha + dt * 0.5);
          if (!endingDisplayedText && endingTimer > 0.5) {
            endingText = endingTexts[0];
            endingCharIndex = 0;
            endingCharTimer = 0;
            endingDisplayedText = ' '; // mark started
          }
          if (endingText) {
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 3) {
              endingPhase = 1;
              endingTimer = 0;
            }
          }
          break;

        case 1: // Luck pulse + guards flee
          endingPulseTimer += dt;
          // Create a big pulse effect at start
          if (endingTimer < 0.1) {
            effects.push({
              type: 'luckPulse',
              x: player.x + player.width / 2,
              y: player.y + player.height / 2,
              radius: 0,
              maxRadius: 300,
              timer: 0,
              duration: 1.5,
            });
          }
          // Make guards wander away
          if (!endingGuardsCleared) {
            for (const g of deadEndGuards) {
              if (g.alive) {
                g.soothed = true;
                g.sootheTimer = 999;
                g.detecting = false;
                g.facing = -1; // face left (away from dead end)
                g.x -= 80 * dt; // move them offscreen to the left
              }
            }
            if (endingTimer > 3) {
              endingGuardsCleared = true;
              // Remove them
              for (const g of deadEndGuards) {
                g.alive = false;
                g.deathTimer = 999;
              }
            }
          }
          if (endingTimer > 3.5) {
            endingPhase = 2;
            endingTimer = 0;
            endingText = endingTexts[1];
            endingCharIndex = 0;
            endingCharTimer = 0;
            endingDisplayedText = '';
          }
          break;

        case 2: // Second text
          {
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 3) {
              endingPhase = 3;
              endingTimer = 0;
              endingDisplayedText = '';
              // Store target for camera pan up
              endingCameraPanTarget = camera.y - 200;
            }
          }
          break;

        case 3: // Camera pans up to rooftop
          {
            const panDuration = 2;
            const t = Math.min(endingTimer / panDuration, 1);
            const eased = t * t * (3 - 2 * t); // smoothstep
            camera.y = camera.y + (endingCameraPanTarget - camera.y) * 0.03;
            if (endingTimer > panDuration) {
              endingPhase = 4;
              endingTimer = 0;
              endingText = endingTexts[2];
              endingCharIndex = 0;
              endingCharTimer = 0;
              endingDisplayedText = '';
            }
          }
          break;

        case 4: // Kelsier silhouette + "Someone was watching."
          {
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 3) {
              endingPhase = 5;
              endingTimer = 0;
            }
          }
          break;

        case 5: // Fade to black
          endingFadeAlpha = Math.min(1, endingFadeAlpha + dt * 0.5);
          if (endingTimer > 2) {
            gameState = 'complete';
          }
          break;
      }
    }

    function renderKelsierSilhouette() {
      // Draw Kelsier on the rooftop (around col 190, row 7 area)
      const kx = 190 * TILE - camera.x;
      const ky = 7 * TILE - camera.y - 48; // standing on rooftop

      ctx.save();
      ctx.fillStyle = '#0a0a12';

      // Body - broad shoulders, confident stance
      // Torso
      ctx.fillRect(kx - 10, ky + 16, 20, 20);
      // Shoulders (broad)
      ctx.fillRect(kx - 16, ky + 16, 32, 6);
      // Head
      ctx.beginPath();
      ctx.arc(kx, ky + 10, 8, 0, Math.PI * 2);
      ctx.fill();
      // Hair - messy spikes going up
      ctx.beginPath();
      ctx.moveTo(kx - 6, ky + 4);
      ctx.lineTo(kx - 3, ky - 6);
      ctx.lineTo(kx, ky + 2);
      ctx.lineTo(kx + 2, ky - 8);
      ctx.lineTo(kx + 5, ky + 1);
      ctx.lineTo(kx + 7, ky - 5);
      ctx.lineTo(kx + 8, ky + 4);
      ctx.closePath();
      ctx.fill();
      // Arms crossed
      ctx.fillRect(kx - 16, ky + 22, 12, 5);
      ctx.fillRect(kx + 4, ky + 22, 12, 5);
      // Forearms crossed over chest
      ctx.fillRect(kx - 8, ky + 26, 16, 4);
      // Legs
      ctx.fillRect(kx - 8, ky + 36, 7, 14);
      ctx.fillRect(kx + 1, ky + 36, 7, 14);
      // Mistcloak tails flowing
      ctx.beginPath();
      ctx.moveTo(kx - 16, ky + 22);
      ctx.lineTo(kx - 20, ky + 50);
      ctx.lineTo(kx - 14, ky + 46);
      ctx.lineTo(kx - 18, ky + 54);
      ctx.lineTo(kx - 10, ky + 36);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(kx + 16, ky + 22);
      ctx.lineTo(kx + 20, ky + 50);
      ctx.lineTo(kx + 14, ky + 46);
      ctx.lineTo(kx + 18, ky + 54);
      ctx.lineTo(kx + 10, ky + 36);
      ctx.fill();

      // Glint for smile - small bright highlight
      ctx.fillStyle = '#e8e0d0';
      ctx.globalAlpha = 0.5 + Math.sin(endingTimer * 2) * 0.3;
      ctx.fillRect(kx - 3, ky + 13, 6, 1);

      ctx.restore();
    }

    function renderEndingOverlay() {
      // Vignette
      if (endingVignetteAlpha > 0) {
        ctx.save();
        const gradient = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, canvas.width * 0.2,
          canvas.width / 2, canvas.height / 2, canvas.width * 0.7
        );
        gradient.addColorStop(0, 'rgba(0,0,0,0)');
        gradient.addColorStop(1, `rgba(0,0,0,${endingVignetteAlpha})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      // Blue-purple pulse during phase 1
      if (endingPhase === 1 && endingPulseTimer < 1.5) {
        const pulseAlpha = Math.max(0, 0.3 - endingPulseTimer * 0.2);
        ctx.save();
        ctx.globalAlpha = pulseAlpha;
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      // Kelsier silhouette during phases 4+
      if (endingPhase >= 4) {
        renderKelsierSilhouette();
      }

      // Text overlay
      if (endingDisplayedText && endingDisplayedText.trim()) {
        ctx.save();
        ctx.fillStyle = '#e8e0d0';
        ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        ctx.globalAlpha = 0.9;
        ctx.fillText(endingDisplayedText, canvas.width / 2, canvas.height - 60);
        ctx.restore();
      }

      // Final fade to black
      if (endingFadeAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = endingFadeAlpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- Completion Screen ---
    let completeBlinkTimer = 0;
    let completeAnyKeyReady = false;
    let completeTimer = 0;

    function updateComplete(dt) {
      completeTimer += dt;
      completeBlinkTimer += dt;
      if (!completeAnyKeyReady && completeTimer > 1) {
        completeAnyKeyReady = true;
        anyKeyFlag = false;
      }
      if (completeAnyKeyReady && anyKeyFlag) {
        resetGame();
        anyKeyFlag = false;
      }
    }

    function renderComplete() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Ash particles still fall
      updateParticles(0.016);
      renderParticles();

      ctx.save();
      ctx.fillStyle = '#e8e0d0';
      ctx.textAlign = 'center';

      // "Level 1 Complete"
      ctx.font = '28px monospace';
      ctx.fillText('Level 1 Complete', canvas.width / 2, canvas.height / 2 - 40);

      // Boxings collected
      ctx.font = '16px monospace';
      ctx.fillText('Boxings collected: ' + player.boxings, canvas.width / 2, canvas.height / 2 + 10);

      // "To be continued..."
      const blink1 = Math.sin(completeBlinkTimer * 2) > 0;
      if (blink1) {
        ctx.globalAlpha = 0.8;
        ctx.fillText('To be continued...', canvas.width / 2, canvas.height / 2 + 50);
      }

      // "Press any key to play again"
      if (completeAnyKeyReady) {
        const blink2 = Math.sin(completeBlinkTimer * 3) > 0;
        if (blink2) {
          ctx.globalAlpha = 0.6;
          ctx.font = '14px monospace';
          ctx.fillText('Press any key to play again', canvas.width / 2, canvas.height / 2 + 90);
        }
      }

      ctx.restore();
    }

    // --- Reset Game ---
    function resetGame() {
      gameState = 'title';
      // Reset title state
      titleTimer = 0;
      titleFadingOut = false;
      titleFadeOut = 0;
      titleAnyKeyReady = false;
      // Reset opening state
      openingTimer = 0;
      openingFadeIn = 0;
      openingLineIndex = 0;
      openingCharIndex = 0;
      openingCharTimer = 0;
      openingPauseTimer = 0;
      openingDone = false;
      openingBlinkTimer = 0;
      openingDisplayedLines = [];
      openingFadeOut = 0;
      openingFadingOut = false;
      openingAnyKeyReady = false;
      // Reset controls state
      controlsTimer = 0;
      controlsAnyKeyReady = false;
      controlsFadingOut = false;
      controlsFadeOut = 0;
      // Reset hints
      gameplayTimer = 0;
      hintAttackShown = false;
      hintJumpShown = false;
      hintLuckShown = false;
      hasAttacked = false;
      hasJumped = false;
      hasUsedLuck = false;
      firstThugLabelShown = false;
      firstThugLabelTimer = 0;
      firstGuardLabelShown = false;
      firstGuardLabelTimer = 0;
      for (const lore of loreSnippets) { lore.shown = false; lore.alpha = 0; lore.timer = 0; }
      // Reset ending state
      endingPhase = 0;
      endingTimer = 0;
      endingText = '';
      endingCharIndex = 0;
      endingCharTimer = 0;
      endingPauseTimer = 0;
      endingDisplayedText = '';
      endingVignetteAlpha = 0;
      endingPulseTimer = 0;
      endingCameraPanTarget = 0;
      endingFadeAlpha = 0;
      endingGuardsCleared = false;
      // Reset completion state
      completeBlinkTimer = 0;
      completeAnyKeyReady = false;
      completeTimer = 0;
      // Reset player
      player.x = SPAWN_X;
      player.y = 14 * TILE;
      player.vx = 0;
      player.vy = 0;
      player.hp = player.maxHp;
      player.boxings = 0;
      player.dead = false;
      player.deadTimer = 0;
      player.checkpoint = 0;
      player.invincible = false;
      player.invincibleTimer = 0;
      player.attacking = false;
      player.attackTimer = 0;
      player.luckCooldown = 0;
      player.luckActive = false;
      player.onGround = false;
      // Rebuild all enemies from scratch (some may have been spliced)
      initEnemies();
      // Reset pickups
      for (const p of pickups) {
        p.collected = false;
      }
      // Reset crumble state
      for (const key in crumbleState) {
        delete crumbleState[key];
      }
      anyKeyFlag = false;
      // Reset environment
      gameParticles.length = 0;
      screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0; screenShake.timer = 0;
      for (const rat of rats) {
        rat.triggered = false;
        rat.vx = 0;
        rat.alpha = 1;
      }
      rats[0].x = 20 * TILE; rats[1].x = 55 * TILE; rats[2].x = 100 * TILE; rats[3].x = 145 * TILE;
    }

    // --- Dead End Trigger ---
    function checkDeadEndTrigger() {
      if (gameState === 'playing' && player.x > 185 * TILE) {
        gameState = 'ending';
        endingPhase = 0;
        endingTimer = 0;
        endingDisplayedText = '';
        endingVignetteAlpha = 0;
        endingPulseTimer = 0;
        endingFadeAlpha = 0;
        endingGuardsCleared = false;
      }
    }

    let lastTime = 0;
    let attackSparkSpawned = false;
    function gameLoop(timestamp) {
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      const safeDt = Math.min(dt, 0.1);

      if (gameState === 'title') {
        updateTitle(safeDt);
        renderTitle();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === 'opening') {
        updateOpening(safeDt);
        renderOpening();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === 'controls') {
        updateControls(safeDt);
        renderControls();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === 'complete') {
        updateComplete(safeDt);
        renderComplete();
        requestAnimationFrame(gameLoop);
        return;
      }

      // Track previous grounded state for landing dust
      const wasOnGround = prevOnGround;

      // Update gameplay (only when playing)
      if (gameState === 'playing') {
        updatePlayer(safeDt);
        updatePickups(safeDt);
        updateEnemies(safeDt);
        updateCombat(safeDt);
        updateCrumbleTiles(safeDt);
        updateAshClumps(safeDt);
        updateEffects(safeDt);
        updateAnimation(safeDt);
        updateCamera();
        updateMusicIntensity();
        checkDeadEndTrigger();
        updateEnvironment(safeDt);

        // Running dust
        if (player.onGround && Math.abs(player.vx) > 50 && !player.dead) {
          runDustTimer += safeDt;
          if (runDustTimer > 0.08) {
            runDustTimer = 0;
            spawnRunDust();
          }
        } else {
          runDustTimer = 0;
        }

        // Landing dust
        if (player.onGround && !wasOnGround && !player.dead) {
          spawnLandingDust();
        }
        prevOnGround = player.onGround;
      }

      if (gameState === 'ending') {
        updateEnding(safeDt);
        updateEffects(safeDt);
        updateAnimation(safeDt);
        // Camera update handled by ending phases
      }

      // Update screen shake and game particles
      updateScreenShake(safeDt);
      updateGameParticles(safeDt);

      // Apply screen shake offset for world rendering
      ctx.save();
      ctx.translate(screenShake.x, screenShake.y);

      // Always render world
      renderBackground(safeDt);
      renderTiles();
      renderEnvironment();
      renderAshClumps();
      renderPickups();
      renderEnemies();
      renderSoothedIndicators();
      renderEffects();
      renderGameParticles();
      renderPlayer();

      // Ash particles
      updateParticles(safeDt);
      renderParticles();

      // End screen shake (world rendering done)
      ctx.restore();

      // Death overlay (only during playing) - NOT shaken
      if (gameState === 'playing' && player.dead) {
        const deathAlpha = Math.min(player.deadTimer / 0.5, 0.7);
        ctx.save();
        ctx.globalAlpha = deathAlpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
        if (player.deadTimer > 0.5) {
          ctx.save();
          ctx.globalAlpha = Math.min((player.deadTimer - 0.5) / 0.3, 1);
          ctx.fillStyle = '#e8d0b0';
          ctx.font = '20px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('The mists claim another...', canvas.width / 2, canvas.height / 2);
          ctx.textAlign = 'left';
          ctx.restore();
        }
      }

      // Ending overlay
      if (gameState === 'ending') {
        renderEndingOverlay();
      }

      // HUD (only during playing) - NOT shaken
      if (gameState === 'playing') {
        gameplayTimer += safeDt;
        renderHUD();
        renderInGameHints();
      }

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
