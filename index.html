    // --- Mistcloak tendril system ---
    let cloakTime = 0;
    const CLOAK_TENDRILS = 7; // number of tendril strips
    const CLOAK_COLORS = ['#2a3a4a', '#3a4a5a', '#3a5a6a', '#4a5a6a', '#2a3a4a', '#3a5a6a', '#4a6d8c'];
    const CLOAK_ALPHAS = [0.75, 0.7, 0.65, 0.7, 0.75, 0.65, 0.6];
    const CLOAK_LENGTHS = [44, 40, 50, 36, 46, 38, 42]; // px length per tendril (scaled 2x)
    const CLOAK_WIDTHS = [5, 4, 6, 4, 5, 4, 5];
    const CLOAK_PHASES = [0, 0.9, 1.8, 2.7, 3.6, 4.5, 5.4]; // sine phase offsets

    function renderMistcloak(screenX, screenY, facing, vx, vy, dt) {
      cloakTime += dt;
      ctx.save();

      // Cloak attaches at upper-mid back (around row 12-14 of sprite)
      // For facing right: back is on the left side of sprite (x ~ screenX + 5)
      // For facing left (flipped): back is on the right side
      const backX = facing === 1 ? screenX + 10 : screenX + player.width - 10;
      const backY = screenY + 28; // shoulder/upper-back area (scaled 2x)

      // Determine tendril direction based on velocity
      // When running right, tendrils flow left (and vice versa)
      // When falling, tendrils float up; when jumping, tendrils billow up
      const speed = Math.sqrt(vx * vx + vy * vy);
      const isIdle = Math.abs(vx) < 30 && Math.abs(vy) < 30;
      const isJumping = vy < -50;
      const isFalling = vy > 50;

      for (let i = 0; i < CLOAK_TENDRILS; i++) {
        const len = CLOAK_LENGTHS[i];
        const phase = CLOAK_PHASES[i];
        const t = cloakTime * 3 + phase;

        // Base direction: behind the character
        let dirX, dirY;
        if (isIdle) {
          // Tendrils hang down with gentle sway
          dirX = Math.sin(t * 0.8) * 3 * -facing;
          dirY = len * 0.9;
        } else if (isJumping) {
          // Tendrils billow upward and behind
          dirX = -facing * (6 + Math.sin(t) * 4);
          dirY = -(len * 0.5 + Math.sin(t * 1.2 + phase) * 5);
        } else if (isFalling) {
          // Tendrils float upward dramatically
          dirX = -facing * (4 + Math.sin(t * 1.1) * 3);
          dirY = -(len * 0.7 + Math.sin(t * 0.9 + phase) * 4);
        } else {
          // Running: tendrils stream far behind
          const trailStr = Math.min(Math.abs(vx) / 150, 1);
          dirX = -facing * (len * 0.8 * trailStr + Math.sin(t) * 3);
          dirY = len * 0.3 + Math.sin(t * 1.3 + phase) * 4 - trailStr * 4;
        }

        // Spread tendrils vertically from attach point
        const attachOffsetY = (i - CLOAK_TENDRILS / 2) * 3;
        const startX = backX;
        const startY = backY + attachOffsetY;

        // Control points for bezier curve
        const midX = startX + dirX * 0.4 + Math.sin(t * 1.5 + phase * 0.7) * 2;
        const midY = startY + dirY * 0.4 + Math.cos(t * 1.2 + phase) * 2;
        const endX = startX + dirX + Math.sin(t * 0.7 + phase) * 2;
        const endY = startY + dirY + Math.cos(t * 0.9 + phase * 1.3) * 2;

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(
          midX, midY,
          startX + dirX * 0.7, startY + dirY * 0.7,
          endX, endY
        );
        ctx.strokeStyle = CLOAK_COLORS[i];
        ctx.globalAlpha = CLOAK_ALPHAS[i];
        ctx.lineWidth = CLOAK_WIDTHS[i];
        ctx.lineCap = 'round';
        ctx.stroke();
      }

      ctx.restore();
    }

    function renderPlayer() {
      const screenX = Math.round(player.x - camera.x);
      const screenY = Math.round(player.y - camera.y);

      const frames = SPRITE_FRAMES[anim.state];
      const spriteData = frames[anim.frame % frames.length];
      const flip = player.facing === -1;

      // Flash during invincibility
      if (player.invincible && Math.floor(player.invincibleTimer * 10) % 2 === 0) {
        ctx.globalAlpha = 0.3;
      }

      // Render mistcloak tendrils BEHIND the sprite
      renderMistcloak(screenX, screenY, player.facing, player.vx, player.vy, 0.016);

      drawSprite(spriteData, screenX, screenY, flip);
      ctx.globalAlpha = 1;

      // --- Knife slash visual effect ---
      if (player.attacking) {
        const progress = player.attackTimer / player.attackDuration; // 0 to 1
        const alpha = Math.max(0, 1 - progress * 1.5); // fades out
        const cx = screenX + player.width / 2 + player.facing * (player.width / 2 + 10);
        const cy = screenY + player.height / 2;
        const radius = 28 + progress * 12;
        const startAngle = player.facing === 1 ? -Math.PI * 0.6 : Math.PI * 0.4;
        const endAngle = player.facing === 1 ? Math.PI * 0.6 : Math.PI * 1.6;

        ctx.save();
        ctx.globalAlpha = alpha * 0.7;
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.stroke();

        // Inner brighter arc
        ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.6, startAngle, endAngle);
        ctx.stroke();
        ctx.restore();
      }
    }

    // --- Parallax Background ---
    // Section-based backgrounds for Luthadel exploration

    function seedRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;

      // --- DEAD END elements ---

      // Far: towering dark walls closing in

      for (let i = 0; i < 5; i++) deadEnd.midBoarded.push({ x: rng() * 900, y: 15 + rng() * 40, w: 8 + rng() * 10, h: 10 + rng() * 12 });
      for (let i = 0; i < 8; i++) deadEnd.midCracks.push({ x: rng() * 900, y: rng() * 60, len: 10 + rng() * 30, angle: rng() * 3.14 });
      // Near: broken crates, chains, rats

      for (let i = 0; i < 5; i++) deadEnd.nearChains.push({ x: rng() * 700, len: 20 + rng() * 40, swayPhase: rng() * 6.28 });
      for (let i = 0; i < 3; i++) deadEnd.nearRats.push({ x: rng() * 700, phase: rng() * 6.28, speed: 20 + rng() * 30 });

    // Repeating tile widths
    const BG_FAR_W = 1200;
    const BG_MID_W = 900;
    const BG_NEAR_W = 700;

    let bgTime = 0;

    function renderBackground(dt) {
      bgTime += dt;
      const W = canvas.width;
      const H = canvas.height;
      const camX = camera.x;

      // Determine section blend: 0=slums, 1=border, 2=deadEnd
      // Use smooth transitions over 5 tile widths at boundaries
      const transW = 5 * TILE;
      let slumAlpha = 1, borderAlpha = 0, deadAlpha = 0;

      if (camX < SECTION_SLUMS_END - transW) {
        slumAlpha = 1; borderAlpha = 0; deadAlpha = 0;
      } else if (camX < SECTION_SLUMS_END + transW) {
        const t = (camX - (SECTION_SLUMS_END - transW)) / (2 * transW);
        slumAlpha = 1 - t; borderAlpha = t; deadAlpha = 0;
      } else if (camX < SECTION_BORDER_END - transW) {
        slumAlpha = 0; borderAlpha = 1; deadAlpha = 0;
      } else if (camX < SECTION_BORDER_END + transW) {
        const t = (camX - (SECTION_BORDER_END - transW)) / (2 * transW);
        slumAlpha = 0; borderAlpha = 1 - t; deadAlpha = t;
      } else {
        slumAlpha = 0; borderAlpha = 0; deadAlpha = 1;
      }

      // --- SKY ---
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      if (slumAlpha > 0.01) {
        // Slums: hazy red-grey
        ctx.save();
        ctx.globalAlpha = slumAlpha;
        const sg = ctx.createLinearGradient(0, 0, 0, H);
        sg.addColorStop(0, '#3a2225');
        sg.addColorStop(0.25, '#4a2a2a');
        sg.addColorStop(0.5, '#352228');
        sg.addColorStop(1, '#1a1018');
        ctx.fillStyle = sg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
      if (borderAlpha > 0.01) {
        // Border: darker, more ominous, thicker ash
        ctx.save();
        ctx.globalAlpha = borderAlpha;
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#1a1825');
        bg.addColorStop(0.3, '#22202e');
        bg.addColorStop(0.6, '#181520');
        bg.addColorStop(1, '#0e0c15');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
      if (deadAlpha > 0.01) {
        // Dead End: almost black, narrow alley
        ctx.save();
        ctx.globalAlpha = deadAlpha;
        const dg = ctx.createLinearGradient(0, 0, 0, H);
        dg.addColorStop(0, '#0c0810');
        dg.addColorStop(0.3, '#0a0710');
        dg.addColorStop(0.7, '#08060c');
        dg.addColorStop(1, '#050408');
        ctx.fillStyle = dg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      const groundBase = H * 0.75;
      const midBase = H * 0.82;
      const nearBase = H * 0.88;

      // ==============================
      // SLUMS BACKGROUND (cols 0-69)
      // ==============================
      if (slumAlpha > 0.01) {
        ctx.save();
        ctx.globalAlpha = slumAlpha;

        // --- Far layer (0.1x) ---
        const farOff = -(camX * 0.1) % BG_FAR_W;
        for (let t = -1; t <= Math.ceil(W / BG_FAR_W) + 1; t++) {
          const ox = farOff + t * BG_FAR_W;

          // Distant shanty rooftops
          bgSections.slums.farShanties.forEach(sh => {
            const sx = ox + sh.x;
            if (sx + sh.w < -30 || sx > W + 30) return;
            const by = groundBase - 15;
            ctx.fillStyle = '#1e1418';
            if (sh.peaked) {
              ctx.beginPath();
              ctx.moveTo(sx, by);
              ctx.lineTo(sx + sh.w * 0.4, by - sh.h);
              ctx.lineTo(sx + sh.w, by);
              ctx.closePath();
              ctx.fill();
            } else {
              ctx.fillRect(sx, by - sh.h, sh.w, sh.h);
            }
          });

          // Crooked smokestacks belching smoke
          bgSections.slums.farStacks.forEach(st => {
            const sx = ox + st.x;
            if (sx + st.w < -20 || sx > W + 20) return;
            const by = groundBase - 15;
            ctx.save();
            ctx.translate(sx + st.w / 2, by);
            ctx.rotate(st.lean);
            ctx.fillStyle = '#1a0f14';
            ctx.fillRect(-st.w / 2, -st.h, st.w, st.h);
            ctx.restore();

            // Smoke puffs
            const smokeY = by - st.h;
            for (let s = 0; s < 4; s++) {
              const puffY = smokeY - s * 18 - Math.sin(bgTime * 0.5 + st.x + s) * 8;
              const puffX = sx + st.w / 2 + Math.sin(bgTime * 0.3 + s * 1.5) * 12;
              const puffR = 8 + s * 4 + Math.sin(bgTime + s) * 2;
              ctx.fillStyle = `rgba(40, 30, 35, ${0.3 - s * 0.06})`;
              ctx.beginPath();
              ctx.arc(puffX, puffY, puffR, 0, Math.PI * 2);
              ctx.fill();
            }

            // Orange glow at top
            const glow = ctx.createRadialGradient(sx + st.w / 2, smokeY, 2, sx + st.w / 2, smokeY, 14 + Math.sin(bgTime * 2 + st.x) * 4);
            glow.addColorStop(0, 'rgba(255, 120, 40, 0.5)');
            glow.addColorStop(1, 'rgba(255, 80, 20, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(sx + st.w / 2, smokeY, 16, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        // --- Mid layer (0.3x) ---
        const midOff = -(camX * 0.3) % BG_MID_W;
        for (let t = -1; t <= Math.ceil(W / BG_MID_W) + 1; t++) {
          const ox = midOff + t * BG_MID_W;

          // Crowded skaa shacks
          bgSections.slums.midShacks.forEach(sh => {
            const sx = ox + sh.x;
            if (sx + sh.w < -20 || sx > W + 20) return;
            const by = midBase;
            ctx.fillStyle = '#221820';
            if (sh.peaked) {
              ctx.beginPath();
              ctx.moveTo(sx, by);
              ctx.lineTo(sx + sh.w * 0.45, by - sh.h);
              ctx.lineTo(sx + sh.w, by);
              ctx.closePath();
              ctx.fill();
              ctx.fillRect(sx + 4, by, sh.w - 8, 30);
            } else {
              ctx.fillRect(sx, by - sh.h, sh.w, sh.h + 30);
            }
          });

          // Flickering amber windows
          bgSections.slums.midWindows.forEach(win => {
            const wx = ox + win.x;
            if (wx < -20 || wx > W + 20) return;
            const wy = midBase - win.y;
            const brightness = 0.5 + 0.5 * Math.sin(bgTime * 3 + win.flicker);
            const alpha = 0.4 + brightness * 0.5;
            ctx.fillStyle = `rgba(255, 170, 50, ${alpha})`;
            ctx.fillRect(wx, wy, win.w, win.h);
            ctx.fillStyle = `rgba(255, 140, 30, ${alpha * 0.25})`;

          // Laundry lines between buildings
          bgSections.slums.midLaundry.forEach(ll => {
            const lx1 = ox + ll.x1;

            ctx.moveTo(lx1, ly);

              ctx.fillRect(cx - 3, cy, 6, 8);

          // Wooden scaffolding
          bgSections.slums.midScaffolding.forEach(sc => {
            const sx = ox + sc.x;
            if (sx + sc.w < -20 || sx > W + 20) return;
            const by = midBase;
            ctx.strokeStyle = 'rgba(90, 60, 40, 0.3)';
            ctx.lineWidth = 2;
            // Vertical poles
            ctx.beginPath();
            ctx.moveTo(sx, by); ctx.lineTo(sx, by - sc.h);
            ctx.moveTo(sx + sc.w, by); ctx.lineTo(sx + sc.w, by - sc.h);
            ctx.stroke();
            // Horizontal planks
            ctx.lineWidth = 1.5;
            for (let p = 1; p <= 3; p++) {
              const py = by - sc.h * (p / 3.5);
              ctx.beginPath();
              ctx.moveTo(sx, py); ctx.lineTo(sx + sc.w, py);
              ctx.stroke();
            }
          });
        }

        // --- Near layer (0.6x) ---
        const nearOff = -(camX * 0.6) % BG_NEAR_W;
        for (let t = -1; t <= Math.ceil(W / BG_NEAR_W) + 1; t++) {
          const ox = nearOff + t * BG_NEAR_W;

          // Broken barrels
          bgSections.slums.nearBarrels.forEach(br => {
            const bx = ox + br.x;
            if (bx < -20 || bx > W + 20) return;
            ctx.fillStyle = '#0d0810';
            if (br.broken) {
              ctx.beginPath();
              ctx.ellipse(bx, nearBase - br.r * 0.5, br.r, br.r * 0.7, 0.2, 0, Math.PI * 2);
              ctx.fill();
              // Broken rim
              ctx.strokeStyle = '#1a1018';
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.arc(bx, nearBase - br.r * 0.5, br.r * 0.8, 0.5, 2.5);
              ctx.stroke();
            } else {
              ctx.beginPath();
              ctx.ellipse(bx, nearBase - br.r, br.r, br.r * 1.2, 0, 0, Math.PI * 2);
              ctx.fill();
            }
          });

          // Crates
          bgSections.slums.nearCrates.forEach(cr => {
            const cx = ox + cr.x;
            if (cx < -20 || cx > W + 20) return;
            ctx.fillStyle = '#0d0810';
            ctx.fillRect(cx, nearBase - cr.s, cr.s, cr.s);
            ctx.strokeStyle = '#1a1220';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx, nearBase - cr.s); ctx.lineTo(cx + cr.s, nearBase);
            ctx.moveTo(cx + cr.s, nearBase - cr.s); ctx.lineTo(cx, nearBase);
            ctx.stroke();
          });

          // Puddles (reflective)
          bgSections.slums.nearPuddles.forEach(pd => {
            const px = ox + pd.x;
            if (px < -30 || px > W + 30) return;
            const shimmer = 0.08 + Math.sin(bgTime * 1.5 + pd.x) * 0.03;
            ctx.fillStyle = `rgba(80, 70, 90, ${shimmer})`;
            ctx.beginPath();
            ctx.ellipse(px, nearBase + 2, pd.w / 2, 3, 0, 0, Math.PI * 2);
            ctx.fill();
          });

          // Trash heaps
          bgSections.slums.nearTrash.forEach(tr => {
            const tx = ox + tr.x;
            if (tx < -15 || tx > W + 15) return;
            ctx.fillStyle = '#0a0710';
            ctx.beginPath();
            ctx.moveTo(tx - tr.s, nearBase);
            ctx.lineTo(tx - tr.s * 0.3, nearBase - tr.s);
            ctx.lineTo(tx + tr.s * 0.5, nearBase - tr.s * 0.7);
            ctx.lineTo(tx + tr.s, nearBase);
            ctx.closePath();
            ctx.fill();
          });
        }

        ctx.restore();
      }

      // ==============================
      // BORDER BACKGROUND (cols 70-139)
      // ==============================
      if (borderAlpha > 0.01) {
        ctx.save();
        ctx.globalAlpha = borderAlpha;

        // --- Far layer (0.1x) ---
        const farOff = -(camX * 0.1) % BG_FAR_W;
        for (let t = -1; t <= Math.ceil(W / BG_FAR_W) + 1; t++) {
          const ox = farOff + t * BG_FAR_W;

          // Noble architecture - tall stone buildings
          bgSections.border.farNoble.forEach(nb => {
            const sx = ox + nb.x;
            if (sx + nb.w < -30 || sx > W + 30) return;
            const by = groundBase - 10;
            ctx.fillStyle = '#151020';
            ctx.fillRect(sx, by - nb.h, nb.w, nb.h);
            // Decorative top trim
            ctx.fillStyle = '#1a1428';
            ctx.fillRect(sx - 3, by - nb.h, nb.w + 6, 5);
            // Spire tops
            for (let s = 0; s < nb.spires; s++) {
              const spX = sx + nb.w * (s + 1) / (nb.spires + 1);
              ctx.beginPath();
              ctx.moveTo(spX - 5, by - nb.h);
              ctx.lineTo(spX, by - nb.h - 30 - s * 10);
              ctx.lineTo(spX + 5, by - nb.h);
              ctx.fill();
            }
          });

          // Kredik Shaw - larger, more prominent
          bgSections.border.farKredik.forEach(ks => {
            const sx = ox + ks.x;
            if (sx + ks.w < -50 || sx > W + 50) return;
            const by = groundBase - 10;
            ctx.fillStyle = '#10081a';
            ctx.fillRect(sx, by - ks.h * 0.4, ks.w, ks.h * 0.4);
            // Many tall spikes
            for (let s = 0; s < ks.spikes; s++) {
              const spikeX = sx + (ks.w / (ks.spikes + 1)) * (s + 1);
              const spikeH = ks.h * (0.5 + Math.sin(s * 1.3) * 0.2);
              ctx.beginPath();
              ctx.moveTo(spikeX - 7, by - ks.h * 0.4);
              ctx.lineTo(spikeX, by - spikeH);
              ctx.lineTo(spikeX + 7, by - ks.h * 0.4);
              ctx.fill();
            }
            // Faint red glow at base of Kredik Shaw
            const kGlow = ctx.createRadialGradient(sx + ks.w / 2, by, 20, sx + ks.w / 2, by - 60, 180);
            kGlow.addColorStop(0, 'rgba(80, 20, 20, 0.15)');
            kGlow.addColorStop(1, 'rgba(40, 10, 10, 0)');
            ctx.fillStyle = kGlow;
            ctx.fillRect(sx - 20, by - ks.h * 0.5, ks.w + 40, ks.h * 0.5);
          });
        }

        // --- Mid layer (0.3x) ---
        const midOff = -(camX * 0.3) % BG_MID_W;
        for (let t = -1; t <= Math.ceil(W / BG_MID_W) + 1; t++) {
          const ox = midOff + t * BG_MID_W;

          // Stone walls - fortified
          bgSections.border.midWalls.forEach(wl => {
            const sx = ox + wl.x;
            if (sx + wl.w < -20 || sx > W + 20) return;
            const by = midBase;
            ctx.fillStyle = '#1a1525';
            ctx.fillRect(sx, by - wl.h, wl.w, wl.h + 20);
            // Stone block pattern
            ctx.strokeStyle = 'rgba(30, 25, 40, 0.4)';
            ctx.lineWidth = 1;
            for (let row = 0; row < Math.floor(wl.h / 8); row++) {
              const ry = by - wl.h + row * 8;
              ctx.beginPath();
              ctx.moveTo(sx, ry); ctx.lineTo(sx + wl.w, ry);
              ctx.stroke();
              // Offset brick lines
              const brickOff = (row % 2) * 15;
              for (let bx = brickOff; bx < wl.w; bx += 30) {
                ctx.beginPath();
                ctx.moveTo(sx + bx, ry); ctx.lineTo(sx + bx, ry + 8);
                ctx.stroke();
              }
            }
            // Crenellations at top
            for (let c = 0; c < Math.floor(wl.w / 12); c++) {
              ctx.fillStyle = '#1a1525';
              ctx.fillRect(sx + c * 12, by - wl.h - 6, 8, 6);
            }
          });

          // Iron gates
          bgSections.border.midGates.forEach(gt => {
            const sx = ox + gt.x;
            if (sx + gt.w < -15 || sx > W + 15) return;
            const by = midBase;
            // Gate frame
            ctx.fillStyle = '#121020';
            ctx.fillRect(sx, by - gt.h, 4, gt.h);
            ctx.fillRect(sx + gt.w - 4, by - gt.h, 4, gt.h);
            ctx.fillRect(sx, by - gt.h, gt.w, 5);
            // Bars
            ctx.strokeStyle = '#181428';
            ctx.lineWidth = 2;
            for (let b = 6; b < gt.w - 6; b += 6) {
              ctx.beginPath();
              ctx.moveTo(sx + b, by - gt.h + 5);
              ctx.lineTo(sx + b, by);
              ctx.stroke();
            }
          });

          // Guard towers with torchlight
          bgSections.border.midTowers.forEach(tw => {
            const sx = ox + tw.x;
            if (sx + tw.w < -20 || sx > W + 20) return;
            const by = midBase;
            ctx.fillStyle = '#161225';
            ctx.fillRect(sx, by - tw.h, tw.w, tw.h + 15);
            // Tower top wider
            ctx.fillRect(sx - 4, by - tw.h, tw.w + 8, 6);
            // Torch glow (blue-grey)
            const torchBright = 0.5 + 0.3 * Math.sin(bgTime * 4 + tw.torchPhase);
            const tGlow = ctx.createRadialGradient(sx + tw.w / 2, by - tw.h + 3, 2, sx + tw.w / 2, by - tw.h + 3, 20);
            tGlow.addColorStop(0, `rgba(140, 160, 200, ${torchBright * 0.4})`);
            tGlow.addColorStop(1, 'rgba(100, 120, 160, 0)');
            ctx.fillStyle = tGlow;
            ctx.beginPath();
            ctx.arc(sx + tw.w / 2, by - tw.h + 3, 22, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        // --- Near layer (0.6x) ---
        const nearOff = -(camX * 0.6) % BG_NEAR_W;
        for (let t = -1; t <= Math.ceil(W / BG_NEAR_W) + 1; t++) {
          const ox = nearOff + t * BG_NEAR_W;

          // Iron fences - pointed tops
          ctx.fillStyle = '#0a0815';
          bgSections.border.nearFences.forEach(fp => {
            const fx = ox + fp.x;
            if (fx < -10 || fx > W + 10) return;
            // Pointed iron fence post
            ctx.fillRect(fx, nearBase - 30, 3, 35);
            ctx.beginPath();
            ctx.moveTo(fx - 1, nearBase - 30);
            ctx.lineTo(fx + 1.5, nearBase - 38);
            ctx.lineTo(fx + 4, nearBase - 30);
            ctx.fill();
          });
          // Horizontal fence rail
          ctx.strokeStyle = '#0a0815';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(ox, nearBase - 20); ctx.lineTo(ox + BG_NEAR_W, nearBase - 20);
          ctx.moveTo(ox, nearBase - 10); ctx.lineTo(ox + BG_NEAR_W, nearBase - 10);
          ctx.stroke();

          // Stone pillars
          bgSections.border.nearPillars.forEach(pl => {
            const px = ox + pl.x;
            if (px < -15 || px > W + 15) return;
            ctx.fillStyle = '#0c0a18';
            ctx.fillRect(px, nearBase - pl.h, pl.w, pl.h);
            // Capital at top
            ctx.fillRect(px - 2, nearBase - pl.h, pl.w + 4, 4);
            ctx.fillRect(px - 1, nearBase - pl.h + 4, pl.w + 2, 2);
          });

          // Posted proclamations (small rectangles on walls)
          bgSections.border.nearPostings.forEach(pp => {
            const px = ox + pp.x;
            if (px < -10 || px > W + 10) return;
            ctx.fillStyle = 'rgba(60, 55, 50, 0.15)';
            ctx.fillRect(px, nearBase - 22, 8, 10);
          });
        }

        ctx.restore();
      }

      // ==============================
      // DEAD END BACKGROUND (cols 140-199)
      // ==============================
      if (deadAlpha > 0.01) {
        ctx.save();
        ctx.globalAlpha = deadAlpha;

        // --- Far layer (0.1x) - Towering walls closing in ---
        const farOff = -(camX * 0.1) % BG_FAR_W;
        for (let t = -1; t <= Math.ceil(W / BG_FAR_W) + 1; t++) {
          const ox = farOff + t * BG_FAR_W;

          bgSections.deadEnd.farWalls.forEach(wl => {
            const sx = ox + wl.x;
            if (sx + wl.w < -30 || sx > W + 30) return;
            ctx.fillStyle = '#08060e';
            ctx.fillRect(sx, groundBase - wl.h, wl.w, wl.h + 50);
            // Barely visible stone texture
            ctx.strokeStyle = 'rgba(20, 16, 28, 0.3)';
            ctx.lineWidth = 1;
            for (let row = 0; row < Math.floor(wl.h / 12); row++) {
              const ry = groundBase - wl.h + row * 12;
              ctx.beginPath();
              ctx.moveTo(sx, ry); ctx.lineTo(sx + wl.w, ry);
              ctx.stroke();
            }
          });
        }

        // Very narrow sky visible - dark strip at top
        ctx.fillStyle = 'rgba(15, 10, 20, 0.6)';
        ctx.fillRect(0, 0, W, H * 0.15);

        // Faint moonlight strip
        const moonGlow = ctx.createLinearGradient(W * 0.3, 0, W * 0.7, 0);
        moonGlow.addColorStop(0, 'rgba(60, 55, 80, 0)');
        moonGlow.addColorStop(0.5, 'rgba(60, 55, 80, 0.06)');
        moonGlow.addColorStop(1, 'rgba(60, 55, 80, 0)');
        ctx.fillStyle = moonGlow;
        ctx.fillRect(0, 0, W, H * 0.3);

        // --- Mid layer (0.3x) - pipes, boarded windows, cracks ---
        const midOff = -(camX * 0.3) % BG_MID_W;
        for (let t = -1; t <= Math.ceil(W / BG_MID_W) + 1; t++) {
          const ox = midOff + t * BG_MID_W;

          // Dripping pipes
          bgSections.deadEnd.midPipes.forEach(pp => {
            const px = ox + pp.x;
            if (px < -40 || px > W + 40) return;
            const py = midBase - pp.y;
            ctx.strokeStyle = 'rgba(40, 35, 50, 0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(px, py); ctx.lineTo(px + pp.len, py);
            ctx.stroke();
            // Drip animation
            const dripY = py + ((bgTime * 30 + pp.dripPhase * 50) % 40);
            const dripAlpha = 1 - ((bgTime * 30 + pp.dripPhase * 50) % 40) / 40;
            ctx.fillStyle = `rgba(60, 55, 80, ${dripAlpha * 0.3})`;
            ctx.beginPath();
            ctx.arc(px + pp.len * 0.6, dripY, 1.5, 0, Math.PI * 2);
            ctx.fill();
          });

          // Boarded-up windows
          bgSections.deadEnd.midBoarded.forEach(bw => {
            const bx = ox + bw.x;
            if (bx < -20 || bx > W + 20) return;
            const by = midBase - bw.y;
            // Dark window hole
            ctx.fillStyle = '#040308';
            ctx.fillRect(bx, by, bw.w, bw.h);
            // Boards across
            ctx.strokeStyle = 'rgba(50, 35, 30, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(bx - 1, by + 2); ctx.lineTo(bx + bw.w + 1, by + bw.h - 2);
            ctx.moveTo(bx - 1, by + bw.h - 2); ctx.lineTo(bx + bw.w + 1, by + 2);
            ctx.stroke();
          });

          // Wall cracks
          bgSections.deadEnd.midCracks.forEach(cr => {
            const cx = ox + cr.x;
            if (cx < -20 || cx > W + 20) return;
            const cy = midBase - cr.y;
            ctx.strokeStyle = 'rgba(25, 20, 35, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(cr.angle) * cr.len, cy + Math.sin(cr.angle) * cr.len);
            // Branch
            ctx.lineTo(cx + Math.cos(cr.angle + 0.5) * cr.len * 0.6, cy + Math.sin(cr.angle + 0.5) * cr.len * 0.6);
            ctx.stroke();
          });

          // Mist creeping in from edges at mid level
          for (let m = 0; m < 3; m++) {
            const mistX = ox + m * 350;
            const mistAlpha = 0.04 + Math.sin(bgTime * 0.3 + m) * 0.02;
            const mistGrad = ctx.createRadialGradient(mistX, midBase, 10, mistX, midBase, 80);
            mistGrad.addColorStop(0, `rgba(100, 95, 120, ${mistAlpha})`);
            mistGrad.addColorStop(1, 'rgba(80, 75, 100, 0)');
            ctx.fillStyle = mistGrad;
            ctx.beginPath();
            ctx.arc(mistX, midBase, 80, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // --- Near layer (0.6x) - chains, crates, rats, mist tendrils ---
        const nearOff = -(camX * 0.6) % BG_NEAR_W;
        for (let t = -1; t <= Math.ceil(W / BG_NEAR_W) + 1; t++) {
          const ox = nearOff + t * BG_NEAR_W;

          // Broken crates
          bgSections.deadEnd.nearCrates.forEach(cr => {
            const cx = ox + cr.x;
            if (cx < -20 || cx > W + 20) return;
            ctx.fillStyle = '#060410';
            if (cr.broken) {
              // Broken - tilted, partial
              ctx.save();
              ctx.translate(cx + cr.s / 2, nearBase - cr.s / 2);
              ctx.rotate(0.2);
              ctx.fillRect(-cr.s / 2, -cr.s / 2, cr.s, cr.s * 0.7);
              ctx.restore();
            } else {
              ctx.fillRect(cx, nearBase - cr.s, cr.s, cr.s);
            }
          });

          // Chains hanging from walls
          bgSections.deadEnd.nearChains.forEach(ch => {
            const cx = ox + ch.x;
            if (cx < -15 || cx > W + 15) return;
            const sway = Math.sin(bgTime * 0.4 + ch.swayPhase) * 5;
            ctx.strokeStyle = 'rgba(50, 45, 60, 0.35)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            // Chain links as connected arcs
            const startY = nearBase - 40;
            for (let l = 0; l < Math.floor(ch.len / 6); l++) {
              const ly = startY + l * 6;
              const lx = cx + sway * (l / Math.floor(ch.len / 6));
              if (l % 2 === 0) {
                ctx.moveTo(lx - 2, ly);
                ctx.arc(lx, ly + 3, 3, -Math.PI / 2, Math.PI * 1.5, false);
              }
            }
            ctx.stroke();
          });

          // Mist tendrils at ground level
          for (let m = 0; m < 5; m++) {
            const mx = ox + m * 150 + Math.sin(bgTime * 0.2 + m) * 30;
            const my = nearBase + 5;
            const mAlpha = 0.06 + Math.sin(bgTime * 0.5 + m * 1.5) * 0.03;
            ctx.strokeStyle = `rgba(120, 115, 140, ${mAlpha})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < 20; i++) {
              const px = mx + i * 6;
              const py = my + Math.sin(bgTime * 0.6 + m + i * 0.4) * 4;
              if (i === 0) ctx.moveTo(px, py);
              else ctx.lineTo(px, py);
            }
            ctx.stroke();
          }

          // Occasional red glow (danger)
          const redPhase = Math.sin(bgTime * 0.8) * 0.5 + 0.5;
          if (redPhase > 0.7) {
            const rglow = ctx.createRadialGradient(ox + 350, midBase - 20, 5, ox + 350, midBase - 20, 60);
            rglow.addColorStop(0, `rgba(120, 20, 10, ${(redPhase - 0.7) * 0.15})`);
            rglow.addColorStop(1, 'rgba(80, 10, 5, 0)');
            ctx.fillStyle = rglow;
            ctx.beginPath();
            ctx.arc(ox + 350, midBase - 20, 60, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.restore();
      }
    }

    // --- Ash Particle System ---
    const ASH_COUNT = 80;
    const EMBER_COUNT = 10;
    const particles = [];

    function initParticles() {
      for (let i = 0; i < ASH_COUNT + EMBER_COUNT; i++) {
        particles.push(createParticle(i >= ASH_COUNT, true));
      }
    }

    function createParticle(isEmber, randomY) {
      const colors = isEmber
        ? ['#ff6633', '#ff4422', '#ff5533', '#ee4411']
        : ['#999', '#aaa', '#bbb', '#777', '#888'];
      return {
        x: Math.random() * canvas.width,
        y: randomY ? Math.random() * canvas.height : -Math.random() * 20,
        speed: isEmber ? (25 + Math.random() * 40) : (20 + Math.random() * 40),
        size: isEmber ? (2 + Math.random() * 2) : (1 + Math.random() * 2),
        color: colors[Math.floor(Math.random() * colors.length)],
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.5 + Math.random() * 1.5,
        wobbleAmp: 10 + Math.random() * 25,
        drift: (Math.random() - 0.5) * 15,
        isEmber: isEmber,
        alpha: isEmber ? (0.7 + Math.random() * 0.3) : (0.3 + Math.random() * 0.5),
      };
    }

    function updateParticles(dt) {
      const W = canvas.width;
      const H = canvas.height;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.y += p.speed * dt;
        p.x += (Math.sin(bgTime * p.wobbleSpeed + p.wobblePhase) * p.wobbleAmp * dt) + p.drift * dt;

        // Wrap around screen edges
        if (p.y > H + 10) {
          p.y = -10;
          p.x = Math.random() * W;
        }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
      }
    }

    function renderParticles() {
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    initParticles();

    // Initialize camera to player start
    camera.x = Math.max(0, player.x - canvas.width / 3);
    camera.y = Math.max(0, player.y - canvas.height / 2);

    // --- HUD Rendering ---
    function renderHUD() {
      const W = canvas.width;
      const H = canvas.height;

      // --- Right side: Vertical Health bar (top) + Luck bar (below) ---
      const barW = 8;
      const barH = 80;
      const barX = W - 22;
      const barGap = 14;

      // Health bar
      const hpY = 20;
      const hpPct = player.hp / player.maxHp;
      // Label
      ctx.save();
      ctx.fillStyle = '#88bbee';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('HP', barX + barW / 2, hpY - 4);
      // Background
      ctx.fillStyle = 'rgba(40, 40, 50, 0.6)';
      ctx.fillRect(barX, hpY, barW, barH);
      // Fill (from bottom up)
      const hpFillH = barH * hpPct;
      if (hpPct > 0) {
        const hpGrad = ctx.createLinearGradient(0, hpY + barH - hpFillH, 0, hpY + barH);
        hpGrad.addColorStop(0, '#88bbee');
        hpGrad.addColorStop(1, '#5588bb');
        ctx.fillStyle = hpGrad;
        ctx.fillRect(barX, hpY + barH - hpFillH, barW, hpFillH);
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(barX + 1, hpY + barH - hpFillH + 1, 2, hpFillH - 2);
      }
      // Segment lines (one per HP point)
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 0.5;
      for (let i = 1; i < player.maxHp; i++) {
        const sy = hpY + (barH / player.maxHp) * i;
        ctx.beginPath();
        ctx.moveTo(barX, sy);
        ctx.lineTo(barX + barW, sy);
        ctx.stroke();
      }
      // Border
      ctx.strokeStyle = 'rgba(100,140,180,0.5)';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, hpY, barW, barH);
      ctx.restore();

      // Luck bar
      const luckY = hpY + barH + barGap;
      const luckPct = player.luckCooldown <= 0 ? 1 : 1 - (player.luckCooldown / player.luckMaxCooldown);
      // Label
      ctx.save();
      ctx.fillStyle = '#9988bb';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LK', barX + barW / 2, luckY - 4);
      // Background
      ctx.fillStyle = 'rgba(40, 40, 50, 0.6)';
      ctx.fillRect(barX, luckY, barW, barH);
      // Fill (from bottom up)
      const lkFillH = barH * luckPct;
      if (luckPct > 0) {
        const lkGrad = ctx.createLinearGradient(0, luckY + barH - lkFillH, 0, luckY + barH);
        lkGrad.addColorStop(0, '#6644aa');
        lkGrad.addColorStop(1, '#442288');
        ctx.fillStyle = lkGrad;
        ctx.fillRect(barX, luckY + barH - lkFillH, barW, lkFillH);
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(barX + 1, luckY + barH - lkFillH + 1, 2, lkFillH - 2);
      }
      // "READY" glow when full
      if (player.luckCooldown <= 0) {
        ctx.fillStyle = `rgba(102, 68, 170, ${0.15 + Math.sin(bgTime * 3) * 0.1})`;
        ctx.fillRect(barX - 2, luckY - 2, barW + 4, barH + 4);
      }
      // Border
      ctx.strokeStyle = 'rgba(100, 80, 150, 0.5)';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, luckY, barW, barH);
      ctx.restore();

      // --- Top-left: Boxing (coin) count ---
      const coinX = 22;
      const coinY = 22;
      // Gold coin icon
      ctx.fillStyle = '#daa520';
      ctx.beginPath();
      ctx.arc(coinX, coinY, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c89418';
      ctx.beginPath();
      ctx.arc(coinX, coinY, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(coinX - 1, coinY - 1, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Count text
      ctx.fillStyle = '#fff';
      ctx.font = '14px monospace';
      ctx.fillText(` ${player.boxings}`, coinX + 10, coinY + 5);
    }

    // --- Typewriter Helper ---
    function typewriterUpdate(text, charIndex, charTimer, dt, speed) {
      charTimer += dt;
      while (charTimer >= speed && charIndex < text.length) {
        charTimer -= speed;
        charIndex++;
        // Pause after ". " mid-sentence (period followed by space, not at end)
        if (charIndex < text.length && text[charIndex - 1] === ' ' && charIndex >= 2 && text[charIndex - 2] === '.') {
          charTimer -= 0.6; // extra 0.6s pause
          break;
        }
      }
      return { charIndex, charTimer };
    }

    // --- Title Screen ---
    function updateTitle(dt) {
      titleTimer += dt;
      if (!titleAnyKeyReady && titleTimer > 0.5) {
        titleAnyKeyReady = true;
        anyKeyFlag = false;
      }
      if (titleFadingOut) {
        titleFadeOut += dt * 2;
        if (titleFadeOut >= 1.0) {
          gameState = 'opening';
          titleFadingOut = false;
        }
        return;
      }
      if (titleAnyKeyReady && anyKeyFlag) {
        titleFadingOut = true;
        titleFadeOut = 0;
        anyKeyFlag = false;
      }
    }

    function renderTitle() {
      const W = canvas.width;
      const H = canvas.height;

      // Dark background with sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#2a1520');
      skyGrad.addColorStop(0.3, '#3a2028');
      skyGrad.addColorStop(0.6, '#1e1520');
      skyGrad.addColorStop(1, '#12101a');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // Static parallax layers (no scrolling, camera.x = 0)
      const savedCamX = camera.x;
      const savedCamY = camera.y;
      camera.x = 0;
      camera.y = 0;
      // Render background layers
      renderBackground(0.016);
      camera.x = savedCamX;
      camera.y = savedCamY;

      // Ash particles
      updateParticles(0.016);
      renderParticles();

      // Dark overlay for readability
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(0, 0, W, H);

      // Title: "MISTBORN"
      ctx.save();
      ctx.textAlign = 'center';

      // Shadow/glow behind title
      ctx.shadowColor = 'rgba(232, 180, 120, 0.4)';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#e8d0b0';
      ctx.font = 'bold 56px monospace';
      ctx.fillText('MISTBORN', W / 2, H / 2 - 40);
      // Second pass for sharper text
      ctx.shadowBlur = 0;
      ctx.fillText('MISTBORN', W / 2, H / 2 - 40);

      // Subtitle
      ctx.fillStyle = '#8a7a6a';
      ctx.font = '20px monospace';
      ctx.fillText('Ash and Shadows', W / 2, H / 2);

      // "Press any key to begin" blinking
      if (titleAnyKeyReady && !titleFadingOut) {
        const blinkAlpha = 0.4 + 0.4 * Math.sin(titleTimer * 3);
        ctx.globalAlpha = blinkAlpha;
        ctx.fillStyle = '#a09080';
        ctx.font = '14px monospace';
        const isMobile = 'ontouchstart' in window;
        ctx.fillText(isMobile ? 'Tap to begin' : 'Press any key to begin', W / 2, H / 2 + 80);
      }

      ctx.restore();

      // Fade out overlay
      if (titleFadingOut) {
        ctx.save();
        ctx.globalAlpha = Math.min(titleFadeOut, 1);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
    }

    // --- Opening Cutscene ---
    let curOpeningLines = openingScreens[0].lines;
    let curOpeningPauses = openingScreens[0].pauses;

    function updateOpening(dt) {
      openingTimer += dt;

      // Fade in over first second
      if (openingFadeIn < 1) {
        openingFadeIn = Math.min(1, openingFadeIn + dt);
      }

      // Fading between screens or fading out at end
      if (openingScreenFade > 0) {
        openingScreenFade += dt * 1.5;
        // Fade to black (0-1), hold briefly, then fade in next screen (1-2)
        if (openingScreenFade >= 1 && openingScreenFade - dt * 1.5 < 1) {
          // Just hit full black - switch to next screen
          if (openingScreen < openingScreens.length - 1) {
            openingScreen++;
            curOpeningLines = openingScreens[openingScreen].lines;
            curOpeningPauses = openingScreens[openingScreen].pauses;
            openingLineIndex = 0;
            openingCharIndex = 0;
            openingCharTimer = 0;
            openingPauseTimer = 0;
            openingDisplayedLines = [];
            openingDone = false;
          }
        }
        if (openingScreenFade >= 2) {
          // If we were on last screen, go to controls
          if (openingScreen >= openingScreens.length - 1 && openingDone) {
            gameState = 'controls';
            controlsTimer = 0;
            controlsAnyKeyReady = false;
            anyKeyFlag = false;
            openingScreenFade = 0;
            return;
          }
          openingScreenFade = 0;
          openingFadeIn = 0; // re-fade in the new screen text
        }
        return;
      }

      // Fading out after key press on final screen
      if (openingFadingOut) {
        openingFadeOut += dt * 2;
        if (openingFadeOut >= 1.5) {
          gameState = 'controls';
          controlsTimer = 0;
          controlsAnyKeyReady = false;
          anyKeyFlag = false;
          openingFadingOut = false;
        }
        return;
      }

      // Screen done
      if (openingDone) {
        openingBlinkTimer += dt;

        // If not on last screen, auto-advance after a short pause
        if (openingScreen < openingScreens.length - 1) {
          if (openingTimer > 1.2 || anyKeyFlag) {
            openingScreenFade = 0.01;
            anyKeyFlag = false;
          }
          return;
        }

        // Last screen - wait for key press
        if (anyKeyFlag && openingAnyKeyReady) {
          openingFadingOut = true;
          openingFadeOut = 0;
          anyKeyFlag = false;
        }
        if (!openingAnyKeyReady && openingTimer > 1) {
          openingAnyKeyReady = true;
          anyKeyFlag = false;
        }
        return;
      }

      // Pause between lines
      if (openingPauseTimer > 0) {
        openingPauseTimer -= dt;
        if (openingPauseTimer <= 0) {
          openingLineIndex++;
          openingCharIndex = 0;
          openingCharTimer = 0;
          if (openingLineIndex >= curOpeningLines.length) {
            openingDone = true;
            openingTimer = 0;
          }
        }
        return;
      }

      // Typewriter current line
      if (openingLineIndex < curOpeningLines.length) {
        const line = curOpeningLines[openingLineIndex];
        const tw = typewriterUpdate(line, openingCharIndex, openingCharTimer, dt, 0.04);
        openingCharIndex = tw.charIndex;
        openingCharTimer = tw.charTimer;

        openingDisplayedLines[openingLineIndex] = line.substring(0, openingCharIndex);

        if (openingCharIndex >= line.length) {
          openingPauseTimer = curOpeningPauses[openingLineIndex] || 0.5;
        }
      }
    }

    function renderOpening() {
      const W = canvas.width;
      const H = canvas.height;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      // Calculate fade alpha for screen transitions
      let textAlpha = openingFadeIn;
      if (openingScreenFade > 0) {
        if (openingScreenFade < 1) {
          textAlpha *= 1 - openingScreenFade; // fade out
        } else {
          textAlpha *= openingScreenFade - 1; // fade in
        }
      }

      ctx.save();
      ctx.globalAlpha = textAlpha;
      ctx.fillStyle = '#e8e0d0';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';

      const lineHeight = 28;
      const startY = H / 2 - (curOpeningLines.length * lineHeight) / 2;

      for (let i = 0; i <= openingLineIndex && i < curOpeningLines.length; i++) {
        const text = openingDisplayedLines[i] || '';
        if (text) {
          ctx.fillText(text, canvas.width / 2, startY + i * lineHeight);
        }
      }

      // "Press any key" blinking - only on last screen
      if (openingDone && openingAnyKeyReady && openingScreen >= openingScreens.length - 1) {
        const blink = Math.sin(openingBlinkTimer * 3) > 0;
        if (blink) {
          ctx.globalAlpha = 0.7 * textAlpha;
          ctx.font = '14px monospace';
          ctx.fillText('Press any key to begin', canvas.width / 2, startY + curOpeningLines.length * lineHeight + 40);
        }
      }

      ctx.restore();

      // Fade out overlay for final exit
      if (openingFadingOut) {
        const alpha = Math.min(openingFadeOut, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- Controls Tutorial Screen ---
    let controlsTimer = 0;
    let controlsAnyKeyReady = false;
    let controlsFadingOut = false;
    let controlsFadeOut = 0;

    function updateControls(dt) {
      controlsTimer += dt;
      if (controlsFadingOut) {
        controlsFadeOut += dt * 2;
        if (controlsFadeOut >= 1.0) {
          gameState = 'playing';
          gameplayTimer = 0;
          controlsFadingOut = false;
        }
        return;
      }
      if (!controlsAnyKeyReady && controlsTimer > 0.5) {
        controlsAnyKeyReady = true;
        anyKeyFlag = false;
      }
      if (controlsAnyKeyReady && anyKeyFlag) {
        controlsFadingOut = true;
        controlsFadeOut = 0;
        anyKeyFlag = false;
      }
    }

    function renderControls() {
      ctx.fillStyle = 'rgba(10, 10, 18, 0.92)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.textAlign = 'center';
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      // Title
      ctx.fillStyle = '#e8d0b0';
      ctx.font = 'bold 22px monospace';
      ctx.fillText('CONTROLS', cx, cy - 110);

      // Underline
      ctx.fillStyle = '#6644aa';
      ctx.fillRect(cx - 60, cy - 104, 120, 2);

      ctx.font = '15px monospace';
      ctx.fillStyle = '#e8d0b0';
      const lines = [
        'MOVE:  Arrow Keys / WASD',
        'JUMP:  Space (hold for higher)',
        'CROUCH:  Down / S',
        'ATTACK:  X',
        'LUCK (Soothe):  Z  --  Freezes nearby enemies',
      ];
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], cx, cy - 60 + i * 30);
      }

      // Press any key
      if (controlsAnyKeyReady) {
        const blink = Math.sin(controlsTimer * 3) > 0;
        if (blink) {
          ctx.globalAlpha = 0.7;
          ctx.font = '14px monospace';
          ctx.fillStyle = '#e8d0b0';
          ctx.fillText('Press any key to start', cx, cy + 80);
        }
      }
      ctx.restore();

      // Fade out
      if (controlsFadingOut) {
        ctx.save();
        ctx.globalAlpha = Math.min(controlsFadeOut, 1);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- In-game Hint System ---
    let gameplayTimer = 0;
    let vinNameTimer = 0;
    const vinNameDuration = 3.0; // show for 3 seconds then fade

    let hintAttackShown = false;
    let hintAttackFade = 1;
    let hintJumpShown = false;
    let hintJumpFade = 1;
    let hintLuckShown = false;
    let hintLuckFade = 1;
    let hasAttacked = false;
    let hasJumped = false;
    let hasUsedLuck = false;
    let firstThugLabelShown = false;
    let firstThugLabelTimer = 0;
    let firstGuardLabelShown = false;
    let firstGuardLabelTimer = 0;

    // Lore snippet system
    const loreSnippets = [
      { col: 20, text: "Vin had learned to be invisible. It was the only way to survive.", shown: false, alpha: 0, timer: 0 },
      { col: 50, text: "She could feel it sometimes -- a strange pull in her chest.", shown: false, alpha: 0, timer: 0 },
      { col: 90, text: "The garrison patrols were getting tighter. Something had the nobles nervous.", shown: false, alpha: 0, timer: 0 },
      { col: 130, text: "The alley narrowed. She'd gone too far.", shown: false, alpha: 0, timer: 0 },
    ];

    function renderInGameHints() {
      const playerCol = Math.floor(player.x / TILE);
      const dt = 0.016; // approximate

      // --- "Vin" name label above player at game start ---
      vinNameTimer += dt;
      if (vinNameTimer < vinNameDuration + 1) {
        let nameAlpha = 1;
        if (vinNameTimer < 0.5) nameAlpha = vinNameTimer / 0.5; // fade in
        else if (vinNameTimer > vinNameDuration) nameAlpha = Math.max(0, 1 - (vinNameTimer - vinNameDuration)); // fade out
        if (nameAlpha > 0) {
          const px = player.x + player.width / 2 - camera.x;
          const py = player.y - camera.y - 20;
          ctx.save();
          ctx.globalAlpha = nameAlpha * 0.85;
          ctx.fillStyle = '#e8d0b0';
          ctx.font = '12px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('VIN', px, py);
          ctx.restore();
        }
      }

      // --- Lore snippets ---
      for (const lore of loreSnippets) {
        if (!lore.shown && playerCol >= lore.col) {
          lore.shown = true;
          lore.alpha = 1;
          lore.timer = 0;
        }
        if (lore.shown && lore.alpha > 0) {
          lore.timer += dt;
          if (lore.timer > 3) lore.alpha = Math.max(0, lore.alpha - dt * 0.8);
          if (lore.alpha > 0) {
            ctx.save();
            ctx.globalAlpha = lore.alpha * 0.85;
            ctx.fillStyle = '#e8d0b0';
            ctx.font = 'italic 13px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(lore.text, canvas.width / 2, canvas.height - 60);
            ctx.restore();
          }
        }
      }

      // --- Enemy labels ---
      if (!firstThugLabelShown) {
        for (const e of enemies) {
          if (e.type === 'thug' && e.alive) {
            const sx = e.x - camera.x;
            if (sx > 0 && sx < canvas.width) {
              firstThugLabelShown = true;
              firstThugLabelTimer = 3;
              break;
            }
          }
        }
      }
      if (firstThugLabelTimer > 0) {
        firstThugLabelTimer -= dt;
        const alpha = Math.min(1, firstThugLabelTimer);
        for (const e of enemies) {
          if (e.type === 'thug' && e.alive) {
            const sx = e.x - camera.x + e.width / 2;
            const sy = e.y - camera.y - 16;
            if (sx > 0 && sx < canvas.width) {
              ctx.save();
              ctx.globalAlpha = alpha * 0.9;
              ctx.fillStyle = '#cc8844';
              ctx.font = 'bold 10px monospace';
              ctx.textAlign = 'center';
              ctx.fillText("CAMON'S THUGS", sx, sy);
              ctx.restore();
              break;
            }
          }
        }
      }

      if (!firstGuardLabelShown && playerCol >= 70) {
        for (const e of enemies) {
          if (e.type === 'guard' && e.alive) {
            const sx = e.x - camera.x;
            if (sx > 0 && sx < canvas.width) {
              firstGuardLabelShown = true;
              firstGuardLabelTimer = 3;
              break;
            }
          }
        }
      }
      if (firstGuardLabelTimer > 0) {
        firstGuardLabelTimer -= dt;
        const alpha = Math.min(1, firstGuardLabelTimer);
        for (const e of enemies) {
          if (e.type === 'guard' && e.alive) {
            const sx = e.x - camera.x + e.width / 2;
            const sy = e.y - camera.y - 16;
            if (sx > 0 && sx < canvas.width) {
              ctx.save();
              ctx.globalAlpha = alpha * 0.9;
              ctx.fillStyle = '#cc3333';
              ctx.font = 'bold 10px monospace';
              ctx.textAlign = 'center';
              ctx.fillText("LORD RULER'S GARRISON", sx, sy);
              ctx.restore();
              break;
            }
          }
        }
      }

      // --- Floating gameplay hints (first 30 seconds) ---
      if (gameplayTimer < 30) {
        // Track actions
        if (player.attacking) hasAttacked = true;
        if (!player.onGround && player.vy < 0) hasJumped = true;
        if (player.luckCooldown > 0) hasUsedLuck = true;

        // Attack hint near first thug
        if (!hasAttacked && enemies.length > 0 && enemies[0].alive) {
          const e = enemies[0];
          const dist = Math.abs(player.x - e.x);
          if (dist < 200) {
            ctx.save();
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = '#e8d0b0';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            const sx = e.x - camera.x + e.width / 2;
            const sy = e.y - camera.y - 30;
            ctx.fillText('Press X to attack', sx, sy);
            ctx.restore();
          }
        }

        // Jump hint near first gap (col 13-15)
        if (!hasJumped && playerCol >= 10 && playerCol <= 16) {
          ctx.save();
          ctx.globalAlpha = 0.85;
          ctx.fillStyle = '#e8d0b0';
          ctx.font = '12px monospace';
          ctx.textAlign = 'center';
          const sx = 14 * TILE - camera.x;
          const sy = 13 * TILE - camera.y;
          ctx.fillText('Hold SPACE for higher jump', sx, sy);
          ctx.restore();
        }

        // (Luck hint removed - player discovers it naturally)
      }

      // --- Section name + progress bar ---
      let sectionName = 'THE SLUMS';
      let sectionProgress = 0;
      if (playerCol >= 140) {
        sectionName = 'THE DEAD END';
        sectionProgress = Math.min(1, (playerCol - 140) / 55);
      } else if (playerCol >= 70) {
        sectionName = 'THE BORDER';
        sectionProgress = Math.min(1, (playerCol - 70) / 70);
      } else {
        sectionProgress = Math.min(1, playerCol / 70);
      }

      ctx.save();
      ctx.textAlign = 'center';
      ctx.fillStyle = '#e8d0b0';
      ctx.globalAlpha = 0.6;
      ctx.font = '11px monospace';
      ctx.fillText(sectionName, canvas.width / 2, 18);
      // Progress underline
      const pbW = 80;
      const pbX = canvas.width / 2 - pbW / 2;
      ctx.fillStyle = '#444';
      ctx.fillRect(pbX, 22, pbW, 2);
      ctx.fillStyle = '#6644aa';
      ctx.fillRect(pbX, 22, pbW * sectionProgress, 2);
      ctx.restore();
    }

    // --- Section Transition Cutscene ---
    let currentTransitionKey = '';
    let currentTransitionTexts = [];

    function startTransition(key) {
      gameState = 'transition';
      currentTransitionKey = key;
      currentTransitionTexts = transitionTexts[key];
      transitionPhase = 0;
      transitionTimer = 0;
      transitionTextIndex = 0;
      transitionCharIndex = 0;
      transitionCharTimer = 0;
      transitionDisplayedText = '';
      transitionFadeAlpha = 0;
    }

    function updateTransition(dt) {
      transitionTimer += dt;

      switch (transitionPhase) {
        case 0: // Fade to black
          transitionFadeAlpha = Math.min(1, transitionFadeAlpha + dt * 1.5);
          if (transitionFadeAlpha >= 1) {
            transitionPhase = 1;
            transitionTimer = 0;
            transitionCharIndex = 0;
            transitionCharTimer = 0;
            transitionDisplayedText = '';
          }
          break;

        case 1: // Brief hold on black, then fade back in
          if (transitionTimer > 0.5) {
            transitionPhase = 2;
            transitionTimer = 0;
          }
          break;

        case 2: // Fade back in
          transitionFadeAlpha = Math.max(0, transitionFadeAlpha - dt * 1.5);
          if (transitionFadeAlpha <= 0) {
            gameState = 'playing';
          }
          break;
      }
    }

    function renderTransition() {
      const W = canvas.width;
      const H = canvas.height;

      // Black overlay
      ctx.save();
      ctx.globalAlpha = transitionFadeAlpha;
      ctx.fillStyle = '#050308';
      ctx.fillRect(0, 0, W, H);

      ctx.restore();
    }

    function checkSectionTransitions() {
      if (gameState !== 'playing') return;
      const playerCol = Math.floor(player.x / TILE);

      if (!transitionTriggered.slumsToBorder && playerCol >= 69) {
        transitionTriggered.slumsToBorder = true;
        startTransition('slumsToBorder');
      }

      if (!transitionTriggered.borderToDeadEnd && playerCol >= 139) {
        transitionTriggered.borderToDeadEnd = true;
        startTransition('borderToDeadEnd');
      }
    }

    // --- Ending Cutscene ---
    const endingTexts = [
      "She didn't understand what she'd done. Only that it worked.",
      "The mists curled around her like they knew.",
      "And somewhere in the mists... someone was watching."
    ];

    function updateEnding(dt) {
      endingTimer += dt;

      switch (endingPhase) {
        case 0: // Vignette darkens, first text
          endingVignetteAlpha = Math.min(0.6, endingVignetteAlpha + dt * 0.5);
          if (!endingTextStarted && endingTimer > 0.5) {
            endingTextStarted = true;
            endingText = endingTexts[0];
            endingCharIndex = 0;
            endingCharTimer = 0;
            endingDisplayedText = '';
          }
          if (endingText) {
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 3) {
              endingPhase = 1;
              endingTimer = 0;
            }
          }
          break;

        case 1: // Luck pulse + guards flee
          endingPulseTimer += dt;
          // Create a big pulse effect at start
          if (endingTimer < 0.1) {
            effects.push({
              type: 'luckPulse',
              x: player.x + player.width / 2,
              y: player.y + player.height / 2,
              radius: 0,
              maxRadius: 300,
              timer: 0,
              duration: 1.5,
            });
          }
          // Make guards wander away
          if (!endingGuardsCleared) {
            for (const g of deadEndGuards) {
              if (g.alive) {
                g.soothed = true;
                g.sootheTimer = 999;
                g.detecting = false;
                g.facing = -1; // face left (away from dead end)
                g.x -= 80 * dt; // move them offscreen to the left
              }
            }
            if (endingTimer > 3) {
              endingGuardsCleared = true;
              // Remove them
              for (const g of deadEndGuards) {
                g.alive = false;
                g.deathTimer = 999;
              }
            }
          }
          if (endingTimer > 3.5) {
            endingPhase = 2;
            endingTimer = 0;
            endingText = endingTexts[1];
            endingCharIndex = 0;
            endingCharTimer = 0;
            endingDisplayedText = '';
          }
          break;

        case 2: // Second text
          {
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 3) {
              endingPhase = 3;
              endingTimer = 0;
              endingDisplayedText = '';
              // Store target for camera pan up
              endingCameraPanTarget = camera.y - 200;
            }
          }
          break;

        case 3: // Fade to cinematic black, then reveal Kelsier
          {
            // Fade tile rendering to black over 2 seconds
            endingCinematicFade = Math.min(1, endingCinematicFade + dt * 0.5);
            if (endingTimer > 2.5) {
              endingPhase = 4;
              endingTimer = 0;
              endingText = endingTexts[2];
              endingCharIndex = 0;
              endingCharTimer = 0;
              endingDisplayedText = '';
              endingCinematicFade = 1;
              endingKelsierReveal = 0;
            }
          }
          break;

        case 4: // Kelsier cinematic reveal + "Someone was watching."
          {
            endingKelsierReveal = Math.min(1, (endingKelsierReveal || 0) + dt * 0.4);
            const tw = typewriterUpdate(endingText, endingCharIndex, endingCharTimer, dt, 0.04);
            endingCharIndex = tw.charIndex;
            endingCharTimer = tw.charTimer;
            endingDisplayedText = endingText.substring(0, endingCharIndex);
            if (endingCharIndex >= endingText.length && endingTimer > 4) {
              endingPhase = 5;
              endingTimer = 0;
            }
          }
          break;

        case 5: // Fade to black
          endingFadeAlpha = Math.min(1, endingFadeAlpha + dt * 0.5);
          if (endingTimer > 2) {
            gameState = 'complete';
          }
          break;
      }
    }

    function renderKelsierSilhouette() {
      // Luthadel rooftop cityscape at night - a dark figure watches from above
      const W = canvas.width;
      const H = canvas.height;
      const reveal = endingKelsierReveal || 0;

      ctx.save();

      // --- Night sky with red-tinged ash clouds ---
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
      skyGrad.addColorStop(0, '#0a0614');
      skyGrad.addColorStop(0.3, '#14101e');
      skyGrad.addColorStop(0.6, '#1e1420');
      skyGrad.addColorStop(1, '#12101a');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // Dim red glow on horizon (ashmounts in distance)
      const horizonGrad = ctx.createLinearGradient(0, H * 0.35, 0, H * 0.55);
      horizonGrad.addColorStop(0, 'rgba(80, 20, 15, 0)');
      horizonGrad.addColorStop(0.5, 'rgba(80, 25, 15, 0.15)');
      horizonGrad.addColorStop(1, 'rgba(40, 10, 8, 0)');
      ctx.fillStyle = horizonGrad;
      ctx.fillRect(0, H * 0.35, W, H * 0.2);

      // Moon (large, pale, partially behind clouds)
      const moonX = W * 0.72;
      const moonY = H * 0.18;
      const moonR = Math.min(W, H) * 0.06;
      // Moon glow
      const moonGlow = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 4);
      moonGlow.addColorStop(0, 'rgba(180, 175, 200, 0.12)');
      moonGlow.addColorStop(0.5, 'rgba(120, 115, 140, 0.04)');
      moonGlow.addColorStop(1, 'rgba(60, 55, 80, 0)');
      ctx.fillStyle = moonGlow;
      ctx.fillRect(0, 0, W, H * 0.5);
      // Moon disc
      ctx.fillStyle = '#c8c0d8';
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#b0a8c0';
      ctx.beginPath();
      ctx.arc(moonX - moonR * 0.25, moonY + moonR * 0.1, moonR * 0.3, 0, Math.PI * 2);
      ctx.fill();

      // --- Luthadel skyline - jagged rooftops, spires, Kredik Shaw ---
      const roofY = H * 0.5;

      // Far background buildings (darker, smaller)
      ctx.fillStyle = '#0e0a16';
      const farBuildings = [
        [0.05, 0.38], [0.12, 0.35], [0.18, 0.4], [0.25, 0.32], [0.3, 0.42],
        [0.38, 0.36], [0.45, 0.3], [0.52, 0.38], [0.6, 0.34], [0.68, 0.4],
        [0.75, 0.37], [0.82, 0.33], [0.88, 0.39], [0.95, 0.36]
      ];
      for (const [bx, by] of farBuildings) {
        const bw = W * 0.06 + Math.sin(bx * 17) * W * 0.02;
        ctx.fillRect(bx * W - bw / 2, by * H, bw, H);
      }

      // Kredik Shaw spires (center-left, tall and menacing)
      ctx.fillStyle = '#0c0812';
      const ksX = W * 0.35;
      // Central tower
      ctx.beginPath();
      ctx.moveTo(ksX - W * 0.015, H * 0.45);
      ctx.lineTo(ksX - W * 0.004, H * 0.15);
      ctx.lineTo(ksX + W * 0.004, H * 0.15);
      ctx.lineTo(ksX + W * 0.015, H * 0.45);
      ctx.closePath();
      ctx.fill();
      // Side spires
      for (const offset of [-0.04, -0.025, 0.025, 0.04]) {
        const spireTop = H * (0.22 + Math.abs(offset) * 2);
        ctx.beginPath();
        ctx.moveTo(ksX + offset * W - W * 0.003, H * 0.45);
        ctx.lineTo(ksX + offset * W, spireTop);
        ctx.lineTo(ksX + offset * W + W * 0.003, H * 0.45);
        ctx.closePath();
        ctx.fill();
      }

      // Mid buildings
      ctx.fillStyle = '#100c18';
      const midBuildings = [
        [0.0, 0.44, 0.08], [0.1, 0.42, 0.06], [0.55, 0.43, 0.07],
        [0.65, 0.41, 0.05], [0.72, 0.44, 0.06], [0.8, 0.42, 0.08],
        [0.9, 0.43, 0.07], [0.98, 0.45, 0.05]
      ];
      for (const [bx, by, bw] of midBuildings) {
        ctx.fillRect(bx * W, by * H, bw * W, H);
        // Occasional dim window
        if (Math.sin(bx * 37) > 0.2) {
          ctx.fillStyle = 'rgba(180, 140, 60, 0.08)';
          ctx.fillRect(bx * W + bw * W * 0.3, by * H + H * 0.02, W * 0.005, H * 0.008);
          ctx.fillStyle = '#100c18';
        }
      }

      // --- Foreground rooftop (where the figure stands) ---
      // This is the main rooftop - right side of screen, closer to viewer
      const roofTop = H * 0.55;
      const roofLeft = W * 0.55;

      // Rooftop surface
      ctx.fillStyle = '#16121e';
      ctx.beginPath();
      ctx.moveTo(roofLeft, roofTop);
      ctx.lineTo(roofLeft + W * 0.05, roofTop - H * 0.02);
      ctx.lineTo(W, roofTop - H * 0.01);
      ctx.lineTo(W, H);
      ctx.lineTo(roofLeft, H);
      ctx.closePath();
      ctx.fill();

      // Rooftop edge detail
      ctx.fillStyle = '#1e1828';
      ctx.fillRect(roofLeft, roofTop - 1, W - roofLeft, 3);

      // Building wall below rooftop
      ctx.fillStyle = '#12101a';
      ctx.fillRect(roofLeft + W * 0.02, roofTop, W * 0.5, H - roofTop);

      // --- THE FIGURE (Kelsier) - silhouette on the rooftop edge ---
      const figAlpha = reveal;
      ctx.globalAlpha = figAlpha;

      const fx = W * 0.72; // positioned on the right side rooftop
      const fy = roofTop; // standing on the roof edge
      const s = Math.min(W, H) / 380; // smaller, more distant = cooler

      // Mistcloak tendrils flowing in the wind (behind, to the left)
      ctx.fillStyle = '#0a0812';
      for (let i = 0; i < 7; i++) {
        const tendrilLen = (30 + i * 10) * s;
        const sway = Math.sin(bgTime * 0.5 + i * 0.9) * 6 * s;
        const sway2 = Math.sin(bgTime * 0.35 + i * 1.3) * 4 * s;
        const startX = fx - 6 * s;
        const startY = fy - 40 * s;
        const endX = startX - tendrilLen * 0.7 + sway;
        const endY = startY + tendrilLen * 0.5 + sway2;

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(startX - tendrilLen * 0.3 + sway2, startY + tendrilLen * 0.2, endX, endY);
        ctx.lineTo(endX + 2 * s, endY + 1 * s);
        ctx.quadraticCurveTo(startX - tendrilLen * 0.2 + sway2, startY + tendrilLen * 0.15, startX + 2 * s, startY + 2 * s);
        ctx.closePath();
        ctx.fill();
      }

      // Body silhouette - simple, clean, confident pose
      ctx.fillStyle = '#0a0812';

      // Legs - one foot on ledge edge, relaxed confident stance
      ctx.fillRect(fx - 5 * s, fy - 20 * s, 5 * s, 20 * s);
      ctx.fillRect(fx + 2 * s, fy - 18 * s, 5 * s, 18 * s);
      // Front foot slightly forward on the edge
      ctx.fillRect(fx + 2 * s, fy - 2 * s, 7 * s, 2 * s);

      // Torso
      ctx.fillRect(fx - 7 * s, fy - 42 * s, 16 * s, 22 * s);

      // Shoulders
      ctx.fillRect(fx - 10 * s, fy - 44 * s, 22 * s, 5 * s);

      // Arms - one arm relaxed, one slightly out
      // Left arm (relaxed at side)
      ctx.save();
      ctx.translate(fx - 10 * s, fy - 40 * s);
      ctx.rotate(-0.1);
      ctx.fillRect(0, 0, 5 * s, 22 * s);
      ctx.restore();
      // Right arm (resting on knee/hip, casual)
      ctx.save();
      ctx.translate(fx + 8 * s, fy - 40 * s);
      ctx.rotate(0.2);
      ctx.fillRect(0, 0, 5 * s, 18 * s);
      ctx.restore();

      // Neck
      ctx.fillRect(fx - 2 * s, fy - 48 * s, 6 * s, 6 * s);

      // Head
      ctx.beginPath();
      ctx.arc(fx + 1 * s, fy - 54 * s, 7 * s, 0, Math.PI * 2);
      ctx.fill();

      // Hair - messy, windswept (tufts blowing to the left with the cloak)
      ctx.beginPath();
      ctx.moveTo(fx - 6 * s, fy - 59 * s);
      ctx.lineTo(fx - 9 * s, fy - 64 * s);
      ctx.lineTo(fx - 4 * s, fy - 62 * s);
      ctx.lineTo(fx - 2 * s, fy - 68 * s);
      ctx.lineTo(fx + 1 * s, fy - 63 * s);
      ctx.lineTo(fx + 4 * s, fy - 67 * s);
      ctx.lineTo(fx + 6 * s, fy - 61 * s);
      ctx.lineTo(fx + 8 * s, fy - 64 * s);
      ctx.lineTo(fx + 8 * s, fy - 58 * s);
      ctx.closePath();
      ctx.fill();

      // --- Mist drifting across the scene ---
      ctx.globalAlpha = reveal;
      for (let m = 0; m < 15; m++) {
        const my = H * 0.3 + m * H * 0.045;
        const mx = (bgTime * 15 + m * 120) % (W + 200) - 100;
        const mLen = 40 + Math.sin(m * 3.7) * 25;
        const mAlpha = 0.03 + Math.sin(bgTime * 0.4 + m) * 0.015;
        ctx.strokeStyle = `rgba(160, 155, 180, ${mAlpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.quadraticCurveTo(mx + mLen * 0.5, my + Math.sin(bgTime * 0.6 + m) * 3, mx + mLen, my + Math.sin(bgTime * 0.3 + m * 2) * 2);
        ctx.stroke();
      }

      // Mist pooling around the rooftops
      for (let m = 0; m < 10; m++) {
        const mx = W * 0.1 + m * W * 0.09;
        const my = roofTop + Math.sin(m * 2.1) * H * 0.03;
        const mGrad = ctx.createRadialGradient(mx, my, 2, mx, my, W * 0.06);
        mGrad.addColorStop(0, `rgba(120, 115, 145, ${0.04 * reveal})`);
        mGrad.addColorStop(1, 'rgba(80, 75, 100, 0)');
        ctx.fillStyle = mGrad;
        ctx.beginPath();
        ctx.arc(mx, my, W * 0.06, 0, Math.PI * 2);
        ctx.fill();
      }

      // Falling ash particles
      ctx.fillStyle = 'rgba(100, 90, 80, 0.15)';
      for (let a = 0; a < 20; a++) {
        const ax = (a * W * 0.07 + bgTime * 8 * (0.5 + Math.sin(a) * 0.3)) % W;
        const ay = (a * H * 0.06 + bgTime * 12 * (0.3 + Math.cos(a * 1.3) * 0.2)) % H;
        ctx.beginPath();
        ctx.arc(ax, ay, 1, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function renderEndingOverlay() {
      // Vignette
      if (endingVignetteAlpha > 0) {
        ctx.save();
        const gradient = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, canvas.width * 0.2,
          canvas.width / 2, canvas.height / 2, canvas.width * 0.7
        );
        gradient.addColorStop(0, 'rgba(0,0,0,0)');
        gradient.addColorStop(1, `rgba(0,0,0,${endingVignetteAlpha})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      // Blue-purple pulse during phase 1
      if (endingPhase === 1 && endingPulseTimer < 1.5) {
        const pulseAlpha = Math.max(0, 0.3 - endingPulseTimer * 0.2);
        ctx.save();
        ctx.globalAlpha = pulseAlpha;
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      // Cinematic fade to black during phase 3+ (hides tile world)
      if (endingCinematicFade > 0) {
        ctx.save();
        ctx.globalAlpha = endingCinematicFade;
        ctx.fillStyle = '#050308';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      // Text overlay — centered narration style
      if (endingDisplayedText && endingDisplayedText.length > 0) {
        ctx.save();
        ctx.fillStyle = '#e8e0d0';
        ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        ctx.globalAlpha = 0.9;
        ctx.fillText(endingDisplayedText, canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }

      // Final fade to black
      if (endingFadeAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = endingFadeAlpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- Completion Screen ---
    let completeBlinkTimer = 0;
    let completeAnyKeyReady = false;
    let completeTimer = 0;

    function updateComplete(dt) {
      completeTimer += dt;
      completeBlinkTimer += dt;
      if (!completeAnyKeyReady && completeTimer > 1) {
        completeAnyKeyReady = true;
        anyKeyFlag = false;
      }
      if (completeAnyKeyReady && anyKeyFlag) {
        resetGame();
        anyKeyFlag = false;
      }
    }

    function renderComplete() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Ash particles still fall
      updateParticles(0.016);
      renderParticles();

      ctx.save();
      ctx.fillStyle = '#e8e0d0';
      ctx.textAlign = 'center';

      // "Level 1 Complete"
      ctx.font = '28px monospace';
      ctx.fillText('Level 1 Complete', canvas.width / 2, canvas.height / 2 - 40);

      // Boxings collected
      ctx.font = '16px monospace';
      ctx.fillText('Boxings collected: ' + player.boxings, canvas.width / 2, canvas.height / 2 + 10);

      // "To be continued..."
      const blink1 = Math.sin(completeBlinkTimer * 2) > 0;
      if (blink1) {
        ctx.globalAlpha = 0.8;
        ctx.fillText('To be continued...', canvas.width / 2, canvas.height / 2 + 50);
      }

      // "Press any key to play again"
      if (completeAnyKeyReady) {
        const blink2 = Math.sin(completeBlinkTimer * 3) > 0;
        if (blink2) {
          ctx.globalAlpha = 0.6;
          ctx.font = '14px monospace';
          ctx.fillText('Press any key to play again', canvas.width / 2, canvas.height / 2 + 90);
        }
      }

      ctx.restore();
    }

    // --- Reset Game ---
