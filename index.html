      // Reset title state
      titleTimer = 0;
      titleFadingOut = false;
      titleFadeOut = 0;
      titleAnyKeyReady = false;
      // Reset opening state
      openingTimer = 0;
      openingFadeIn = 0;
      openingLineIndex = 0;
      openingCharIndex = 0;
      openingCharTimer = 0;
      openingPauseTimer = 0;
      openingDone = false;
      openingBlinkTimer = 0;
      openingDisplayedLines = [];
      openingFadeOut = 0;
      openingFadingOut = false;
      openingAnyKeyReady = false;
      openingScreen = 0;
      openingScreenFade = 0;
      curOpeningLines = openingScreens[0].lines;
      curOpeningPauses = openingScreens[0].pauses;
      // Reset controls state
      controlsTimer = 0;
      controlsAnyKeyReady = false;
      controlsFadingOut = false;
      controlsFadeOut = 0;
      // Reset hints
      gameplayTimer = 0;
      vinNameTimer = 0;
      hintAttackShown = false;
      hintJumpShown = false;
      hintLuckShown = false;
      hasAttacked = false;
      hasJumped = false;
      hasUsedLuck = false;
      firstThugLabelShown = false;
      firstThugLabelTimer = 0;
      firstGuardLabelShown = false;
      firstGuardLabelTimer = 0;
      for (const lore of loreSnippets) { lore.shown = false; lore.alpha = 0; lore.timer = 0; }
      // Reset transition state
      transitionTriggered = { slumsToBorder: false, borderToDeadEnd: false };
      transitionPhase = 0;
      transitionTimer = 0;
      transitionTextIndex = 0;
      transitionDisplayedText = '';
      // Reset ending state
      endingPhase = 0;
      endingTimer = 0;
      endingText = '';
      endingCharIndex = 0;
      endingCharTimer = 0;
      endingPauseTimer = 0;
      endingDisplayedText = '';
      endingVignetteAlpha = 0;
      endingPulseTimer = 0;
      endingCameraPanTarget = 0;
      endingFadeAlpha = 0;
      endingCinematicFade = 0;
      endingKelsierReveal = 0;
      endingGuardsCleared = false;
      endingTextStarted = false;
      // Reset completion state
      completeBlinkTimer = 0;
      completeAnyKeyReady = false;
      completeTimer = 0;
      // Reset player
      player.x = SPAWN_X;
      player.y = 14 * TILE;
      player.vx = 0;
      player.vy = 0;
      player.hp = player.maxHp;
      player.boxings = 0;
      player.dead = false;
      player.deadTimer = 0;
      player.checkpoint = 0;
      player.invincible = false;
      player.invincibleTimer = 0;
      player.attacking = false;
      player.attackTimer = 0;
      player.luckCooldown = 0;
      player.luckActive = false;
      player.onGround = false;
      // Rebuild all enemies from scratch (some may have been spliced)
      initEnemies();
      // Reset pickups
      for (const p of pickups) {
        p.collected = false;
      }
      // Reset crumble state
      for (const key in crumbleState) {
        delete crumbleState[key];
      }
      anyKeyFlag = false;
      // Reset environment
      gameParticles.length = 0;
      screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0; screenShake.timer = 0;
      for (const rat of rats) {
        rat.triggered = false;
        rat.vx = 0;
        rat.alpha = 1;
      }
      rats[0].x = 20 * TILE; rats[1].x = 55 * TILE; rats[2].x = 100 * TILE; rats[3].x = 145 * TILE;
    }

    // --- Dead End Trigger ---
    function checkDeadEndTrigger() {
      if (gameState === 'playing' && player.x > 185 * TILE) {
        gameState = 'ending';
        endingPhase = 0;
        endingTimer = 0;
        endingDisplayedText = '';
        endingVignetteAlpha = 0;
        endingPulseTimer = 0;
        endingFadeAlpha = 0;
        endingCinematicFade = 0;
        endingKelsierReveal = 0;
        endingGuardsCleared = false;
      endingTextStarted = false;
      }
    }

    let lastTime = 0;
    let attackSparkSpawned = false;
    function gameLoop(timestamp) {
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      const safeDt = Math.min(dt, 0.1);

      if (gameState === 'title') {
        updateTitle(safeDt);
        renderTitle();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === 'opening') {
        updateOpening(safeDt);
        renderOpening();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === 'controls') {
        updateControls(safeDt);
        renderControls();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === 'complete') {
        updateComplete(safeDt);
        renderComplete();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === 'transition') {
        bgTime += safeDt;
        updateTransition(safeDt);
        // Render world underneath the transition overlay
        ctx.save();
        ctx.translate(screenShake.x, screenShake.y);
        renderBackground(safeDt);
        renderTiles();
        renderEnvironment();
        renderAshClumps();
        renderPickups();
        renderEnemies();
        renderSoothedIndicators();
        renderEffects();
        renderGameParticles();
        renderPlayer();
        updateParticles(safeDt);
        renderParticles();
        ctx.restore();
        renderTransition();
        requestAnimationFrame(gameLoop);
        return;
      }

      // Track previous grounded state for landing dust
      const wasOnGround = prevOnGround;

      // Update gameplay (only when playing)
      if (gameState === 'playing') {
        updatePlayer(safeDt);
        updatePickups(safeDt);
        updateEnemies(safeDt);
        updateCombat(safeDt);
        updateCrumbleTiles(safeDt);
        updateAshClumps(safeDt);
        updateEffects(safeDt);
        updateAnimation(safeDt);
        updateCamera();
        updateMusicIntensity();
        checkDeadEndTrigger();
        updateEnvironment(safeDt);

        // Running dust
        if (player.onGround && Math.abs(player.vx) > 50 && !player.dead) {
          runDustTimer += safeDt;
          if (runDustTimer > 0.08) {
            runDustTimer = 0;
            spawnRunDust();
          }
        } else {
          runDustTimer = 0;
        }

        // Landing dust
        if (player.onGround && !wasOnGround && !player.dead) {
          spawnLandingDust();
        }
        prevOnGround = player.onGround;
      }

      if (gameState === 'ending') {
        updateEnding(safeDt);
        updateEffects(safeDt);
        updateAnimation(safeDt);
        // Camera update handled by ending phases
      }

      // Update screen shake and game particles
      updateScreenShake(safeDt);
      updateGameParticles(safeDt);

      // Apply screen shake offset for world rendering
      ctx.save();
      ctx.translate(screenShake.x, screenShake.y);

      // Always render world
      renderBackground(safeDt);
      renderTiles();
      renderEnvironment();
      renderAshClumps();
      renderPickups();
      renderEnemies();
      renderSoothedIndicators();
      renderEffects();
      renderGameParticles();
      renderPlayer();

      // Mist curling around Vin during ending phase 2+
      if (gameState === 'ending' && endingPhase >= 2 && endingPhase < 5) {
        const px = player.x + player.width / 2 - camera.x;
        const py = player.y + player.height / 2 - camera.y;
        const mistIntensity = Math.min(1, (endingPhase === 2 ? endingTimer * 0.4 : 1));
        // Swirling mist tendrils around Vin
        for (let m = 0; m < 16; m++) {
          const angle = bgTime * 0.4 + m * (Math.PI * 2 / 16);
          const r = 25 + m * 4 + Math.sin(bgTime * 0.6 + m * 1.5) * 12;
          const mx = px + Math.cos(angle) * r;
          const my = py + Math.sin(angle) * r * 0.5;
          const mAlpha = (0.06 + Math.sin(bgTime * 0.8 + m * 2) * 0.03) * mistIntensity;
          ctx.strokeStyle = `rgba(180, 175, 200, ${mAlpha})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const sx = mx + i * 5;
            const sy = my + Math.sin(bgTime * 0.7 + m + i * 0.6) * 4;
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
          }
          ctx.stroke();
        }
        // Larger mist glow around her
        const mistGlow = ctx.createRadialGradient(px, py, 10, px, py, 80);
        mistGlow.addColorStop(0, `rgba(140, 135, 170, ${0.08 * mistIntensity})`);
        mistGlow.addColorStop(0.5, `rgba(120, 115, 150, ${0.04 * mistIntensity})`);
        mistGlow.addColorStop(1, 'rgba(100, 95, 130, 0)');
        ctx.fillStyle = mistGlow;
        ctx.beginPath();
        ctx.arc(px, py, 80, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ash particles
      updateParticles(safeDt);
      renderParticles();

      // End screen shake (world rendering done)
      ctx.restore();

      // Death overlay (only during playing) - NOT shaken
      if (gameState === 'playing' && player.dead) {
        const deathAlpha = Math.min(player.deadTimer / 0.5, 0.7);
        ctx.save();
        ctx.globalAlpha = deathAlpha;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
        if (player.deadTimer > 0.5) {
          ctx.save();
          ctx.globalAlpha = Math.min((player.deadTimer - 0.5) / 0.3, 1);
          ctx.fillStyle = '#e8d0b0';
          ctx.font = '20px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('The mists claim another...', canvas.width / 2, canvas.height / 2);
          ctx.textAlign = 'left';
          ctx.restore();
        }
      }

      // Ending overlay
      if (gameState === 'ending') {
        renderEndingOverlay();
      }

      // HUD (only during playing) - NOT shaken
      if (gameState === 'playing') {
        gameplayTimer += safeDt;
        renderHUD();
        renderInGameHints();
      }

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
