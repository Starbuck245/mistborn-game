<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta property="og:title" content="Mistborn: Ash and Shadows">
  <meta property="og:description" content="A 2D platformer set in the world of Mistborn. Play as Vin, survive the streets of Luthadel, and discover your hidden power.">
  <meta property="og:type" content="website">
  <meta name="description" content="A 2D platformer set in the world of Mistborn. Play as Vin, survive the streets of Luthadel, and discover your hidden power.">
  <title>Mistborn: Ash and Shadows</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; overflow: hidden; }
    canvas { display: block; }
    /* --- Mobile Touch Controls --- */
    #touch-controls { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 160px; z-index: 100; pointer-events: none; }
    #touch-controls .tb { pointer-events: auto; position: absolute; border-radius: 14px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.55); font-family: monospace; font-weight: bold; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
    #touch-controls .tb:active { background: rgba(255,255,255,0.3); }
    #tb-left { width: 60px; height: 60px; left: 16px; bottom: 24px; font-size: 26px; }
    #tb-right { width: 60px; height: 60px; left: 86px; bottom: 24px; font-size: 26px; }
    #tb-jump { width: 70px; height: 70px; right: 16px; bottom: 24px; font-size: 14px; letter-spacing: 1px; }
    #tb-attack { width: 55px; height: 55px; right: 24px; bottom: 104px; font-size: 13px; }
    #tb-luck { width: 45px; height: 45px; right: 96px; bottom: 104px; font-size: 12px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="touch-controls">
    <div class="tb" id="tb-left">&#9664;</div>
    <div class="tb" id="tb-right">&#9654;</div>
    <div class="tb" id="tb-jump">JUMP</div>
    <div class="tb" id="tb-attack">ATK</div>
    <div class="tb" id="tb-luck">LUCK</div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Input System ---
    const keys = {};
    const input = {
      get left() { return keys['ArrowLeft'] || keys['KeyA']; },
      get right() { return keys['ArrowRight'] || keys['KeyD']; },
      get jump() { return keys['Space']; },
      get attack() { return keys['KeyX'] || keys['KeyJ']; },
      get luck() { return keys['KeyZ'] || keys['KeyK']; },
      get crouch() { return keys['ArrowDown'] || keys['KeyS']; },
    };
    window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); initAudio(); });
    window.addEventListener('keyup', e => { keys[e.code] = false; });
    window.addEventListener('click', () => { initAudio(); });
    window.addEventListener('touchstart', () => { initAudio(); }, { once: true });

    // --- Tile Map Constants (declared early, used throughout) ---
    const TILE = 48;
    const SPRITE_SCALE = 2;
    const TILE_EMPTY = 0;
    const TILE_SOLID = 1;
    const TILE_CRUMBLE = 2;
    const TILE_TOXIC = 3;
    const LEVEL_W = 200;
    const LEVEL_H = 20;
    const LEVEL_PX_W = LEVEL_W * TILE;
    const LEVEL_PX_H = LEVEL_H * TILE;

    // --- Mobile Touch Controls ---
    if ('ontouchstart' in window) {
      document.getElementById('touch-controls').style.display = 'block';
      const touchMap = {
        'tb-left':   'ArrowLeft',
        'tb-right':  'ArrowRight',
        'tb-jump':   'Space',
        'tb-attack': 'KeyX',
        'tb-luck':   'KeyZ',
      };
      const activeMap = new Map(); // trackingId -> keyCode
      function handleTouchStart(e) {
        e.preventDefault();
        initAudio();
        for (const t of e.changedTouches) {
          const el = document.elementFromPoint(t.clientX, t.clientY);
          if (el && touchMap[el.id]) {
            activeMap.set(t.identifier, touchMap[el.id]);
            keys[touchMap[el.id]] = true;
          }
        }
      }
      function handleTouchEnd(e) {
        e.preventDefault();
        for (const t of e.changedTouches) {
          const code = activeMap.get(t.identifier);
          if (code) {
            keys[code] = false;
            activeMap.delete(t.identifier);
          }
        }
      }
      function handleTouchMove(e) {
        e.preventDefault();
        for (const t of e.changedTouches) {
          const el = document.elementFromPoint(t.clientX, t.clientY);
          const prevCode = activeMap.get(t.identifier);
          const newCode = (el && touchMap[el.id]) ? touchMap[el.id] : null;
          if (prevCode !== newCode) {
            if (prevCode) keys[prevCode] = false;
            if (newCode) {
              keys[newCode] = true;
              activeMap.set(t.identifier, newCode);
            } else {
              activeMap.delete(t.identifier);
            }
          }
        }
      }
      const tOpts = { passive: false };
      document.getElementById('touch-controls').addEventListener('touchstart', handleTouchStart, tOpts);
      document.getElementById('touch-controls').addEventListener('touchend', handleTouchEnd, tOpts);
      document.getElementById('touch-controls').addEventListener('touchcancel', handleTouchEnd, tOpts);
      document.getElementById('touch-controls').addEventListener('touchmove', handleTouchMove, tOpts);
      // Prevent canvas scroll/zoom on touch devices
      canvas.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); }, tOpts);
      canvas.addEventListener('touchmove', e => { e.preventDefault(); }, tOpts);
    }

    // --- Audio System ---
    let audioCtx = null;
    let audioInitialized = false;
    let musicNodes = null;

    function initAudio() {
      if (audioInitialized) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioInitialized = true;
      startMusic();
    }

    // Section-based intensity tracking
    let currentSection = 'slums'; // 'slums', 'border', 'deadend'

    function startMusic() {
      if (!audioCtx) return;
      const master = audioCtx.createGain();
      master.gain.value = 0.18;
      master.connect(audioCtx.destination);

      // --- Base Drone: saw + triangle detuned, low-pass filtered ---
      const droneGain = audioCtx.createGain();
      droneGain.gain.value = 1.0;
      droneGain.connect(master);

      const droneFilter = audioCtx.createBiquadFilter();
      droneFilter.type = 'lowpass';
      droneFilter.frequency.value = 400;
      droneFilter.connect(droneGain);

      const droneSaw = audioCtx.createOscillator();
      droneSaw.type = 'sawtooth';
      droneSaw.frequency.value = 110;
      droneSaw.detune.value = -5;
      const droneSawGain = audioCtx.createGain();
      droneSawGain.gain.value = 0.3;
      droneSaw.connect(droneSawGain);
      droneSawGain.connect(droneFilter);
      droneSaw.start();

      const droneTri = audioCtx.createOscillator();
      droneTri.type = 'triangle';
      droneTri.frequency.value = 110;
      droneTri.detune.value = 7;
      const droneTriGain = audioCtx.createGain();
      droneTriGain.gain.value = 0.3;
      droneTri.connect(droneTriGain);
      droneTriGain.connect(droneFilter);
      droneTri.start();

      // --- Tension Drone (tritone, for Dead End) ---
      const tensionGain = audioCtx.createGain();
      tensionGain.gain.value = 0.0;
      tensionGain.connect(master);

      const tensionFilter = audioCtx.createBiquadFilter();
      tensionFilter.type = 'lowpass';
      tensionFilter.frequency.value = 350;
      tensionFilter.connect(tensionGain);

      const tensionOsc = audioCtx.createOscillator();
      tensionOsc.type = 'sawtooth';
      tensionOsc.frequency.value = 155.56; // Eb3 tritone from A2
      tensionOsc.detune.value = 3;
      const tensionOscGain = audioCtx.createGain();
      tensionOscGain.gain.value = 0.25;
      tensionOsc.connect(tensionOscGain);
      tensionOscGain.connect(tensionFilter);
      tensionOsc.start();

      // --- Atmosphere: filtered white noise ---
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.03;
      noiseGain.connect(master);

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'lowpass';
      noiseFilter.frequency.value = 800;
      noiseFilter.connect(noiseGain);

      const noiseBufferSize = audioCtx.sampleRate * 2;
      const noiseBuffer = audioCtx.createBuffer(1, noiseBufferSize, audioCtx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseBufferSize; i++) {
        noiseData[i] = Math.random() * 2 - 1;
      }
      const noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = noiseBuffer;
      noiseSource.loop = true;
      noiseSource.connect(noiseFilter);
      noiseSource.start();

      // --- Rhythm: subtle kick pulse at ~70 BPM ---
      const beatInterval = 60 / 70; // ~0.857s
      let rhythmGainValue = 0.05;

      function scheduleKick() {
        if (!audioCtx || audioCtx.state === 'closed') return;
        const now = audioCtx.currentTime;
        const kickOsc = audioCtx.createOscillator();
        const kickGain = audioCtx.createGain();
        kickOsc.type = 'sine';
        kickOsc.frequency.setValueAtTime(150, now);
        kickOsc.frequency.exponentialRampToValueAtTime(50, now + 0.05);
        kickGain.gain.setValueAtTime(rhythmGainValue, now);
        kickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        kickOsc.connect(kickGain);
        kickGain.connect(master);
        kickOsc.start(now);
        kickOsc.stop(now + 0.15);
        setTimeout(scheduleKick, beatInterval * 1000);
      }
      setTimeout(scheduleKick, 500);

      // --- Melody: sparse minor pentatonic notes ---
      // A minor pentatonic: A, C, D, E, G
      const melodyNotes = [220, 261.63, 293.66, 329.63, 392, 440, 523.25, 587.33, 659.25, 784];
      const melodyDelay = audioCtx.createDelay(0.4);
      melodyDelay.delayTime.value = 0.3;
      const melodyDelayGain = audioCtx.createGain();
      melodyDelayGain.gain.value = 0.3;
      melodyDelay.connect(melodyDelayGain);
      melodyDelayGain.connect(master);

      function scheduleMelodyNote() {
        if (!audioCtx || audioCtx.state === 'closed') return;
        const now = audioCtx.currentTime;
        const freq = melodyNotes[Math.floor(Math.random() * melodyNotes.length)];
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        const noteGain = audioCtx.createGain();
        noteGain.gain.setValueAtTime(0.04, now);
        noteGain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
        osc.connect(noteGain);
        noteGain.connect(master);
        noteGain.connect(melodyDelay);
        osc.start(now);
        osc.stop(now + 1.2);
        // Next note in 2-4 beats
        const nextDelay = beatInterval * (2 + Math.random() * 2);
        setTimeout(scheduleMelodyNote, nextDelay * 1000);
      }
      setTimeout(scheduleMelodyNote, 2000);

      musicNodes = {
        master,
        droneGain,
        tensionGain,
        noiseGain,
        rhythmGainRef: { value: rhythmGainValue },
        beatInterval,
        setRhythmGain(v) { rhythmGainValue = v; }
      };
    }

    function updateMusicIntensity() {
      if (!musicNodes) return;
      const cx = camera.x;
      const t = audioCtx.currentTime;
      const ramp = 1.0; // 1 second crossfade

      if (cx >= 140 * TILE) {
        // Dead End: tension drone, faster rhythm
        if (currentSection !== 'deadend') {
          currentSection = 'deadend';
          musicNodes.tensionGain.gain.linearRampToValueAtTime(1.0, t + ramp);
          musicNodes.setRhythmGain(0.07);
        }
      } else if (cx >= 70 * TILE) {
        // Border: slightly faster, deeper
        if (currentSection !== 'border') {
          currentSection = 'border';
          musicNodes.tensionGain.gain.linearRampToValueAtTime(0.0, t + ramp);
          musicNodes.setRhythmGain(0.06);
        }
      } else {
        // Slums: base
        if (currentSection !== 'slums') {
          currentSection = 'slums';
          musicNodes.tensionGain.gain.linearRampToValueAtTime(0.0, t + ramp);
          musicNodes.setRhythmGain(0.05);
        }
      }
    }

    // --- Sound Effects ---
    function playSound(type) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;

      if (type === 'jump') {
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.15);
      }

      else if (type === 'slash') {
        const bufSize = audioCtx.sampleRate * 0.05;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const hp = audioCtx.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 2000;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.1, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        src.connect(hp); hp.connect(g); g.connect(audioCtx.destination);
        src.start(t); src.stop(t + 0.06);
      }

      else if (type === 'enemyHit') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 100;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.12);
      }

      else if (type === 'enemyDeath') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.1, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.3);
      }

      else if (type === 'coinPickup') {
        const osc1 = audioCtx.createOscillator();
        osc1.type = 'sine'; osc1.frequency.value = 523.25; // C5
        const g1 = audioCtx.createGain();
        g1.gain.setValueAtTime(0.08, t);
        g1.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        osc1.connect(g1); g1.connect(audioCtx.destination);
        osc1.start(t); osc1.stop(t + 0.06);

        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sine'; osc2.frequency.value = 659.25; // E5
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0.08, t + 0.05);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc2.connect(g2); g2.connect(audioCtx.destination);
        osc2.start(t + 0.05); osc2.stop(t + 0.13);
      }

      else if (type === 'vialPickup') {
        // Shimmer: filtered noise + high sine
        const bufSize = audioCtx.sampleRate * 0.2;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 3000; bp.Q.value = 2;
        const ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.04, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        src.connect(bp); bp.connect(ng); ng.connect(audioCtx.destination);
        src.start(t); src.stop(t + 0.22);

        const osc = audioCtx.createOscillator();
        osc.type = 'sine'; osc.frequency.value = 1200;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.25);
      }

      else if (type === 'luckPulse') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine'; osc.frequency.value = 80;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.001, t);
        g.gain.linearRampToValueAtTime(0.15, t + 0.15);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.55);
      }

      else if (type === 'guardAlert') {
        const osc = audioCtx.createOscillator();
        osc.type = 'square'; osc.frequency.value = 800;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.1, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.1);
      }

      else if (type === 'playerHurt') {
        // Noise burst + low sine
        const bufSize = audioCtx.sampleRate * 0.08;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.08, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        src.connect(ng); ng.connect(audioCtx.destination);
        src.start(t); src.stop(t + 0.1);

        const osc = audioCtx.createOscillator();
        osc.type = 'sine'; osc.frequency.value = 60;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.18);
      }

      else if (type === 'crumble') {
        const bufSize = audioCtx.sampleRate * 0.3;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const lp = audioCtx.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 300;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
        src.start(t); src.stop(t + 0.35);
      }
    }

    // --- Game State System ---
    let gameState = 'title'; // 'title', 'opening', 'controls', 'playing', 'transition', 'ending', 'complete'

    // --- Section Transition Cutscene State ---
    let transitionPhase = 0; // 0=fade out, 1=text, 2=fade in
    let transitionTimer = 0;
    let transitionTextIndex = 0;
    let transitionCharIndex = 0;
    let transitionCharTimer = 0;
    let transitionDisplayedText = '';
    let transitionFadeAlpha = 0;
    let transitionTriggered = { slumsToBorder: false, borderToDeadEnd: false };
    const transitionTexts = {
      slumsToBorder: [
        "The ash thickened as Vin left the slums behind.",
        "Ahead, the garrison walls loomed — the boundary between skaa misery and noble territory.",
        "She could feel the metals burning inside her. She was getting stronger.",
        "But so were the enemies ahead..."
      ],
      borderToDeadEnd: [
        "The patrols grew denser. Garrison soldiers everywhere.",
        "Vin pressed on. There was no turning back now.",
        "Somewhere in the mists, she felt it — someone was watching her.",
        "Someone powerful."
      ]
    };

    // --- Title Screen State ---
    let titleTimer = 0;
    let titleFadingOut = false;
    let titleFadeOut = 0;
    let titleAnyKeyReady = false;

    // --- Screen Shake System ---
    const screenShake = { x: 0, y: 0, intensity: 0, timer: 0 };

    function addScreenShake(intensity, duration) {
      screenShake.intensity = Math.max(screenShake.intensity, intensity);
      screenShake.timer = Math.max(screenShake.timer, duration);
    }

    function updateScreenShake(dt) {
      if (screenShake.timer > 0) {
        screenShake.timer -= dt;
        const t = Math.max(0, screenShake.timer);
        const decay = t / 0.3; // decays over remaining time
        screenShake.x = (Math.random() - 0.5) * 2 * screenShake.intensity * decay;
        screenShake.y = (Math.random() - 0.5) * 2 * screenShake.intensity * decay;
        if (screenShake.timer <= 0) {
          screenShake.x = 0;
          screenShake.y = 0;
          screenShake.intensity = 0;
        }
      }
    }

    // --- Game-feel Particles ---
    const gameParticles = [];
    let prevOnGround = false;
    let runDustTimer = 0;

    function spawnRunDust() {
      const footX = player.x + player.width / 2 + (player.facing === 1 ? -6 : 6);
      const footY = player.y + player.height;
      for (let i = 0; i < 2; i++) {
        gameParticles.push({
          type: 'dust',
          x: footX + (Math.random() - 0.5) * 6,
          y: footY - Math.random() * 3,
          vx: -player.facing * (10 + Math.random() * 20),
          vy: -(10 + Math.random() * 20),
          size: 1.5 + Math.random() * 1.5,
          color: Math.random() > 0.5 ? '#5a4a3a' : '#6a5a4a',
          alpha: 0.5 + Math.random() * 0.3,
          life: 0.3 + Math.random() * 0.2,
          maxLife: 0.3 + Math.random() * 0.2,
        });
      }
    }

    function spawnLandingDust() {
      const footX = player.x + player.width / 2;
      const footY = player.y + player.height;
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI + (Math.random() - 0.5) * Math.PI * 0.8;
        const speed = 30 + Math.random() * 50;
        gameParticles.push({
          type: 'dust',
          x: footX + (Math.random() - 0.5) * 12,
          y: footY - Math.random() * 2,
          vx: Math.cos(angle) * speed * (i % 2 === 0 ? 1 : -1),
          vy: -(15 + Math.random() * 30),
          size: 2 + Math.random() * 2,
          color: Math.random() > 0.5 ? '#5a4a3a' : '#7a6a5a',
          alpha: 0.6 + Math.random() * 0.3,
          life: 0.4 + Math.random() * 0.3,
          maxLife: 0.4 + Math.random() * 0.3,
        });
      }
    }

    function spawnKnifeSparks() {
      const hb = player.attackHitbox;
      const cx = hb.x + hb.width / 2;
      const cy = hb.y + hb.height / 2;
      for (let i = 0; i < 4; i++) {
        const angle = (player.facing === 1 ? 0 : Math.PI) + (Math.random() - 0.5) * 1.2;
        const speed = 80 + Math.random() * 120;
        gameParticles.push({
          type: 'spark',
          x: cx + (Math.random() - 0.5) * 8,
          y: cy + (Math.random() - 0.5) * 8,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 30,
          size: 1 + Math.random() * 1.5,
          color: Math.random() > 0.5 ? '#ddd' : '#fff',
          alpha: 0.9,
          life: 0.15 + Math.random() * 0.1,
          maxLife: 0.15 + Math.random() * 0.1,
        });
      }
    }

    function updateGameParticles(dt) {
      for (let i = gameParticles.length - 1; i >= 0; i--) {
        const p = gameParticles[i];
        p.life -= dt;
        if (p.life <= 0) {
          gameParticles.splice(i, 1);
          continue;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        if (p.type === 'dust') {
          p.vy -= 20 * dt; // drift up slightly
          p.alpha = (p.life / p.maxLife) * 0.6;
        } else if (p.type === 'spark') {
          p.vy += 200 * dt; // gravity
          p.alpha = (p.life / p.maxLife) * 0.9;
        }
      }
    }

    function renderGameParticles() {
      for (let i = 0; i < gameParticles.length; i++) {
        const p = gameParticles[i];
        const sx = p.x - camera.x;
        const sy = p.y - camera.y;
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        if (p.type === 'spark') {
          // Diamond shape
          ctx.save();
          ctx.translate(sx, sy);
          ctx.rotate(Math.PI / 4);
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
          ctx.restore();
        } else {
          ctx.beginPath();
          ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }

        const glow = ctx.createRadialGradient(sx, sy - 5, 2, sx, sy - 5, glowRadius);
        glow.addColorStop(0, 'rgba(255, 170, 50, 0.25)');

    const level = buildLevel1();

    // Check if a tile type is solid (basic check)
    function isSolid(type) {
      return type === TILE_SOLID || type === TILE_CRUMBLE;
    }

    // --- Crumble State Tracking ---
    const crumbleState = {}; // key: "r,c" -> { timer: 0, state: 'solid' | 'shaking' | 'collapsed' | 'respawning' }

    // Check if a specific tile at (r,c) is solid, accounting for crumble state
    function isTileSolid(r, c) {
      if (r < 0 || r >= LEVEL_H || c < 0 || c >= LEVEL_W) return false;
      const type = level[r][c];
      if (type === TILE_CRUMBLE) {
        const key = r + ',' + c;
        const cs = crumbleState[key];
        if (cs && (cs.state === 'collapsed' || cs.state === 'respawning')) return false;
      }
      return isSolid(type);
    }

    // --- Falling Ash Clumps ---

      const c = Math.floor(px / TILE);
      const r = Math.floor(py / TILE);
      if (c < 0 || c >= LEVEL_W || r < 0 || r >= LEVEL_H) return 0;
      return level[r][c];

    function updateCamera() {
      // Target: player at 1/3 from left
      const targetX = player.x - canvas.width / 3;
      // Target: player centered vertically in middle third
      const targetY = player.y - canvas.height / 2 + player.height / 2;

      // Smooth follow
      camera.x += (targetX - camera.x) * 0.1;
      camera.y += (targetY - camera.y) * 0.05; // slower vertical follow

      // Clamp to level bounds
      camera.x = Math.max(0, Math.min(LEVEL_PX_W - canvas.width, camera.x));
      camera.y = Math.max(0, Math.min(LEVEL_PX_H - canvas.height, camera.y));

    // Checkpoints: start of Slums, start of Border, start of Dead End
    const CHECKPOINTS = [64, 70 * TILE, 140 * TILE];

    function respawnPlayer() {
      const cpX = CHECKPOINTS[player.checkpoint] || SPAWN_X;
      player.x = cpX;
      player.y = 14 * TILE;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.jumpHeld = false;
      player.jumpTime = 0;
      player.hp = player.maxHp;
      player.invincible = true;
      player.invincibleTimer = 2.0;
      player.dead = false;
      player.deadTimer = 0;
      player.attacking = false;
      player.attackTimer = 0;
      player.crouching = false;
      player.height = player.standingHeight;
    }

    function updatePlayer(dt) {
      // --- Death state ---
      if (player.dead) {
        player.deadTimer += dt;
        if (player.deadTimer >= 2.0) {
          respawnPlayer();
        }
        return; // no movement while dead
      }

      // --- Crouch ---
      const wantCrouch = input.crouch && player.onGround;
      if (wantCrouch && !player.crouching) {
        // Start crouching: shrink height from top, keep feet in place
        player.y += (player.standingHeight - player.crouchHeight);
        player.height = player.crouchHeight;
        player.crouching = true;
      } else if (!wantCrouch && player.crouching) {
        // Try to stand up: check if there's room above
        const headRoom = player.y - (player.standingHeight - player.crouchHeight);
        const testCol1 = Math.floor(player.x / TILE);
        const testCol2 = Math.floor((player.x + player.width - 1) / TILE);
        const testRow = Math.floor(headRoom / TILE);
        const blocked = (testRow >= 0 && testRow < LEVEL_H &&
          ((testCol1 >= 0 && testCol1 < LEVEL_W && isTileSolid(testRow, testCol1)) ||
           (testCol2 >= 0 && testCol2 < LEVEL_W && isTileSolid(testRow, testCol2))));
        if (!blocked) {
          player.y -= (player.standingHeight - player.crouchHeight);
          player.height = player.standingHeight;
          player.crouching = false;
        }
      }

      // --- Horizontal movement with acceleration/deceleration ---
      let targetVx = 0;
      const moveSpeed = player.crouching ? player.speed * 0.4 : player.speed;
      if (input.left) targetVx -= moveSpeed;
      if (input.right) targetVx += moveSpeed;

      if (targetVx !== 0) {
        if (player.vx < targetVx) {
          player.vx = Math.min(player.vx + player.accel * dt, targetVx);
        } else if (player.vx > targetVx) {
          player.vx = Math.max(player.vx - player.accel * dt, targetVx);
        }
        player.facing = targetVx > 0 ? 1 : -1;
      } else {
        if (player.vx > 0) {
          player.vx = Math.max(player.vx - player.decel * dt, 0);
        } else if (player.vx < 0) {
          player.vx = Math.min(player.vx + player.decel * dt, 0);
        }
      }

      // --- Jump with variable height ---
      if (input.jump) {
        if (player.onGround && !player.jumpHeld) {
          player.vy = player.jumpForce;
          player.onGround = false;
          player.jumpTime = 0;
          playSound('jump');
        }
        if (!player.onGround && player.jumpTime < player.maxJumpTime) {
          player.vy += player.gravity * 0.4 * dt;
          player.jumpTime += dt;
        } else {
          player.vy += player.gravity * dt;
        }
        player.jumpHeld = true;
      } else {
        player.vy += player.gravity * dt;
        player.jumpHeld = false;
      }

      // --- Apply horizontal velocity + tile collision ---
      player.x += player.vx * dt;
      resolveHorizontal();

      // --- Apply vertical velocity + tile collision ---
      player.y += player.vy * dt;
      resolveVertical();

      // --- Level bounds (horizontal only) ---
      if (player.x < 0) { player.x = 0; player.vx = 0; }
      if (player.x + player.width > LEVEL_PX_W) { player.x = LEVEL_PX_W - player.width; player.vx = 0; }

      // --- Fall off bottom: death ---
      if (player.y > LEVEL_PX_H + 64) {
        player.dead = true;
        player.deadTimer = 0;
      }

      // --- Knife attack ---
      if (input.attack && !player.attacking && !player.attackTriggered) {
        player.attacking = true;
        player.attackTimer = 0;
        player.attackTriggered = true;
        playSound('slash');
        spawnKnifeSparks();
      }
      if (player.attacking) {
        player.attackTimer += dt;
        if (player.attackTimer >= player.attackDuration) {
          player.attacking = false;
        }
      }
      if (!input.attack) {
        player.attackTriggered = false;
      }
      // Update attack hitbox position
      const hbOffsetX = player.facing === 1 ? player.width : -40;
      player.attackHitbox.x = player.x + hbOffsetX;
      player.attackHitbox.y = player.y + (player.height / 2) - 20;
      player.attackHitbox.width = 40;
      player.attackHitbox.height = 40;

      // Invincibility timer
      if (player.invincible) {
        player.invincibleTimer -= dt;
        if (player.invincibleTimer <= 0) {
          player.invincible = false;
          player.invincibleTimer = 0;
        }
      }

      // --- Luck (Soothe) ability ---
      if (player.luckCooldown > 0) {
        player.luckCooldown -= dt;
        if (player.luckCooldown < 0) player.luckCooldown = 0;
      }

      if (input.luck && !player.luckTriggered && player.luckCooldown <= 0) {
        player.luckTriggered = true;
        // Find nearest alive enemy within luckRadius
        const pcx = player.x + player.width / 2;
        const pcy = player.y + player.height / 2;
        let nearest = null;
        let nearestDist = Infinity;
        for (let i = 0; i < enemies.length; i++) {
          const e = enemies[i];
          if (!e.alive || e.soothed) continue;
          const ecx = e.x + e.width / 2;
          const ecy = e.y + e.height / 2;
          const dist = Math.sqrt((pcx - ecx) * (pcx - ecx) + (pcy - ecy) * (pcy - ecy));
          if (dist <= player.luckRadius && dist < nearestDist) {
            nearestDist = dist;
            nearest = e;
          }
        }
        if (nearest) {
          nearest.soothed = true;
          nearest.sootheTimer = nearest.sootheDuration;
          nearest.vx = 0;
          nearest.attacking = false;
          nearest.detecting = false;
          player.luckCooldown = player.luckMaxCooldown;
          playSound('luckPulse');
          addScreenShake(2, 0.1);
          // Spawn pulse effect
          effects.push({
            type: 'luckPulse',
            x: pcx,
            y: pcy,
            radius: 0,
            maxRadius: 150,
            timer: 0,
            duration: 0.5
          });
          // Spawn vignette effect
          effects.push({
            type: 'vignette',
            timer: 0,
            duration: 0.4
          });
        }
      }
      if (!input.luck) {
        player.luckTriggered = false;
      }

      // --- Toxic puddle damage ---
      if (!player.invincible) {
        const pLeft = Math.floor(player.x / TILE);
        const pRight = Math.floor((player.x + player.width - 0.01) / TILE);
        const pTop = Math.floor(player.y / TILE);
        const pBottom = Math.floor((player.y + player.height - 0.01) / TILE);
        let touchedToxic = false;
        for (let r = pTop; r <= pBottom && !touchedToxic; r++) {
          for (let c = pLeft; c <= pRight && !touchedToxic; c++) {
            if (r < 0 || r >= LEVEL_H || c < 0 || c >= LEVEL_W) continue;
            if (level[r][c] === TILE_TOXIC) touchedToxic = true;
          }
        }
        if (touchedToxic) {
          player.hp -= 1;
          player.invincible = true;
          player.invincibleTimer = 1.5;
          player.vy = -200;
          player.vx = -100 * player.facing;
          player.vialDrainAnim = 1;
          playSound('playerHurt');
          addScreenShake(4, 0.2);
          if (player.hp <= 0) {
            player.dead = true;
            player.deadTimer = 0;
          }
        }
      }

      // --- Crumbling platform tracking ---
      // Check if player is standing on a crumble tile (feet just above tile top)
      {
        const feetRow = Math.floor((player.y + player.height) / TILE);
        const pLeft = Math.floor(player.x / TILE);
        const pRight = Math.floor((player.x + player.width - 0.01) / TILE);
        for (let c = pLeft; c <= pRight; c++) {
          if (feetRow < 0 || feetRow >= LEVEL_H || c < 0 || c >= LEVEL_W) continue;
          if (level[feetRow][c] !== TILE_CRUMBLE) continue;
          const key = feetRow + ',' + c;
          if (!crumbleState[key]) {
            crumbleState[key] = { timer: 0, state: 'solid' };
          }
          const cs = crumbleState[key];
          if (cs.state === 'solid' && player.onGround) {
            cs.timer += dt;
            if (cs.timer >= 0.3) {
              cs.state = 'shaking';
            }
          }
        }
      }
    }

    // --- Update crumble tiles (called from game loop) ---
    function updateCrumbleTiles(dt) {
      for (const key in crumbleState) {
        const cs = crumbleState[key];
        if (cs.state === 'shaking') {
          cs.timer += dt;
          if (cs.timer >= 1.3) {
            cs.state = 'collapsed';
            cs.timer = 0;
            playSound('crumble');
            addScreenShake(3, 0.3);
            // Spawn collapse particles
            const parts = key.split(',');
            const cr = parseInt(parts[0]);
            const cc = parseInt(parts[1]);
            const wx = cc * TILE + TILE / 2;
            const wy = cr * TILE + TILE / 2;
            for (let p = 0; p < 6; p++) {
              effects.push({
                type: 'crumbleParticle',
                x: wx + (Math.random() - 0.5) * TILE,
                y: wy,
                vx: (Math.random() - 0.5) * 60,
                vy: Math.random() * 100 + 50,
                timer: 0,
                duration: 0.8,
              });
            }
          }
        } else if (cs.state === 'collapsed') {
          cs.timer += dt;
          if (cs.timer >= 5) {
            cs.state = 'respawning';
            cs.timer = 0;
          }
        } else if (cs.state === 'respawning') {
          cs.timer += dt;
          if (cs.timer >= 1.0) {
            cs.state = 'solid';
            cs.timer = 0;
          }
        }
      }
    }

    // --- Update falling ash clumps (called from game loop) ---
    function updateAshClumps(dt) {
      // Spawn new clumps
      for (let i = 0; i < ashClumpSpawns.length; i++) {
        const sp = ashClumpSpawns[i];
        sp.timer += dt;
        if (sp.timer >= sp.interval) {
          sp.timer -= sp.interval;
          // Find ground level below spawn point
          let groundY = LEVEL_PX_H;
          const col = Math.floor(sp.x / TILE);
          for (let r = 0; r < LEVEL_H; r++) {
            if (isTileSolid(r, col)) {
              groundY = r * TILE;
              break;
            }
          }
          ashClumps.push({
            x: sp.x,
            y: -10,
            vy: 200,
            width: 10,
            height: 10,
            groundY: groundY,
            alive: true,
          });
        }
      }
      // Update existing clumps
      for (let i = ashClumps.length - 1; i >= 0; i--) {
        const ac = ashClumps[i];
        ac.y += ac.vy * dt;
        // Check collision with solid tiles
        const cr = Math.floor((ac.y + ac.height) / TILE);
        const cc = Math.floor((ac.x + ac.width / 2) / TILE);
        let hitSolid = false;
        if (cr >= 0 && cr < LEVEL_H && cc >= 0 && cc < LEVEL_W && isTileSolid(cr, cc)) {
          hitSolid = true;
        }
        // Check collision with player
        let hitPlayer = false;
        if (ac.alive && !player.invincible) {
          if (rectsOverlap(ac.x, ac.y, ac.width, ac.height, player.x, player.y, player.width, player.height)) {
            hitPlayer = true;
            player.hp -= 1;
            player.invincible = true;
            player.invincibleTimer = 1.5;
            player.vy = -150;
            playSound('playerHurt');
            addScreenShake(4, 0.2);
            if (player.hp <= 0) {
              player.dead = true;
              player.deadTimer = 0;
            }
          }
        }
        if (hitSolid || hitPlayer || ac.y > LEVEL_PX_H + 20) {
          // Shatter into particles
          for (let p = 0; p < 5; p++) {
            effects.push({
              type: 'crumbleParticle',
              x: ac.x + ac.width / 2 + (Math.random() - 0.5) * 10,
              y: ac.y + ac.height,
              vx: (Math.random() - 0.5) * 80,
              vy: -(Math.random() * 60 + 20),
              timer: 0,
              duration: 0.6,
            });
          }
          ashClumps.splice(i, 1);
        }
      }
    }

    function resolveHorizontal() {
      // Check tiles overlapping the player AABB
      const left = Math.floor(player.x / TILE);
      const right = Math.floor((player.x + player.width - 0.01) / TILE);
      const top = Math.floor(player.y / TILE);
      const bottom = Math.floor((player.y + player.height - 0.01) / TILE);

      for (let r = top; r <= bottom; r++) {
        for (let c = left; c <= right; c++) {
          if (!isTileSolid(r, c)) continue;

          // Tile AABB
          const tx = c * TILE;
          const ty = r * TILE;

          // Resolve overlap
          if (player.vx > 0) {
            // Moving right, push left
            player.x = tx - player.width;
            player.vx = 0;
          } else if (player.vx < 0) {
            // Moving left, push right
            player.x = tx + TILE;
            player.vx = 0;
          }
          return; // resolved
        }
      }
    }

    function resolveVertical() {
      const left = Math.floor(player.x / TILE);
      const right = Math.floor((player.x + player.width - 0.01) / TILE);
      const top = Math.floor(player.y / TILE);
      const bottom = Math.floor((player.y + player.height - 0.01) / TILE);

      player.onGround = false;

      for (let r = top; r <= bottom; r++) {
        for (let c = left; c <= right; c++) {
          if (!isTileSolid(r, c)) continue;

          const ty = r * TILE;

          if (player.vy > 0) {
            // Falling down, land on top
            player.y = ty - player.height;
            player.vy = 0;
            player.onGround = true;
            player.jumpTime = 0;
          } else if (player.vy < 0) {
            // Moving up, bonk head
            player.y = ty + TILE;
            player.vy = 0;
          }
          return;
        }
      }
    }

    // --- Tile Rendering ---
    function renderTiles() {
      // Determine visible tile range (culling)
      const startCol = Math.max(0, Math.floor(camera.x / TILE));
      const endCol = Math.min(LEVEL_W - 1, Math.floor((camera.x + canvas.width) / TILE));
      const startRow = Math.max(0, Math.floor(camera.y / TILE));
      const endRow = Math.min(LEVEL_H - 1, Math.floor((camera.y + canvas.height) / TILE));

      for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
          const tile = level[r][c];
          if (tile === TILE_EMPTY) continue;

          const screenX = c * TILE - camera.x;
          const screenY = r * TILE - camera.y;

          if (tile === TILE_SOLID) {
            // Section-based color variation
            let baseColor, edgeColor, gridColor;
            if (c >= 140) {
              // Dead End: darker, reddish-grey, oppressive
              baseColor = '#2e2028';
              edgeColor = '#3e2a32';
              gridColor = '#1e1520';
            } else if (c >= 70) {
              // Border: slightly cooler, more grey
              baseColor = '#36303e';
              edgeColor = '#46405a';
              gridColor = '#26202e';
            } else {
              // Slums: warm dark purple
              baseColor = '#3a3040';
              edgeColor = '#4a4050';
              gridColor = '#2a2030';
            }
            ctx.fillStyle = baseColor;
            ctx.fillRect(screenX, screenY, TILE, TILE);
            // Lighter top edge for surface look
            ctx.fillStyle = edgeColor;
            ctx.fillRect(screenX, screenY, TILE, 3);
            // Subtle grid line
            ctx.strokeStyle = gridColor;
            ctx.strokeRect(screenX, screenY, TILE, TILE);

            // Section transition decorations
            // Slums -> Border gate (around col 69-70)
            if (c === 69 && r >= 10 && r <= 16) {
              ctx.fillStyle = '#2a1a1a';
              ctx.fillRect(screenX + TILE - 4, screenY, 4, TILE);
              // Broken gate bars
              if (r === 10 || r === 12 || r === 14) {
                ctx.fillStyle = '#4a3a2a';
                ctx.fillRect(screenX + TILE - 6, screenY + 4, 6, TILE - 8);
              }
            }
            if (c === 70 && r >= 10 && r <= 16) {
              ctx.fillStyle = '#2a1a1a';
              ctx.fillRect(screenX, screenY, 4, TILE);
            }
            // Border -> Dead End warning (around col 140-142)
            if (c >= 140 && c <= 142 && r >= 10 && r <= 16) {
              // Red-tinted warning stripes on the walls
              if ((r + c) % 2 === 0) {
                ctx.fillStyle = 'rgba(120, 30, 30, 0.15)';
                ctx.fillRect(screenX, screenY, TILE, TILE);
              }
            }
          } else if (tile === TILE_CRUMBLE) {
            const ckey = r + ',' + c;
            const cs = crumbleState[ckey];
            // Don't render collapsed tiles
            if (cs && cs.state === 'collapsed') continue;
            // Respawning: fade in
            if (cs && cs.state === 'respawning') {
              ctx.save();
              ctx.globalAlpha = cs.timer / 1.0;
            }
            // Shaking: random offset
            let shakeX = 0, shakeY = 0;
            if (cs && cs.state === 'shaking') {
              shakeX = (Math.random() - 0.5) * 3;
              shakeY = (Math.random() - 0.5) * 3;
            }
            ctx.fillStyle = '#4a4050';
            ctx.fillRect(screenX + shakeX, screenY + shakeY, TILE, TILE);
            // Cracked look - draw some crack lines
            ctx.strokeStyle = '#5a5060';
            ctx.beginPath();
            ctx.moveTo(screenX + shakeX + 6, screenY + shakeY + 12);
            ctx.lineTo(screenX + shakeX + 24, screenY + shakeY + 24);
            ctx.lineTo(screenX + shakeX + 42, screenY + shakeY + 15);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(screenX + shakeX + 15, screenY + shakeY + 33);
            ctx.lineTo(screenX + shakeX + 30, screenY + shakeY + 42);
            ctx.stroke();
            // Top edge
            ctx.fillStyle = '#5a5565';
            ctx.fillRect(screenX + shakeX, screenY + shakeY, TILE, 2);
            if (cs && cs.state === 'respawning') {
              ctx.restore();
            }
          } else if (tile === TILE_TOXIC) {
            const t = performance.now() / 1000;
            const bOff = c * 3.7 + r * 2.3;
            // Draw dark ground underneath
            ctx.fillStyle = '#2a2020';
            ctx.fillRect(screenX, screenY, TILE, TILE);
            // Sickly toxic base — mix of yellow-green and dark green
            ctx.fillStyle = 'rgba(74, 106, 26, 0.8)';
            ctx.fillRect(screenX, screenY, TILE, TILE);
            // Animated surface waves
            ctx.save();
            ctx.strokeStyle = 'rgba(100, 140, 40, 0.6)';
            ctx.lineWidth = 1.5;
            for (let w = 0; w < 3; w++) {
              ctx.beginPath();
              const waveY = screenY + 12 + w * 13;
              for (let px = 0; px < TILE; px += 2) {
                const wy = waveY + Math.sin(t * 2.5 + bOff + px * 0.2 + w * 1.5) * 3.5;
                if (px === 0) ctx.moveTo(screenX + px, wy);
                else ctx.lineTo(screenX + px, wy);
              }
              ctx.stroke();
            }
            ctx.restore();
            // Larger visible bubbles
            ctx.fillStyle = '#5a8a2a';
            const b1s = 3 + Math.sin(t * 3 + bOff) * 2;
            ctx.beginPath();
            ctx.arc(screenX + 12 + Math.sin(t * 2.5 + bOff) * 4, screenY + 15 + Math.cos(t * 1.8 + bOff) * 6, b1s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#4a7a1a';
            ctx.beginPath();
            ctx.arc(screenX + 33 + Math.cos(t * 2.0 + bOff + 1) * 4, screenY + 21 + Math.sin(t * 2.2 + bOff + 1) * 4, 3.5 + Math.cos(t * 2.5 + bOff) * 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(screenX + 21 + Math.sin(t * 1.7 + bOff + 2) * 6, screenY + 33 + Math.cos(t * 2.8 + bOff + 2) * 4, 4 + Math.sin(t * 2 + bOff + 2) * 1.5, 0, Math.PI * 2);
            ctx.fill();
            // Rising green mist particles above puddle
            ctx.save();
            for (let p = 0; p < 4; p++) {
              const px = screenX + 6 + ((p * 10 + Math.floor(t * 2 + bOff + p) * 7) % 36);
              const pyBase = screenY - 3;
              const pyOff = ((t * 20 + p * 17 + bOff * 3) % 30);
              const pa = Math.max(0, 1 - pyOff / 30) * 0.4;
              ctx.globalAlpha = pa;
              ctx.fillStyle = 'rgba(100, 160, 40, 0.7)';
              ctx.beginPath();
              ctx.arc(px + Math.sin(t + p) * 4, pyBase - pyOff, 3 + Math.sin(t * 1.5 + p) * 1.2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
            // Skull warning pattern (subtle)
            ctx.save();
            ctx.globalAlpha = 0.15 + Math.sin(t * 1.5 + bOff) * 0.05;
            ctx.fillStyle = '#ffff00';
            // Simple skull shape: two eye dots and a jaw arc
            ctx.fillRect(screenX + 17, screenY + 18, 3, 3);
            ctx.fillRect(screenX + 26, screenY + 18, 3, 3);
            ctx.fillRect(screenX + 18, screenY + 26, 9, 2);
            ctx.restore();
          }
        }
      }
    }

      // row 34-35: boot soles
      [_,_,_,_,b,B,B,B,B,B,B,B,B,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,b,B,B,B,B,B,B,B,B,_,_,_,_,_,_,_,_,_,_,_],

    // IDLE frame 2 (subtle breathing - slight shift)

    // --- Animation State Machine ---
    const anim = {
      state: 'idle',
      frame: 0,
      timer: 0,
      frameTimes: {
        idle: 0.5,
        run: 0.1,
        jump: 0.2,
        fall: 0.2,
        attack: 0.1,
      },
      attackPlaying: false,
      attackTimer: 0,
    };

    function updateAnimation(dt) {
      // Determine desired state
      let desiredState = 'idle';

      if (player.attacking) {
        desiredState = 'attack';
        if (!anim.attackPlaying) {
          anim.attackPlaying = true;
          anim.frame = 0;
          anim.timer = 0;
        }
      } else {
        anim.attackPlaying = false;
      }

      if (desiredState !== 'attack') {
        if (player.crouching) {
          desiredState = 'crouch';
        } else if (!player.onGround && player.vy < 0) {
          desiredState = 'jump';
        } else if (!player.onGround && player.vy >= 0) {
          desiredState = 'fall';
        } else if (Math.abs(player.vx) > 10) {
          desiredState = 'run';
        }
      }

      // State change resets frame
      if (desiredState !== anim.state) {
        anim.state = desiredState;
        anim.frame = 0;
        anim.timer = 0;
      }

      // Advance frame timer
      anim.timer += dt;
      const ft = anim.frameTimes[anim.state];
      if (anim.timer >= ft) {
        anim.timer -= ft;
        anim.frame++;
        const maxFrames = SPRITE_FRAMES[anim.state].length;
        if (anim.frame >= maxFrames) {
          anim.frame = 0;
        }
      }
    }

    // --- Sprite Renderer ---
    function drawSprite(spriteData, x, y, flip) {
      const w = spriteData[0].length;
      const h = spriteData.length;
      const S = SPRITE_SCALE;
      for (let row = 0; row < h; row++) {
        for (let col = 0; col < w; col++) {
          const color = spriteData[row][col];
          if (color === null) continue;
          ctx.fillStyle = color;
          const px = flip ? x + (w - 1 - col) * S : x + col * S;
          const py = y + row * S;
          ctx.fillRect(px, py, S, S);
        }
      }
    }

    function resolveEnemyHorizontal(enemy) {
      const left = Math.floor(enemy.x / TILE);
      const right = Math.floor((enemy.x + enemy.width - 0.01) / TILE);
      const top = Math.floor(enemy.y / TILE);
      const bottom = Math.floor((enemy.y + enemy.height - 0.01) / TILE);

      for (let r = top; r <= bottom; r++) {
        for (let c = left; c <= right; c++) {
          if (!isTileSolid(r, c)) continue;
          const tx = c * TILE;
          if (enemy.vx > 0) {
            enemy.x = tx - enemy.width;
          } else if (enemy.vx < 0) {
            enemy.x = tx + TILE;
          }
          // Reverse direction instead of stopping
          enemy.facing *= -1;
          enemy.vx = enemy.facing * enemy.speed;
          return;
        }
      }
    }

    function resolveEnemyVertical(enemy) {
      const left = Math.floor(enemy.x / TILE);
      const right = Math.floor((enemy.x + enemy.width - 0.01) / TILE);
      const top = Math.floor(enemy.y / TILE);
      const bottom = Math.floor((enemy.y + enemy.height - 0.01) / TILE);

      enemy.onGround = false;

      for (let r = top; r <= bottom; r++) {
        for (let c = left; c <= right; c++) {
          if (!isTileSolid(r, c)) continue;
          const ty = r * TILE;
          if (enemy.vy > 0) {
            enemy.y = ty - enemy.height;
            enemy.vy = 0;
            enemy.onGround = true;
          } else if (enemy.vy < 0) {
            enemy.y = ty + TILE;
            enemy.vy = 0;
          }
          return;
        }
      }
    }

    function hasGroundAhead(enemy) {
      // Check if there's solid ground one step ahead at the enemy's feet level
      const checkX = enemy.facing === 1 ? enemy.x + enemy.width + 2 : enemy.x - 2;
      const checkY = enemy.y + enemy.height + 2;
      const c = Math.floor(checkX / TILE);
      const r = Math.floor(checkY / TILE);
      if (c < 0 || c >= LEVEL_W || r < 0 || r >= LEVEL_H) return false;
      return isTileSolid(r, c);
    }

    // --- Visual Effects System ---
    const effects = [];

    function updateEffects(dt) {
      for (let i = effects.length - 1; i >= 0; i--) {
        const fx = effects[i];
        fx.timer += dt;
        if (fx.type === 'luckPulse') {
          fx.radius = (fx.timer / fx.duration) * fx.maxRadius;
        } else if (fx.type === 'crumbleParticle') {
          fx.x += fx.vx * dt;
          fx.y += fx.vy * dt;
          fx.vy += 300 * dt; // gravity on particles
        } else if (fx.type === 'sparkle') {
          fx.x += fx.vx * dt;
          fx.y += fx.vy * dt;
          fx.vy += 100 * dt;
        }
        if (fx.timer >= fx.duration) {
          effects.splice(i, 1);
        }
      }
    }

    function renderEffects() {
      for (let i = 0; i < effects.length; i++) {
        const fx = effects[i];
        if (fx.type === 'luckPulse') {
          const progress = fx.timer / fx.duration;
          const alpha = Math.max(0, 1 - progress);
          const screenX = fx.x - camera.x;
          const screenY = fx.y - camera.y;
          ctx.save();
          ctx.globalAlpha = alpha * 0.6;
          ctx.strokeStyle = '#6644aa';
          ctx.lineWidth = 3 * (1 - progress) + 1;
          ctx.beginPath();
          ctx.arc(screenX, screenY, fx.radius, 0, Math.PI * 2);
          ctx.stroke();
          // Inner glow ring
          ctx.globalAlpha = alpha * 0.3;
          ctx.strokeStyle = '#8866cc';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(screenX, screenY, fx.radius * 0.7, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        } else if (fx.type === 'vignette') {
          const progress = fx.timer / fx.duration;
          const alpha = Math.max(0, (1 - progress) * 0.4);
          const grad = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, canvas.width * 0.3,
            canvas.width / 2, canvas.height / 2, canvas.width * 0.8
          );
          grad.addColorStop(0, 'rgba(0,0,0,0)');
          grad.addColorStop(1, `rgba(30,20,60,${alpha})`);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (fx.type === 'crumbleParticle') {
          const progress = fx.timer / fx.duration;
          const alpha = Math.max(0, 1 - progress);
          const sx = fx.x - camera.x;
          const sy = fx.y - camera.y;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#5a5060';
          ctx.fillRect(sx - 2, sy - 2, 4, 4);
          ctx.restore();
        } else if (fx.type === 'sparkle') {
          const progress = fx.timer / fx.duration;
          const alpha = Math.max(0, 1 - progress);
          const sx = fx.x - camera.x;
          const sy = fx.y - camera.y;
          const size = 3 * (1 - progress);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = fx.color || '#fff';
          // Draw a small star/diamond
          ctx.beginPath();
          ctx.moveTo(sx, sy - size);
          ctx.lineTo(sx + size * 0.5, sy);
          ctx.lineTo(sx, sy + size);
          ctx.lineTo(sx - size * 0.5, sy);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
    }

    // --- Pickups System ---
    const pickups = [];
    function createPickup(x, y, type) {
      return { x, y, width: type === 'vial' ? 24 : 20, height: type === 'vial' ? 32 : 20, type, collected: false, bobTimer: Math.random() * Math.PI * 2 };
    }

    // Place vial pickups (health restore) - 5 throughout the level, before hard sections
    pickups.push(createPickup(25 * TILE, 14 * TILE, 'vial'));   // Slums, before toxic puddle
    pickups.push(createPickup(50 * TILE, 13 * TILE, 'vial'));   // Mid-slums
    pickups.push(createPickup(78 * TILE, 11 * TILE, 'vial'));   // Early border, above gap
    pickups.push(createPickup(109 * TILE, 12 * TILE, 'vial'));  // Mid border, on platforms over big gap
    pickups.push(createPickup(155 * TILE, 13 * TILE, 'vial'));  // Dead end area

    // Place boxing (coin) pickups - 25 spread throughout
    // Slums section (cols 0-69)
    pickups.push(createPickup(3 * TILE, 15 * TILE, 'boxing'));
    pickups.push(createPickup(7 * TILE, 13 * TILE, 'boxing'));
    pickups.push(createPickup(14 * TILE, 12 * TILE, 'boxing'));
    pickups.push(createPickup(20 * TILE, 11 * TILE, 'boxing'));
    pickups.push(createPickup(22 * TILE, 11 * TILE, 'boxing'));
    pickups.push(createPickup(31 * TILE, 11 * TILE, 'boxing'));
    pickups.push(createPickup(35 * TILE, 14 * TILE, 'boxing'));
    pickups.push(createPickup(40 * TILE, 15 * TILE, 'boxing'));
    pickups.push(createPickup(45 * TILE, 14 * TILE, 'boxing'));
    pickups.push(createPickup(55 * TILE, 15 * TILE, 'boxing'));
    pickups.push(createPickup(60 * TILE, 14 * TILE, 'boxing'));
    pickups.push(createPickup(65 * TILE, 15 * TILE, 'boxing'));
    // Border section (cols 70-139)
    pickups.push(createPickup(73 * TILE, 6 * TILE, 'boxing'));
    pickups.push(createPickup(83 * TILE, 5 * TILE, 'boxing'));
    pickups.push(createPickup(88 * TILE, 14 * TILE, 'boxing'));
    pickups.push(createPickup(95 * TILE, 13 * TILE, 'boxing'));
    pickups.push(createPickup(100 * TILE, 15 * TILE, 'boxing'));
    pickups.push(createPickup(108 * TILE, 14 * TILE, 'boxing'));
    pickups.push(createPickup(115 * TILE, 13 * TILE, 'boxing'));
    pickups.push(createPickup(127 * TILE, 2 * TILE, 'boxing'));
    pickups.push(createPickup(132 * TILE, 12 * TILE, 'boxing'));
    // Dead End section (cols 140-199)
    pickups.push(createPickup(145 * TILE, 14 * TILE, 'boxing'));
    pickups.push(createPickup(152 * TILE, 13 * TILE, 'boxing'));
    pickups.push(createPickup(160 * TILE, 14 * TILE, 'boxing'));
    pickups.push(createPickup(170 * TILE, 15 * TILE, 'boxing'));
    pickups.push(createPickup(180 * TILE, 14 * TILE, 'boxing'));

    function updatePickups(dt) {
      // Update checkpoint based on player position
      if (player.x >= 140 * TILE) player.checkpoint = 2;
      else if (player.x >= 70 * TILE) player.checkpoint = 1;

      for (let i = 0; i < pickups.length; i++) {
        const p = pickups[i];
        if (p.collected) continue;
        p.bobTimer += dt * 3;

        // Check collision with player
        const bobY = p.y + Math.sin(p.bobTimer) * 3;
        if (rectsOverlap(player.x, player.y, player.width, player.height, p.x, bobY, p.width, p.height)) {
          if (p.type === 'vial' && player.hp < player.maxHp) {
            p.collected = true;
            player.hp += 1;
            playSound('vialPickup');
            // Sparkle effect
            for (let s = 0; s < 8; s++) {
              effects.push({
                type: 'sparkle', x: p.x + p.width / 2, y: bobY + p.height / 2,
                vx: (Math.random() - 0.5) * 120, vy: (Math.random() - 0.5) * 120,
                timer: 0, duration: 0.5, color: '#aaccee'
              });
            }
          } else if (p.type === 'boxing') {
            p.collected = true;
            player.boxings += 1;
            playSound('coinPickup');
            for (let s = 0; s < 6; s++) {
              effects.push({
                type: 'sparkle', x: p.x + p.width / 2, y: bobY + p.height / 2,
                vx: (Math.random() - 0.5) * 100, vy: (Math.random() - 0.5) * 100,
                timer: 0, duration: 0.4, color: '#daa520'
              });
            }
          }
        }
      }

      // Drain animation decay
      if (player.vialDrainAnim > 0) {
        player.vialDrainAnim -= dt * 2;
        if (player.vialDrainAnim < 0) player.vialDrainAnim = 0;
      }
    }

    function renderPickups() {
      for (let i = 0; i < pickups.length; i++) {
        const p = pickups[i];
        if (p.collected) continue;
        const bobY = p.y + Math.sin(p.bobTimer) * 3;
        const sx = p.x - camera.x;
        const sy = bobY - camera.y;

        // Skip if off-screen
        if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) continue;

        if (p.type === 'vial') {
          // Glow behind vial
          ctx.save();
          ctx.globalAlpha = 0.25 + Math.sin(p.bobTimer * 1.5) * 0.1;
          const glow = ctx.createRadialGradient(sx + 12, sy + 16, 0, sx + 12, sy + 16, 32);
          glow.addColorStop(0, 'rgba(170,204,238,0.6)');
          glow.addColorStop(1, 'rgba(170,204,238,0)');
          ctx.fillStyle = glow;
          ctx.fillRect(sx - 20, sy - 16, 64, 64);
          ctx.restore();

          // Vial body
          ctx.fillStyle = '#aaccee';
          ctx.fillRect(sx + 4, sy + 8, 16, 24);
          // Vial neck
          ctx.fillRect(sx + 6, sy, 12, 10);
          // Vial cap
          ctx.fillStyle = '#889';
          ctx.fillRect(sx + 8, sy - 2, 8, 4);
          // Highlight
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          ctx.fillRect(sx + 6, sy + 10, 4, 16);
        } else if (p.type === 'boxing') {
          // Glow
          ctx.save();
          ctx.globalAlpha = 0.2 + Math.sin(p.bobTimer * 2) * 0.1;
          const glow = ctx.createRadialGradient(sx + 10, sy + 10, 0, sx + 10, sy + 10, 24);
          glow.addColorStop(0, 'rgba(218,165,32,0.5)');
          glow.addColorStop(1, 'rgba(218,165,32,0)');
          ctx.fillStyle = glow;
          ctx.fillRect(sx - 14, sy - 14, 48, 48);
          ctx.restore();

          // Gold coin
          ctx.fillStyle = '#daa520';
          ctx.beginPath();
          ctx.arc(sx + 10, sy + 10, 10, 0, Math.PI * 2);
          ctx.fill();
          // Inner circle
          ctx.fillStyle = '#c89418';
          ctx.beginPath();
          ctx.arc(sx + 10, sy + 10, 6, 0, Math.PI * 2);
          ctx.fill();
          // Highlight
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          ctx.beginPath();
          ctx.arc(sx + 8, sy + 8, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // --- Render falling ash clumps ---
    function renderAshClumps() {
      for (let i = 0; i < ashClumps.length; i++) {
        const ac = ashClumps[i];
        const sx = ac.x - camera.x;
        const sy = ac.y - camera.y;

        // Warning shadow on ground below
        const shadowY = ac.groundY - camera.y;
        const distToGround = ac.groundY - ac.y;
        if (distToGround > 0 && distToGround < 300) {
          const shadowAlpha = Math.max(0, 0.4 * (1 - distToGround / 300));
          const shadowSize = 6 + 8 * (1 - distToGround / 300);
          ctx.save();
          ctx.globalAlpha = shadowAlpha;
          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.ellipse(sx + ac.width / 2, shadowY, shadowSize, shadowSize * 0.3, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // The ash clump itself
        ctx.save();
        ctx.fillStyle = '#3a3a3a';
        ctx.beginPath();
        ctx.arc(sx + ac.width / 2, sy + ac.height / 2, ac.width / 2, 0, Math.PI * 2);
        ctx.fill();
        // Darker core
        ctx.fillStyle = '#2a2a2a';
        ctx.beginPath();
        ctx.arc(sx + ac.width / 2 - 1, sy + ac.height / 2 - 1, ac.width / 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function renderSoothedIndicators() {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.soothed || !e.alive) continue;
        const screenX = Math.round(e.x - camera.x);
        const screenY = Math.round(e.y - camera.y);

        // Blue tint overlay on enemy
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#4466cc';
        ctx.fillRect(screenX, screenY, e.width, e.height);
        ctx.restore();

        // Swirling particles above head
        const t = performance.now() / 1000;
        const cx = screenX + e.width / 2;
        const cy = screenY - 8;
        for (let p = 0; p < 3; p++) {
          const angle = t * 3 + (p * Math.PI * 2 / 3);
          const px = cx + Math.cos(angle) * 6;
          const py = cy + Math.sin(angle * 0.7) * 3 - 2;
          ctx.save();
          ctx.globalAlpha = 0.7;
          ctx.fillStyle = '#6688ff';
          ctx.beginPath();
          ctx.arc(px, py, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // Confused indicator "?" or stars
        ctx.save();
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#8888ff';
        ctx.font = '10px monospace';
        ctx.fillText('?', cx - 3, screenY - 14);
        ctx.restore();
      }
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];

        // Handle death fade
        if (!e.alive) {
          e.deathTimer += dt;
          if (e.deathTimer >= 0.5) {
            enemies.splice(i, 1);
          }
          continue;
        }

        // Soothed state: freeze enemy
        if (e.soothed) {
          e.sootheTimer -= dt;
          e.vx = 0;
          if (e.sootheTimer <= 0) {
            e.soothed = false;
            e.sootheTimer = 0;
          }
          // Still apply gravity while soothed
          e.vy += 1470 * dt;
          e.y += e.vy * dt;
          resolveEnemyVertical(e);
          continue;
        }

        // Hit stun
        if (e.hitTimer > 0) {
          e.hitTimer -= dt;
          // Still apply gravity during hit stun
          e.vy += 1470 * dt;
          e.y += e.vy * dt;
          resolveEnemyVertical(e);
          // Apply knockback decel
          e.x += e.vx * dt;
          resolveEnemyHorizontal(e);
          e.vx *= 0.9;
          continue;
        }

        // Guard-specific AI: detection and attack
        if (e.type === 'guard') {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const absDx = Math.abs(dx);
          const absDy = Math.abs(dy);

          // Update attack timer
          if (e.attacking) {
            e.attackTimer += dt;
            if (e.attackTimer >= e.attackDuration) {
              e.attacking = false;
              e.attackTimer = e.attackCooldown; // start cooldown
            }
          } else if (e.attackTimer > 0) {
            e.attackTimer -= dt;
            if (e.attackTimer < 0) e.attackTimer = 0;
          }

          // Detection: within 150px horizontal and 64px vertical
          const wasDetecting = e.detecting;
          e.detecting = absDx < 225 && absDy < 96 && !player.dead;

          if (e.detecting && !wasDetecting) {
            playSound('guardAlert');
          }
          if (e.detecting) {
            // Face the player
            e.facing = dx > 0 ? 1 : -1;

            if (absDx < 60) {
              // In attack range: stop and swing sword
              e.vx = 0;
              if (!e.attacking && e.attackTimer <= 0) {
                e.attacking = true;
                e.attackTimer = 0;
                // Update sword hitbox position
                e.swordHitbox.x = e.facing === 1 ? e.x + e.width : e.x - 60;
                e.swordHitbox.y = e.y + 16;
              }
            } else {
              // Chase the player
              e.vx = e.facing * e.speed;
              e.attacking = false;
            }
          } else {
            // Patrol AI (same as thug)
            e.detecting = false;
            e.attacking = false;
            e.vx = e.facing * e.speed;

            if (e.x <= e.patrolLeft) {
              e.facing = 1;
              e.x = e.patrolLeft;
            } else if (e.x + e.width >= e.patrolRight) {
              e.facing = -1;
              e.x = e.patrolRight - e.width;
            }
          }

          // Update sword hitbox each frame while attacking
          if (e.attacking) {
            e.swordHitbox.x = e.facing === 1 ? e.x + e.width : e.x - 60;
            e.swordHitbox.y = e.y + 16;
          }
        } else {
          // Thug patrol AI
          e.vx = e.facing * e.speed;

          // Reverse at patrol bounds
          if (e.x <= e.patrolLeft) {
            e.facing = 1;
            e.x = e.patrolLeft;
          } else if (e.x + e.width >= e.patrolRight) {
            e.facing = -1;
            e.x = e.patrolRight - e.width;
          }
        }

        // Don't walk off edges — reverse direction but keep moving
        if (e.onGround && !hasGroundAhead(e)) {
          e.facing *= -1;
          e.vx = e.facing * e.speed;
        }

        // Apply gravity
        e.vy += 1470 * dt;

        // Move
        e.x += e.vx * dt;
        resolveEnemyHorizontal(e);
        e.y += e.vy * dt;
        resolveEnemyVertical(e);

        // Update animation
        const spriteFrames = e.type === 'guard' ? GUARD_SPRITE_FRAMES : THUG_SPRITE_FRAMES;
        if (e.type === 'guard' && e.detecting && !e.attacking) {
          e.anim.state = 'alert';
        } else if (e.hitTimer > 0) {
          e.anim.state = 'hit';
        } else {
          e.anim.state = 'walk';
        }
        e.anim.timer += dt;
        if (e.anim.timer >= 0.15) {
          e.anim.timer -= 0.15;
          e.anim.frame = (e.anim.frame + 1) % spriteFrames[e.anim.state].length;
        }
      }
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function updateCombat(dt) {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.alive) continue;

        // Player attack hits enemy
        if (player.attacking && player.attackTimer < 0.15) {
          const hb = player.attackHitbox;
          if (rectsOverlap(hb.x, hb.y, hb.width, hb.height, e.x, e.y, e.width, e.height)) {
            e.hp -= 1;
            e.hitTimer = 0.3;
            // Knockback away from player
            e.vx = (e.x > player.x ? 1 : -1) * 200;
            e.vy = -100;
            e.anim.state = 'hit';
            e.anim.frame = 0;
            playSound('enemyHit');

            if (e.hp <= 0) {
              e.alive = false;
              e.deathTimer = 0;
              playSound('enemyDeath');
              addScreenShake(2, 0.15);
            }
          }
        }

        // Guard sword attack hits player
        if (e.type === 'guard' && e.attacking && e.alive && !player.invincible) {
          const sh = e.swordHitbox;
          if (rectsOverlap(player.x, player.y, player.width, player.height, sh.x, sh.y, sh.width, sh.height)) {
            player.hp -= 1;
            player.invincible = true;
            player.invincibleTimer = 1.5;
            player.vx = (player.x > e.x ? 1 : -1) * 250;
            player.vy = -150;
            playSound('playerHurt');
            addScreenShake(4, 0.2);

            if (player.hp <= 0) {
              player.dead = true;
              player.deadTimer = 0;
            }
          }
        }

        // Enemy touches player
        if (e.alive && !player.invincible) {
          if (rectsOverlap(player.x, player.y, player.width, player.height, e.x, e.y, e.width, e.height)) {
            player.hp -= 1;
            player.invincible = true;
            player.invincibleTimer = 1.5;
            // Knockback player away from enemy
            player.vx = (player.x > e.x ? 1 : -1) * 200;
            player.vy = -150;
            playSound('playerHurt');
            addScreenShake(4, 0.2);

            if (player.hp <= 0) {
              player.dead = true;
              player.deadTimer = 0;
            }
          }
        }
      }
    }

    function renderEnemies() {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        const screenX = Math.round(e.x - camera.x);
        const screenY = Math.round(e.y - camera.y);

        // Skip if off screen
        if (screenX + e.width < 0 || screenX > canvas.width || screenY + e.height < 0 || screenY > canvas.height) continue;

        ctx.save();

        if (!e.alive) {
          // Death fade out
          ctx.globalAlpha = Math.max(0, 1 - e.deathTimer / 0.5);
        } else if (e.hitTimer > 0) {
          // Flash white when hit
          ctx.globalAlpha = (Math.floor(e.hitTimer * 20) % 2 === 0) ? 0.4 : 1;
        }

        const spriteFrames = e.type === 'guard' ? GUARD_SPRITE_FRAMES : THUG_SPRITE_FRAMES;
        let animState = 'walk';
        if (e.hitTimer > 0) animState = 'hit';
        else if (e.type === 'guard' && e.detecting) animState = 'alert';
        const frames = spriteFrames[animState] || spriteFrames.walk;
        const spriteData = frames[e.anim.frame % frames.length];
        const flip = e.facing === -1;
        drawSprite(spriteData, screenX, screenY, flip);

        // Guard sword swing visual effect
        if (e.type === 'guard' && e.attacking && e.alive) {
          const progress = e.attackTimer / e.attackDuration;
          const alpha = Math.max(0, 1 - progress * 1.5);
          const cx = screenX + e.width / 2 + e.facing * (e.width / 2 + 24);
          const cy = screenY + e.height / 2 - 8;
          const radius = 32 + progress * 16;
          const startAngle = e.facing === 1 ? -Math.PI * 0.6 : Math.PI * 0.4;
          const endAngle = e.facing === 1 ? Math.PI * 0.6 : Math.PI * 1.6;

          ctx.save();
          ctx.globalAlpha = alpha * 0.8;
          ctx.strokeStyle = '#cc3333';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, startAngle, endAngle);
          ctx.stroke();

          ctx.globalAlpha = alpha * 0.4;
          ctx.strokeStyle = '#ff6644';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(cx, cy, radius * 0.6, startAngle, endAngle);
          ctx.stroke();
          ctx.restore();
        }

        ctx.restore();
      }
    }

    // --- Enemy Initialization ---
    function initEnemies() {
      enemies.length = 0;
      // --- Place thugs in the Slums (cols 0-69) ---
      enemies.push(createThug(10 * TILE, 17 * TILE - 72, 1 * TILE, 12 * TILE));    // patrol on ground cols 1-12
